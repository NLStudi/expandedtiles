################################### Events                  \n   §H§!
 
 lichtenstein.1.t:0 "Lichtenstein Invaded"
 lichtenstein.1.d:0 "Historically Lichtenstein was never annexed by the Nazis despite being German and sitting right on their border after Austria was annexed. But historically, the Nazis never invaded Switzerland either, with the fall of Switzerland, Lichtenstein is unprotected, and doomed."
 lichtenstein.1.a:0 "For the Reich!"
 monaco.1.t:0 "Monaco Invaded"
 monaco.1.d:0 "In 1943, the Italian Army invaded and occupied Monaco, forming a fascist administration. In September 1943, following the fall from power of Mussolini, the German Wehrmacht occupied Italy and Monaco and the Nazi deportation of the Jewish population began. Eventually, the Nazis were pushed out of Italy and Monaco, and Monaco was restored as an independent entity."
 monaco.1.a:0 "For Il Duce!"
 panama_ownership.1.t:0 "We Control the Panama Canal"
 panama_ownership.1.d:0 "The Panama Canal was built over the course of 33 years. The project to build the canal started in 1881 by a French company, and then was replaced replaced by American efforts in 1904 and completed in 1914. It cuts down the travel by sea from the Atlantic to the Pacific by several thousand miles. Ownership or control of it grants access to its valuable tolls."
 panama_ownership.1.a:0 "Onwards to a Brighter Future"
 panama_ownership.2.t:0 "We no longer control the Panama Canal"
 panama_ownership.2.d:0 "Either due to war or diplomacy, we have lost control of the Panama Canal, and with it the highly profitable Panama Canal Toll profits."
 panama_ownership.2.a:0 "We will survive without it"
 panama_ownership.2.b:0 "We will survive without it"
 panama_ownership.3.t:0 "Panama Canal Destroyed"
 panama_ownership.3.d:0 "The Panama Canal has been destroyed, taking with it the Panama Canal Toll and the profits we would be making due to it."
 panama_ownership.3.a:0 "You maniacs! You blew it up!"
 panama_ownership.3.b:0 "You maniacs! You blew it up!"
 panama_ownership.4.t:0 "The Panama Lease Treaty"
 panama_ownership.4.d:0 "The Panama Canal Zone was created in 1903 when the Hay-Bunau-Varilla Treaty was signed, the USA payed $10 million in Gold Coins to us and $250,000 anually since then."
 panama_ownership.4.a:0 "Make it Rain"
 panama_ownership.5.t:0 "Friendly Panama Canal Owner"
 panama_ownership.5.d:0 "The Panama Canal has ended up in the hands of a friendly nation, whether that nation is our puppeteer or fellow faction member doesn't matter, the Panama Canal is in the hands of a friendly nation, and thus we pay a reduced Toll when using the Canal."
 panama_ownership.5.a:0 "Onwards to a Brighter Future"
 panama_ownership.5.b:0 "Onwards to a Brighter Future"
 panama_ownership.6.t:0 "The USA no longer owns the Canal"
 panama_ownership.6.d:0 "The United States of America is only obliged to pay the cost of the treaty while they still own the Canal, as they no longer do, they no longer have to pay for it."
 panama_ownership.6.a:0 "This is potentially worrying"
 panama_ownership.7.t:0 "Unfriendly Panama Canal Owner"
 panama_ownership.7.d:0 "The Panama Canal has ended up in the hands of a unfriendly nation, whether that nation is at war with us or is doesn't neutral matter, the Panama Canal is in the hands of a friendly nation no longer, and thus we pay the full Toll when using the Canal."
 panama_ownership.7.a:0 "Well that sucks"
 suez_ownership.1.t:0 "We Control the Suez Canal"
 suez_ownership.2.t:0 "Control of the Suez Canal Contested"
 suez_ownership.3.t:0 "We no longer control the Suez Canal"
 suez_ownership.4.t:0 "Suez Canal Destroyed"
 suez_ownership.5.t:0 "Friendly Suez Canal Owner"
 suez_ownership.6.t:0 "Unfriendly Suez Canal Owner"
 suez_ownership.1.d:0 "The Suez Canal was built over the course of 10 years. The project to build the canal started in 1859 by the Suez Canal Company and was completed in 1869. It cuts down the travel by sea from the Atlantic to the Pacific by several thousand miles. Ownership or control of it grants access to its valuable tolls."
 suez_ownership.2.d:0 "The Suez Canal has ended up contested due to both sides of it no longer being controlled by the same nation."
 suez_ownership.3.d:0 "Either due to war or diplomacy, we have lost control of the Suez Canal, and with it the highly profitable Suez Canal Toll profits."
 suez_ownership.4.d:0 "The Suez Canal has been destroyed, taking with it the Suez Canal Toll and the profits we would be making due to it."
 suez_ownership.5.d:0 "The Suez Canal has ended up in the hands of a friendly nation, whether that nation is our puppeteer or fellow faction member doesn't matter, the Suez Canal is in the hands of a friendly nation, and thus we pay a reduced Toll when using the Canal."
 suez_ownership.6.d:0 "The Suez Canal has ended up in the hands of a unfriendly nation, whether that nation is at war with us or is neutral doesn't matter, the Suez Canal is in the hands of a friendly nation no longer, and thus we pay the full Toll when using the Canal."
 suez_ownership.1.a:0 "Onwards to a Brighter Future"
 suez_ownership.2.a:0 "Quickly! Contest it!"
 suez_ownership.3.a:0 "We will survive without it"
 suez_ownership.4.a:0 "You maniacs! You blew it up!"
 suez_ownership.5.a:0 "Onwards to a Brighter Future"
 suez_ownership.6.a:0 "Well that sucks"
 suez_ownership.2.b:0 "Quickly! Contest it!"
 suez_ownership.3.b:0 "We will survive without it"
 suez_ownership.4.b:0 "You maniacs! You blew it up!"
 suez_ownership.5.b:0 "Onwards to a Brighter Future"
 kiel_ownership.1.t:0 "We Control the Kiel Canal"
 kiel_ownership.1.d:0 "The Kiel Canal was built over the course of 8 years. The project to build the canal started in 1887 by the German Empire and was completed in 1895. It was originally built to allow German ships to skip going around Denmark. Expansion of it began in 1907 and ended in 1914. Ownership or control of it grants access to its valuable tolls."
 kiel_ownership.1.a:0 "Onwards to a Brighter Future"
 kiel_ownership.2.t:0 "We no longer control the Kiel Canal"
 kiel_ownership.2.d:0 "Either due to war or diplomacy, we have lost control of the Kiel Canal, and with it the profitable Kiel Canal Toll profits."
 kiel_ownership.2.a:0 "We will survive without it"
 sound_toll_ownership.1.t:0 "We control the Sound Toll"
 sound_toll_ownership.1.d:0 "The Sound Toll was recently restored, despite having been out of practice for nearly a full century, we are already beginning to turn a profit."
 sound_toll_ownership.1.a:0 "Onwards to a Brighter Future!"
 sound_toll_ownership.2.t:0 "We no longer control the Sound Toll"
 sound_toll_ownership.2.d:0 "The Sound Toll has been taken control of by someone else."
 sound_toll_ownership.2.a:0 "We will survive with out it, right?"
 baltic_toll_ownership.1.t:0 "The Baltic Toll"
 baltic_toll_ownership.1.d:0 "With the Kiel Canal and the Sound Toll both under our control, we have declared a Baltic Toll and increased the Toll for both by a small margin, and we can already see the profit rolling into our country."
 baltic_toll_ownership.1.a:0 "Onwards to a Prosperous Future!"
 baltic_toll_ownership.2.t:0 "The Baltic Toll refuted"
 baltic_toll_ownership.2.d:0 "The Baltic Toll has been compromised, the Kiel Canal or Sound Toll are no longer in our hands. With the loss of either, our monopoly required for the Baltic Toll's survival has been shattered."
 baltic_toll_ownership.2.a:0 "Dark Times Ahead."
 japan_indochina.1.t:0 "The Indochinese Conference"
 japan_indochina.1.d:0 "With the Fall of the French Colonial Iron Fist over Vietnam, Cambodia and Laos, all that remains is to decide what to do with their lands."
 japan_indochina.1.a:0 "Give Siam Laos and Cambodia, we want Vietnam"
 japan_indochina.1.b:0 "Give Siam all of Indochina"
 japan_indochina.1.c:0 "Set up new administrations within the land."
 japan_indochina.1.e:0 "Take the Coastal land, give Siam the rest"
 japan_indochina.2.d:0 "We have laid claim to all of the lands of Indochina, but denied direct annexation, how shall we divide the lands of Indochina?"
 japan_indochina.2.a:0 "Set up a puppet who will rule from Saigon"
 japan_indochina.2.b:0 "Restore the former Native governments of the area. (Historical Option)"
 japan_indochina.3.t:0 "Flag of Ōsutoraria"
 japan_indochina.3.d:0 "With our successes over the British pushing them from Northern Australia, we have started building a new puppet administration in Australia, Ōsutoraria shall encompass both Australia and New Zealand, and already has several suggested flags, the question is which flag we should use."
 japan_indochina.3.a:0 "Use the Japanese influenced Red Flag."
 japan_indochina.3.b:0 "Use the Japanese influenced Blue Flag."
 japan_indochina.3.c:0 "Use the Japanese influenced Red Flag. (Upside Down)"
 japan_indochina.3.e:0 "Use the Japanese influenced Blue Flag. (Upside Down)"
 pet_events.1.t:0 "Blondi the German Shepard"
 pet_events.1.d:0 "Blondi was Adolf Hitler's German Shepherd, a gift as a puppy from Martin Bormann in 1941. Blondi stayed with Hitler even after his move into the Führerbunker located underneath the garden of the Reich Chancellery on 16 January 1945."
 pet_events.1.a:0 "Long Live Blondi"
 war_of_the_worlds_radio.1.t:0 "War of the Worlds Radio Broadcast"
 war_of_the_worlds_radio.1.d:0 "'Martians have invaded New Jersey!' cries the radio broadcast, and across the nation, millions of people listen in and are shocked as the hoax goes on, with nearly ten percent of those people immediately panicing."
 war_of_the_worlds_radio.1.a:0 "IT'S THE END OF THE WORLD!"
 war_of_the_worlds_radio.2.t:0 "Radio Broadcast Panic Resolved"
 war_of_the_worlds_radio.2.d:0 "It was a Hoax! Time to go back to what we were doing as if nothing happened."
 war_of_the_worlds_radio.2.a:0 "The world isn't ending?"
 temp_soviet_development.1.t:0 "Autonomous Development Dividends"
 temp_soviet_development.1.d:0 "Allowing the lesser Socialist Soviet Republics to develop on their own with minimal oversight from Moscow has allowed them to surprise us with a new factory in their lands, already this new factory is producing new industrial products and furthering our Revolution by reducing the weight of our needs."
 temp_soviet_development.1.a:0 "For the Rodina!"
 earthquakes.1.t:0 "Earthquake"
 earthquakes.1.d:0 "On January 9th, an Earthquake killed 250 people in the Narino Department."
 earthquakes.1.a:0 "Fix the damage."
 tamerlane_s_curse.1.t:0 "Tamerlane's Curse"
 tamerlane_s_curse.1.d:0 "'Gur-e-Amir', The Tomb of Tamerlane, also known as Timur the Lame or Tamberlane, was opened on June 20th 1941, by Soviet Scientists. What was discovered by them was two separate warnings. 'When I Rise From the Dead, the World shall Tremble' and 'Whosoever Disturbs My Tomb Will Unleash an Invader More Terrible Than I'. Two days later, Operation Barbarossa would begin."
 tamerlane_s_curse.1.a:0 "Ominous."
 fall_of_the_prc.1.t:0 "The Fall of the PRC"
 fall_of_the_prc.1.d:0 "In a shocking display, the Chinese Communists have been crushed in China, many of the upper echelons have been executed and none of importance managed to escape to Mongolia, but a sizable number of Chinese Communists have arrived in Mongolia seeking asylum. The leadership of Mongolia have requested that we take them, as they fear the influence of the Chinese growing in their country."
 fall_of_the_prc.1.a:0 "Settle them in Ulan Ude."
 fall_of_the_prc.2.a:0 "Settle them in Central Asia."
 fall_of_the_prc.3.a:0 "Settle them in the Far East Region."
 fall_of_the_prc.4.a:0 "Settle them in the Ural Region."
