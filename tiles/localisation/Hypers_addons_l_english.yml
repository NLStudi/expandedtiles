 Angery_Hash.1.t:0 "The King crashes his car"
 Angery_Hash.1.d:0 "On April 4th, 1939, the King of Iraq, Ghazi bin Faisal of the Arab Hashemite dynasty, was in a car crash that historically ended with his death. A large number of Iraqis believed that Nuri Pasha al-Said, a British puppet, ordered for his death."
 Angery_Hash.1.a:0 "He survives and blames the Saudis"
 Angery_Hash.1.b:0 "He died"
 Angery_Hash.2.t:0 "A Caliphate with Jerusalem"
 Angery_Hash.2.d:0 "Through Diplomacy or Conquest, Jerusalem has been seized from its occupiers and returned to Arabic control. With Jerusalem restored to the Caliphate, our Legitimacy as the newest Caliphate has grown."
 Angery_Hash.2.a:0 "Inshallah"
 Angery_Hash.3.t:0 "A Caliphate without Jerusalem"
 Angery_Hash.3.d:0 "There have been many Caliphates declared, and while not all of them did, most Caliphates held all three of Islam's holy cities. We currently hold Mecca and Medina, but without Jerusalem, our Legitimacy is lessened."
 Angery_Hash.3.a:0 "Inshallah"
 Angery_Hash.4.t:0 "Unhappy Sunnis"
 Angery_Hash.4.d:0 "The declaration of Shia Islam as the state religion has unsettled the Sunni Arab population, while many of them can see the benefit of Persia being restored to Caliphate control, most, if not all, are saddened by the end of the end of the unofficial Pan-Islamic tolerance the Caliphate had going on."
 Angery_Hash.4.a:0 "Thank Allah they didn't revolt"
 Angery_Hash.5.t:0 "Enraged Suunis"
 Angery_Hash.5.d:0 "The declaration of Shia Islam as the state religion has enraged the Sunni Arab population, while many of them can see the benefit of Persia being restored to Caliphate control, most, if not all, are enraged by the end of the end of the unofficial Pan-Islamic tolerance the Caliphate had going on."
 Angery_Hash.5.a:0 "Allah Damn Them"
 bring_afghanistan_into_fold:0 "Bring Afghanistan into the fold"
 bring_afghanistan_into_fold_desc:0 "With Persia once more part of the Caliphate and the nation stable, it is now time to look East to the Graveyard of Empires. Afghanistan is a mountainous minor country, but just like Persia, they are Islamic and would make for a good border region. Let us send some diplomats to them to extend an invitation to join the Caliphate."
 bring_pakistan_into_fold:0 "Bring Pakistan into the fold"
 bring_pakistan_into_fold_desc:0 "Pakistan is the last Muslim country in Asia that borders us to the East. Let us offer them protection for their land and people."
 bargin_with_raj:0 "Bargin with the Raj"
 bargin_with_raj_desc:0 "There is a large Muslim population in the west portion of the Indian Raj. We must extend an offer to the Raj "
 destroy_turkey_IRQ:0 "Destroy Turkey"
 destroy_turkey_IRQ_desc:0 "For the past 400 years, the Turks ruled over Arabia with a Turkish Caliph. It is time to flip this paradigm on it's head and place Turkey under Arab rule!"
 caliphate_shia:0 "Sharifian Shia Caliphate"
 bargin_with_IRQ:0 "Bargin with the Caliphate"
 bargin_with_IRQ_desc:0 "The Caliphate wants the Muslims in our nation, and we want them gone or pacified. We can do both if we surrender the Islamic Majority Pakistan and do population transfers with the Caliphate to reduce the number of Muslims in our nation."
 claim_balkans_carpathia:0 "Claim the Balkans and Carpathia"
 claim_balkans_carpathia_desc:0 "Over 200 years ago, the Ottoman Empire ruled land in Europe strecthing as far as Western Hungary and Northern Romania, as we have crushed Turkey and begun the process of integrating them into the Caliphate, we should revive these old claims so that we might one day rule the Eastern Mediterranean."
 finish_horn_conquest:0 "Finish the Conquest of the Horn"
 finish_horn_conquest_desc:0 "Back when the Rashidun Caliphate first stormed out of Arabia, catching both the Sassanid Persian Empire and the Byzantine Empire off guard, there had been a third invader of the Peninsula. Aksum, a relatively smaller Empire, situated in the Horn of Africa. We were quick to dislodge them from our Peninsula, but even now, Arabia is not safe while they are independent from us."
 claim_egypt_sudan:0 "Claim Egypt and Sudan"
 claim_egypt_sudan_desc:0 "Egypt and what is now North Sudan, were among the first conquests the Rashidun Caliphate conquered from the Byzantine Empire. If we are to ensure a powerful economy, we must be able to feed ourselves, and with control of the Legendary 'Breadbasket Of The Mediterranean', we could not only sustain ourselves indefinitely, we could make money by exporting food."
 claim_libya:0 "Claim Libya"
 claim_libya_desc:0 "With the B.O.T.M. under our control, it is time to move West once more. We must continue pushing West until we reach the Atlantic, but to reach the Atlantic, we must first control Libya."
 claim_maghreb:0 "Claim the Maghreb"
 claim_maghreb_desc:0 "With half of North Africa under the Caliphate's control, all we have to do is conquer the Maghreb and an Arab Caliphate will once more stretch from Arabia to the Atlantic Coastline."
 claim_malta:0 "Claim Malta"
 claim_malta_desc:0 "Malta is a small Island just south of Sicily, it's got a large population for its size and is Christian. However, the people of Malta are Arabs, and it is only right for the Caliphate to claim the islands."
 execute_pope:0 "Execute Pope"
 execute_pope_desc:0 "While we might not have been able to capture all of the Cardinals present in the Vatican, we have succeeded in capturing the Pope. With the Pope dead, the Catholics will be in a weakened position with their blind head of the faith dead."
 final_crusade:0 "The Final Crusade"
 final_crusade_desc:0 "What the Caliph misunderstood when he executed the Pope was how long we have been preparing to throw them out of Europe. All but the Pope himself was successfully evacuated from the Vatican. Any of the soldiers present during the fall of the Vatican were to dress themselves up as Cardinals and pretend to be Cardinals to trick the Muslims into thinking they had actually slowed down the election of a new Pope. And just as the previous Pope dies, a new one has taken his place in Avignon, Dues Vult, a Final Crusade to shatter the Crescent Moon!"
 claim_kilwa_sultanate_west_ind_islands:0 "Claim the Kilwa Sultanate and West Indian Ocean Islands"
 claim_west_africa:0 "Claim West Africa"
 claim_islamic_west_africa:0 "Claim Islamic West Africa"
 final_expansion_IRQ:0 "Claim Indonesia"
 final_expansion_IRQ_desc:0 "With a signficantly larger coastline now under the control of our Caliphate, it is now much more viable to build a giant fleet to project our power. And there is only one place we would want to project our power towards immediately. The East Indies, a huge population of Muslims live there, it is only right that we conquer them and bring them under the rule of the Caliph."
