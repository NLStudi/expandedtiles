 puppet_SIK_desc:0 "Sinkiang is more useful to us right now as an external puppet in China."
 puppet_PRC:0 "Reform Communist China"
 puppet_PRC_desc:0 "Communist China is more useful to us right now as an external puppet in China."
 sino_soviet_union:0 "Unite the Sino-Soviet Union"
 sino_soviet_union_ogish:0 "Form the Sino-Soviet Union"
 sino_soviet_union_desc:0 "If we integrate the Chinese Communists into the Soviet Union, then we have grounds to claim all of China as part of a Greater Soviet Union... Hmmm, like a Sino-Soviet Union..."
 integrate_SIK:0 "Integrate the Sikiang Communists"
 integrate_SIK_desc:0 "If we integrate the Sinkiang Communists into the Soviet Union, then we have grounds to claim all of former Sinkiang as an Soviet Socialist Republic for our Union of Soviet Socialist Republics."
 puppet_PRC_SIK:0 "Reform Communist China"
 puppet_PRC_SIK:0 "Sinkiang is more useful to us right now as a reformed Communist Chinese Puppet in China."
 conquer_greece:0 "Conquer Greece"
 conquer_greece_desc:0 "The Greeks refused our generous offer, let us show them the folloy of their ways."
