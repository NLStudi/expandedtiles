 flee_to_soviets_PRC:0 "Flee to the Soviets"
 flee_to_soviets_PRC_desc:0 "Our Enemies have defeated us, however the Soviet Union is nearby and still very powerful, if we evacuate immediately we can reach Mongolia and through them the Soviets before our Enemies catch us."
 flee_to_soviets_SIK:0 "Flee to the Soviets"
 flee_to_soviets_SIK_desc:0 "Our Enemies have defeated us, however the Soviet Union is nearby and still very powerful, if we evacuate immediately we can reach the Soviet Socialist Republics in Central Asia and through them the rest of the Soviet Union before our Enemies catch us."
