 chinese_communists_SIK:0 "Chinese Communists"
 proclaim_caliphate:0 "Proclaim Caliphate"
 chinese_communists_desc:0 "The Chinese Communists fled to us during the final days of their doomed country, now they're present in our country, we could use this to our advantage..."
