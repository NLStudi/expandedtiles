 conquered_rome:0 "Roma Delenda Est"
 conquered_rome_desc:0 "Roma Delenda Est is Latin. It's a Reversal of the Phrase uttered by Cato the Censor "Ceterum censeo Carthaginem esse delendam" which means "Lastly, I believe Carthage must be destroyed". Roma Delenda Est is Latin for "Rome must be Destroyed". DON'T USE THIS UNLESS YOU PLAN TO DIE."
