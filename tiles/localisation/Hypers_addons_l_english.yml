 indian_warrior_caste:0 "Kshatriya Caste"
 indian_warrior_caste_desc:0 "The Kshatriya Caste is the second highest of the 5 major castes in Hinduism, only below the Brahmin caste. It is the Caste that consists of the Elite of the Military and the Rulers. By enlisting the Warriors of this Caste, we can get a larger portion of India's population into the army."
 night_witch:0 "The Night Witches"
 night_witch_desc:0 "The "Night Witches" (German: die Nachthexen and Russian: Nochnyye Vedmy), were the 588th Night Bomber Regiment. Despite inferior equipment, they performed extremely well over the course of the war, dropping thousands of pounds of explosives on the Germans. They were disbanded less than a year after the end of World War 2."
 panama_canal_ownership:0 "Panama Canal Toll"
 panama_canal_ownership_desc:0 "As we control the Panama Canal, we get money from every ship that passes through the Canal."
 panama_lease:0 "Hay–Bunau-Varilla Treaty"
 panama_lease_desc:0 "The Hay–Bunau-Varilla Treaty was signed in 1903, which established the Panama Canal Zone, which the Americans then used to build the Panama Canal. Article XIV of the treaty makes the USA pay us $250,000 dollars annually."
 panama_canal_ownership_ally:0 "Reduced Panama Canal Toll"
 panama_canal_ownership_ally_desc:0 "As we are allied to the owner of the Toll, we pay a lesser fee to use it."
 suez_canal_ownership:0 "Suez Canal Toll"
 suez_canal_ownership_desc:0 "As we control the Suez Canal, we get money from every ship that passes through the Canal."
 suez_canal_ownership_ally:0 "Reduced Suez Canal Toll"
 suez_canal_ownership_ally_desc:0 "As we are allied to the owner of the Toll, we pay a lesser fee to use it."
 contested_suez_canal_ownership:0 "Contested Suez Canal Toll"
 contested_suez_canal_ownership_desc:0 "The Suez Canal is currently contested, thus reducing the profits produced by the Suez Canal Toll."
 kiel_canal_ownership:0 "Kiel Canal Toll"
 kiel_canal_ownership_desc:0 "As we control the Kiel Canal, we get money from every ship that passes through the Canal."
 sound_toll_ownership:0 "The Sound Toll"
 sound_toll_ownership_desc:0 "The Sound Dues (or Sound Tolls; Danish: Øresundstolden) were a toll on the use of the Øresund which constituted up to two thirds of Denmark's state income in the 16th and 17th centuries. The dues were introduced by King Eric of Pomerania in 1429 and remained in effect until the Copenhagen Convention of 1857 (with the sole exception of Swedish ships between 1660 and 1712). Tolls in the Great Belt had been collected by the Danish Crown at least a century prior to the establishment of the dues by Eric of Pomerania."
 baltic_toll_ownership:0 "The Baltic Toll"
 baltic_toll_ownership_desc:0 "With the Sound Toll restored and the Kiel Canal under our control, we are turning a profit on every ship that exists or leaves the Baltic Sea."
 tamerlanes_curse:0 "Tamerlane's Curse"
 tamerlanes_curse_desc:0 "Superstition or not, that tomb was spooky."
