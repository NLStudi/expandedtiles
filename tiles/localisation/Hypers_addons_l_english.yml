 elevating_karelian_ASSR_desc:0 "Elevating an ASSR to the status of SSR is unheard of for a ethnic group that is small and never has been the majority in their own lands, but the Karelians hold enough cultural, linguistic and genetic ties to the Finnish that we can use the Karelians to integrate the rebellious Finnish given enough time."
