 invite_german_knowhow_desc:0 "The Germans have begun Pooling the Technical Know-How of their allies, if we add our Technical Know-How to this Pool, then we can benefit from the knowledge being shared between the Germans and the others Polling their information."
 sinkiang_communists:0 "Sinkiang Communists"
 sinkiang_communists_desc:0 "The Sinkiang Communists fled to us during the final days of their doomed country, now they're present in our country, we could use this to our advantage..."
