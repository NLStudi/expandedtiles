 american_synthetic_rubber_project_start:0 "Begin the Rubber Project"
 american_synthetic_rubber_project_start_desc:0 "Due to World War 2, the supply of Natural Rubber to America stopped, due to its use in tires and other products, there was signficant research into creating Synthetic Rubber to use instead of Natural Rubber. Only about 231 tons of Synthetic Rubber was made in the entirety of 1941...."
 american_synthetic_rubber_project_part2:0 "Continue the Rubber Project"
 american_synthetic_rubber_project_part2_desc:0 "But by 1945 70,000 tons of Synthetic Rubber was made in a month. This impact on the rubber industry was permenant."
