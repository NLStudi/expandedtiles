 GMO_UBD_subject:0 "United Baltic Duchy"
 GMO_UBD_subject_desc:0 "Before the End of the Great War, the United Baltic Duchy used to be our subject state, now that we have control of Riga once more, it is time to restore our subject in the Baltic. (Thanks C77A1 for the idea of using the formable tag already present)"
 integrate_chinese_coastline:0 "Integrate Chinese Coastline"
 claim_the_rest_of_russia_desc:0 "With the Soviets pushed out of Europe, all that's left to do is recall the White Russian specialists and claim the rest of Russia."
 claim_the_grand_duchy_of_finland:0 "Claim the Grand Duchy of Finland"
 form_greater_finland:0 "Form Greater Finland"
 unite_south_east_asia:0 "Unite South East Asia"
 proclaim_greater_isreal:0 "Proclaim Greater Isreal"
 claim_the_grand_duchy_of_finland_desc:0 "Ever since end of the Finnish war in which began in February 1808 and ended in September 1809, Finland was a part of the Russian Empire as the Grand Duchy of Finland, the title of Grand Duke belonging to the Romanov Tzar. Finland only became a seperate entity after the collapse of the Russian Empire. Now that we control all borderlands with the new Finnish state, we can claim the old lands of the old Grand Duchy."
