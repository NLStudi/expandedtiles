 restore_manchuria_claims:0 "Restore Manchuria Claims"
 restore_manchuria_claims_desc:0 "Manchuria was annexed following the Imperial Russian Invasion during the Boxer Rebellion. It was lost due to the Japanese beating us in the Russo-Japanese War where in the first time in centuries, an Asian power defeated a European one. Let us rectify this failure and reintegrate Manchuria now that we are focusing Eastward."
