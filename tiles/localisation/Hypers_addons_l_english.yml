 UCM_Empire_fascism:0 "The Universal Catholic State"
 restore_mughal_dynasty:0 "Restore Mughal Dynasty"
 integrate_france_italy_germany:0 "Make them Swiss"
 integrate_france_italy_germany_desc:0 "Switzerland is a nation with numerous cultural identities in it, the most prominent of those being French, Italian and German. If we were to use this as justification to say, integrate the French, Italians and the Germans, then after defeating our enemies, we can just sit back and relax while returning to Neutrality."
 proclaim_the_universal_monarchy:0 "Proclaim the Universal Catholic Monarchy"
 restore_catholicism_eng:0 "Declare our intentions to restore Catholicism to Britain"
 restore_catholicism_eng_desc:0 "For nearly 400 years, Britain has turned its back on Catholicism, let us return them to the Catholic fold finally after all these years."
 restore_catholicism_sca:0 "Declare our intentions to restore Catholicism to Scandinavia"
 restore_catholicism_sca_desc:0 "For centuries, Scandinavia has turned its back on Catholicism, let us return them to the Catholic fold finally after all these years."
 restore_catholicism_sov:0 "Declare our intentions to bring God to the Communists"
 restore_catholicism_sov_desc:0 "The Godless Communists of the Soviet Union are basically all that remains of the Orthodox Russian Empire, let us return Christianity to the people of Europe by pushing the Soviets out of Europe."
