 unite_rome:0 "Unite Rome"
 unite_rome_desc:0 "With the Byzantine Empire and the Imperium Romanum Occidentis reformed, the only thing left for us to do is to join with our Western Half. Long Live the Roman Empire."
 offer_union_to_bulgaria:0 "Offer to form a Greco-Bulgarian Union"
 offer_union_to_bulgaria_desc:0 "A long time ago, when the Byzantine Empire still existed, Bulgaria used to be part of the Empire, and with the destruction of Yugoslavia and Albania, much of our former land has been returned to us, however, we are not strong enough to keep them pacified and to perform well in the upcoming Turkish Invasion. Perhaps we can convince them to join us in a 'Union' if we guarantee them influence over their Slavic claims?"
 offer_union_to_bulgaria_ITA:0 "Offer Union to Bulgaria"
 offer_union_to_bulgaria_ITA_desc:0 "We are nearly there, all that remains outside of our control needed to declare the restoration of Imperium Romanum is Constantinople. If we can get Bulgaria to enter a union with us, we will have Constantinople."
 accept_union_with_italy:0 "Accept Union with Italy"
 deny_union_with_italy:0 "Deny Union with Italy"
 JAP_technological_cooperation:0 "Japanese Allied Tech Sharing"
 JAP_technological_cooperation_desc:0 ""
 GER_technological_cooperation:0 "Soviet Allied Tech Sharing"
 GER_technological_cooperation_desc:0 ""
 accept_union_with_greece:0 "Accept the Greek's Union Offer"
 deny_union_with_greece:0 "Deny the Greek's Union Offer"
 destroy_bulgaria:0 "Destroy the Petulant Bulgarians"
 restore_imperium_romanum:0 "Restore Imperium Romanum"
 restore_imperium_romanum_desc:0 "Despite all odds being against us, we have managed to come out on top, despite the efforts of the Greeks, the Balkan Slavs, the French, the Turks, the Iberians, the False Romans and whoever they called to save them, the people of Italia and Roma once more reign over a large portion of Europe. With our claim as the restored Western Roman Empire already established, all that remains is proclaiming ourselves the restored Roman Empire. Long Live Roma, Long Live Mussolini, LONG LIVE IMPERIUM ROMANUM!"
 new_romans:0 "Breeding New Romans"
 new_romans_desc:0 "With the restoration of the Roman Empire, it is only right that we restore the people of Rome, the Romans. This will take some time to do, but with some work and a lot of breeding, the Romans will once more be the dominant people of Europe, Africa and Asia."
 claim_hre:0 "Destroy the Pretenders"
 claim_hre_desc:0 "The Third Reich claims to be a successor to the 'Second and First Reichs'. The second being the Kaiserreich which died after the Great War and was replaced by the Wiemar Republic, and the first being the Holy Roman Empire, the bastardation of the Western Roman Empire which the Germans themselves had destroyed. Let us not suffer this insult any further, onwards to Berlin, let us crush them under the weight of Rome Reunited."
 claim_persia:0 "Finish Heraclius's Conquest"
 claim_persia_desc:0 "For as long as Rome has ruled Asia Minor, we have been at odds with the Persians, even now, our rivalry flares up once more, however, in the centuries since our last war with them, they have become an irrelevant minor power instead of our Brick Wall. Let us finally wipe them off the map to prove that Roma is Eternal, and none else are."
 claim_britannia_et_hibernia:0 "Return to Britannia Et Hibernia"
 claim_britannia_et_hibernia_desc:0 "Britannia was one of the last Grand Expansions of the First Roman Empire that was held for centuries, even now Hadrian's wall still stands in Britannia as a symbol of Roman Power. However, Hadrian's wall is not owned by Romans, it's owned by the Foreign Conquerors in Londinium. We may have left Britannia defenseless a century or so before it was conquered, but back then, Britannia was only a drain on our resources, Modern Britannia's conquest would be such a boon we could take all of the Island as well as potentially Hibernia. Prepare thineself Britain, Roma comes for Londinium."
 claim_tr:0 "Conquer 'Third' Rome"
 claim_tr_desc:0 "After the destruction of the Byzantine Empire at the hands of the Ottoman Empire, the Grand Duke of Muscovy, styled himself and his children as heir to the title of Emperor of Rome, while most European Monarchies had inheritance laws which would allow this to work, it was not tradition for the Romans, Byzantine or otherwise. Centuries later, Italy reunited and the ideas of a real Third Roman Empire have risen. However, in that same time, the claimants of the Third Roman Empire formed a massive Empire stretching from Warsaw to Vladivostok, only to be overthrown by the Communists of the nation during the Great War. Still though, even with the government change, the foolish Barbaric Slavs still tote around Moscow as a Third Rome. We've shown the world what we'll do to pretenders, let us do so again."
 claim_europe_rome:0 "Claim the rest of Europe"
 claim_europe_rome_desc:0 "With all the previous European Great Powers destroyed and integrated into Romanum, all that remains are the few minors clinging to the the Baltic Sea, let us conquer them so they can be safe and proctected under Rome's Soothing Light."
 smallpox_treatment_fast:0 "Major Smallpox Vaccine Breakthrough"
 smallpox_becoming_extinct:0 "Smallpox becoming extinct"
 smallpox_extinct:0 "Smallpox is Extinct"
 claim_the_united_netherlands:0 "Claim The United Netherlands"
 reclaim_portugal:0 "Reclaim Portugal"
 unite_the_GHM:0 "Unite the Greater Habsburg Monarchy"
 unite_the_GHM_pu:0 "Unite the Greater Habsburg Monarchy"
 invite_otto:0 "Invite The Habsburgs Home"
 invite_otto_desc:0 "The Habsburg Dynasty once was a Dynasty in control of most of Central Europe, in fact at one point the Spanish Empire was a Habsburg Domain, those times are gone now, and with them the glory days, let us reinvite the Habsburgs to their throne in Spain, it's time to restore our Empire."
 smallpox_treatment_slow_desc:0 "On the 14th of May, 1796, Edward Jenner inoculated an Eight year old by the name of James Phipps with Cowpox. In July Jenner then inoculated Phipps with Smallpox, Phipps remained healthy despite how infectious Smallpox was. Jenner then proved Cowpox was a reliable way to prevent Smallpox infections."
 claim_the_former_habsburg_monarchy:0 "Claim The Former Habsburg Monarchy"
 claim_the_former_habsburg_monarchy_desc:0 "With a Habsburg connected to the former Habsburg Monarchy on our throne, we should be able to use his claims to gain legitimate claims to the former Habsburg Monarchy."
 mandatory_vaccinations_smallpox_slow:0 "Institute Mandatory Vaccinations"
 mandatory_vaccinations_smallpox_fast:0 "Institute Mandatory Mass Vaccinations"
 mandatory_vaccinations_smallpox_extinct:0 "Smallpox is Gone (Crab Rave)"
 mandatory_vaccinations_smallpox_extinct_desc:0 "In the year 1972 the Smallpox vaccine was no longer needed, after all, the disease was effectively extinct."
 claim_sardinia_corsica:0 "Claim Cerdeña y Córcega"
 reclaim_sicily:0 "Reclaim Sicily"
 reclaim_malta:0 "Reclaim Malta"
 GER_Condor_Veteran:0 "Condor Legion Veteran"
 reclaim_malta_desc:0 "Malta used to be a part of the Spanish Empire, before Charles V of the HRE or as he was known in Spain, Charles I of Spain gave it to the Order of Saint John. This was fine until France conquered it during the Napoleonic wars and it then got stolen by the British. Let us reclaim what is rightfully ours."
 claim_sardinia_corsica_desc:0 "Claiming both Cerdeña y Córcega might not be the best idea, but while we never truly controlled Córcega (Corsica in Spanish), we did control Cerdeña (Sardinia in Spanish)."
