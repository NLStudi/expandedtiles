 destroy_switzerland:0 "Destroy Switzerland"
 destroy_luxembourg:0 "Destroy Luxembourg"
 destroy_belgium:0 "Destroy Belgium"
 swiss_split.1.t:0 "The Swiss Split"
 swiss_split.1.d:0 "Germany has lobbied the other Great Powers on our borders in an effort to gain international support in dismantling our country, and their efforts have finally culminated in a demand for the immediate cessation of Switzerland."
 swiss_split.1.a:0 "Submit to Germany's demands"
 swiss_split.2.a:0 "Defy Germany's demands"
 demand_maginot:0 "Demand Elsaß-Lothringen"
 surrender_maginot:0 "Surrender Alsace-Moselle"
 keep_maginot:0 "Don't surrender Alsace-Moselle"
 ben_dick_desc:0 "Benito was a dictator, why does he lack the Dictator trait?"
 fufill_the_promise:0 "Fufill our promises to the Greeks"
 spanish_promises:0 "Spanish Promises"
 british_promises:0 "British Promises"
 invite_ireland:0 "Invite Ireland"
 reclaim_syria:0 "Reclaim Syria"
 reclaim_syria_desc:0 "Ghazi bin Faisal, our King, was for a short time the Crown Prince of the short-lived Kingdom of Syria, let us leverage his claim to Syria to hopefully one day take it from France."
 request_arabs_to_submit:0 "Request Arabs to Submit to the Caliphate"
 submit_to_iraq:0 "Submit to the Caliph"
 submit_to_iraq_desc:0 "The Sharifian Caliph is our rightful Caliph. After centuries of the Turkish False Caliph, a true Caliph, a descendent of Muhammed himself, has proclaimed himself Caliph. We shall join our liege in his holy conquest as he brings Arabia to the top once more."
 reject_iraq_request:0 "Reject the False Caliph's request"
 reject_iraq_request_desc:0 "The Sharifian Caliph is unlikely to be very happy about us refusing his request."
 submit_to_iraq_FRA:0 "End our Mandate in Arabia"
 submit_to_iraq_FRA_SYR:0 "Surrender Syria to the Caliphate"
 submit_to_iraq_ENG_EGY:0 "End our Mandate in Arabia and hand over Egypt"
 submit_to_iraq_ENG:0 "End our Mandate in Arabia"
 submit_to_iraq_ENG_mandate_end:0 "End our Mandate in Arabia but keep Jerusalem"
 submit_to_iraq_ENG_KUW:0 "Only surrender Kuwait"
 reject_iraq_request_colonial:0 "Reject the Iraqi demands"
 bring_persia_back:0 "Bring Persia back into the fold"
 bring_persia_back_desc:0 "Ever since the Rashidun Caliphate, the First Caliphate, Persia has been part of the Islamic World, while not always a direct part of the Caliphates, it was usually a powerful buffer against invaders from the East. We must return Persia to the fold if the Caliphate and more importantly Arabia itself are to remain safe."
 submit_to_iraq_PER:0 "Make Demands of the Caliph"
 submit_to_iraq_PER_desc:0 "We will not join a Caliphate that is not toting an official Islamic Faith, we shall demand that Ghazi first make Shia Islam the official religion of his Caliphate, in return we will join his growing Caliphate."
 accept_persian_counteroffer:0 "Accept Persian Counteroffer"
 refuse_persian_counteroffer:0 "Refuse Persian Counteroffer"
 claim_italy_west_med_islands:0 "Claim Italy and West Med Islands"
 claim_italy_west_med_islands_desc:0 "There have been many Islamic Incursions into the West Mediterranean Islands ever since that Rashidun Caliphate conquered North Africa. It is now our turn to try out hand at conquering them. But this time we will not stop at just the Islands, we will take Italy down as well!"
 claim_black_sea:0 "Claim Black Sea"
 claim_black_sea_desc:0 "If we are to ensure Naval Dominance in our future Mare Nostrum, we must conquer the Black Sea's Coastline. While yes this is unorthodox, the Black Sea represents the only Coastline available within the Greater Mediterranean which would remain outside of our control if we were to not head North, and that is unacceptable."
 claim_central_asia:0 "Claim Central Asia"
 claim_central_asia_desc:0 "Central Asia is the furthest North-East our Caliph claims to want to integrate into the Caliphate for now. He's brought us this far, so let us oblige him on last time by conquering the Great Steppe."
 refuse_IRQ:0 "Refuse the Caliphate's offer"
 conquer_pakistan:0 "Conquer Pakistan"
 conquer_pakistan_desc:0 "The Raj has refused our request, and that means we must take Pakistan by force. If we went down the path of a Shia Caliphate, we will only get claims on Pakistan's cores."
 integrate_pakistan_PAK:0 "Hand over Pakistan"
 integrate_pakistan_PAK_desc:0 "With the destruction of the Raj and restoration of the Mughal Empire, it is time we pay back our Caliph by handing over Pakistan. We don't need it anymore, we have plenty of land and people to convert into Muslims."
 revive_bulgarian_empire:0 "Revive Bulgarian Empire"
 claim_former_imperial_bulgarian_lands:0 "Claim Former Imperial Bulgarian Lands"
 claim_epirus:0 "Claim Epirus"
 claim_north_dobrudja:0 "Claim North Dobrudja"
 join_britain:0 "Join Britain"
 refuse_britain:0 "Refuse Britain"
 spanish_promises_desc:0 "We've just recieved a declaration from the Spanish revived Holy Roman Empire that if we join their Empire peacefully then not only will our King George II retain full control over Greece, we'll be given Northern Epirus from Albania, Constantinople and Anatolia will be conquered and then put under Greek control. While we could always say yes to this declaration, we'd end up no longer being independent, choose wisely."
 greek_acceptance:0 "The Greeks accepted"
 greek_rejectance:0 "The Greeks rejected"
 bulgarian_acceptance:0 "The Bulgarians accepted"
 bulgarian_rejectance:0 "The Bulgarians rejected"
