 apply_core:0 "Apply core"
 apply_core_desc:0 "This is the first of a few decisions I'm going to be making to reduce the number of uncored states on the map. This decision is based on the fact there is no Cape Verde tag and thus I will use the Guinea-Bissau tag since the original independence party wanted both Cape Verde and Guinea-Bissau to be one nation."
 apply_core_2:0 "Apply core 2"
 apply_core_2_desc:0 "This is the second decision I've made to reduce the number of uncored states on the map. This decision is based on the fact there are no tags for these areas so I just filled in the gaps with tags that share a sea zone with the relevant island, except the Cocos Islands, who I view as being paired with Christmas Island, which is why they are cored by the same tag."
 form_norway_denmark:0 "Reform Norway-Denmark"
 form_north_sea_empire:0 "Restore Cnut's Empire"
 form_north_sea_empire_desc:0 "Cnut the Great, a Viking of Old, was the King of Denmark, Norway and England. His lands were often referred to as the North Sea Empire. Let us restore this old Viking's Empire, and let's take it further, let us form a Real North Sea Empire now that we have reunited Cnut's nations."
 form_celtic_empire:0 "Form a Celtic Empire"
 form_celtic_empire_desc:0 "Not since the fall of the Celts in old Gallia has there been a major Celtic state, it is time for the Celts to take bake our homes, rise up brothers! Our Glory Awaits!"
