 general_staff_l_desc:0 "This is intended to let people get a General Staff in *UMC* Gameplay Improvements if they can't get it from their focus tree."
 RFR_Francia_democratic:0 "Frankish Republic"
 RFR_Francia_communsim:0 "Frankish Commune"
 RFR_Francia_fascism:0 "Second Empire of Francia"
 RFR_Francia_neutrality:0 "Kingdom of Francia"
 call_home_ger_dynasties:0 "Call Home Our Kings"
 accept_polish_refugees:0 "Accept Polish Refugees"
 claim_ticino:0 "Claim Ticino"
 claim_ticino_desc:0 "Ticino is an Italian Majority area in Switzerland it's only right for us to claim it."
 claim_romandie:0 "Claim Romandie"
 claim_romandie_desc:0 "Romandie is a French Majority area in Switzerland, it's only right for us to claim it."
 reclaim_slovakia:0 "Reclaim Szlovákia"
 reclaim_slovakia:0 "Slovakia or Szlovákia in Hungarian was once a part of the Hungarian Kingdom, in fact Slovakia was a Duchy under Hungarian control, specifically the Duchy of Nitria. Now that we have control of this part of our former Kingdom, it's time to reintegrate them into us."
 call_home_ger_dynasties_desc:0 "When Hitler came to power many German Monarchists fled to escape the new Germany, now that the Kaiser has returned and he has become trusted again, we can call the Wittelsbachs to Bavaria."
 GER_reichsprotektorat_france_mon:0 "Kingdom of Francia"
 GER_reichsprotektorat_france_mon_desc:0 "The Kingdom of Francia was once a German Kingdom, it was a tribe before the Great Migrations into the Western Roman Empire which caused the Empire to collapse and came into existance after the Germanic Franks settle in Gaul. Eventually Francia became influenced by Italy and became France, shedding it's old Frankish culture for one which became known as French. Let us attempt to restore Frankish culture in Gaul by reviving the Kingdom of Francia. (Otto's portait is a temporary use until the next HOI4 update with the Bonaparte pretender)"
 GER_reichsprotektorat_france_mon_exp1:0 "Expand Francia Northwards"
 GER_reichsprotektorat_france_mon_exp2:0 "Expand Francia Southwards"
 invite_jap_staff:0 "Invite a Japanese General Staff"
 invite_ger_staff:0 "Invite a German General Staff"
 invite_sov_staff:0 "Invite a Soviet General Staff"
 invite_usa_staff:0 "Invite an American General Staff"
 invite_ita_staff:0 "Invite an Italian General Staff"
 invite_eng_staff:0 "Invite a British General Staff"
 invite_french_staff:0 "Invite a French General Staff"
 form_united_caucasus:0 "Form United Caucasus"
 west_rome_lives:0 "West Rome Lives"
 west_rome_lives_desc:0 "The Western Roman Empire was a relatively short lived state created when the Roman Empire split into West and East in an attempt to save the Empire, while the East Half of the Empire went on to survive for around another Thousand years, ignoring the dissolution by the Latin Empire after the 4th Crusade and the Empire of Nicaea restoring the Empire. We should proclaim the restoration the West Half of the Roman Empire, after all, if we are to rebuild the Roman Empire, we will need a compliant Western Half."
 revive_yuan:0 "Revive Yuan"
 revive_yuan_desc:0 "We once ruled all of China as the Yuan Dynasty of China, it is time for those Glory days to return."
 revive_tang:0 "Revive Tang"
 revive_tang_desc:0 "The Tang Empire once ruled a large portion of what is now considered China, as well as a large portion of Central Asia. Since we have already conquered Central Asia and China has fallen before our victorious armies, what better way to cement the loyalty of the Chinese then to proclaim to be the restoration of the Tang Empire?"
 kamikaze_revenge:0 "Revenge for the Kamikaze"
 kamikaze_revenge_desc:0 "During Genghis Khan's son Kublai Khan's reign as the Khan of the Mongol Empire, he tried to conquer Japan, only for the Kamikaze (Kamikaze being Japanese for God/Divine/Spirit Wind, Kami is God or Divine or Spirit, Kaze is Wind) to spring forth a Typhon to destroy our ships, what made it to Japan were defeated, we shall rectify this failure and conquer Japan unlike our Forefathers of old."
 reintegrate_central_asia:0 "Reintegrate Central Asia"
 reintegrate_central_asia_desc:0 "Central Asia used to be part of the Mongol Empire, with control of it once more under Mongol rule, it is time to reintegrate it into our new Empire."
 reclaim_ilkhanate:0 "Reclaim the Ilkhanate's lands"
 reclaim_ilkhanate_desc:0 "When the Mongol Empire collapsed, the Ilkhanate, which was a Mongol horde situated in Persia, was created, let us reclaim those lands which fell to the Ilkhanate so they may fall to us more easily."
 claim_anatolia:0 "Claim Anatolia"
 claim_anatolia_desc:0 "When the Mongol Empire Collapsed, many Turkish subject states in Anatolia broke free from Mongol control, the most prominent of these Turkish states was one led by a certain man named Osman, the originator of the Ottoman Dynasty. The First of the line which created the Ottoman/Turkish Empire. With our return to Greatness nearing completion, it is time to remind the Turks that they are nothing but Mongol subjects."
 immigration:0 "Immigration"
 slavic_immigration:0 "Slavic Immigration"
 slavic_immigration_desc:0 "Slavs are fleeing Europe into Siberia due to the lack of Germanization and less harsh policies of the Sibirien Reichskomissariats."
 brahzil:0 "Increased Immigration"
 destroyed_government_POR:0 "Portuguese Goverment Remneants Fleed to Brazil"
 Chinese_Front_Ended:0 "The Chinese Front of the Iberian Intervention closes."
 IB_IN_Ended:0 "Iberian Intervention Ended with Iberian Pacification."
 Iberian_Interven.1.t:0 "The Iberian Intervention"
 Iberian_Interven.1.d:0 "The Anarchist Stratocracy that has formed in the lands of Iberia has been growing bolder in its propaganda. Already there has been several failed attempts for Anarchist agents to inflitrate our lands, however, Andorra just went dark. If Portugal is anything to go by, the Anarchists managed to trigger a revolt in the microstate, the question is, if we don't act now, who is next to fall?"
 Iberian_Interven.1.a:0 "Time to Restore Order!"
 Iberian_Interven.2.t:0 "Call to Arms"
 Iberian_Interven.2.d:0 "France has declared an Intervention against the Global Defense Council in Iberia, the GDC inherited all the colonies of Spain and Portugal after overthrowing it, and France's call to arms has made not to subtle remarks about claiming some of the colonies for ourselves, shall we join the intervention?"
 Iberian_Interven.2.a:0 "Time to Restore Order! And maybe pilfer a few colonies..."
 Iberian_Interven.2.b:0 "Those Equatorial Colonies are ripe for the taking."
 Iberian_Interven.2.c:0 "No, we have economies to expand."
 Iberian_Interven.3.t:0 "End of Chinese Front"
 Iberian_Interven.3.d:0 "The Chinese Front of the Iberian Intervention was never about Iberia, it was about Macau, and with Macau reclaimed and pacified, there is no point to continue the war."
 Iberian_Interven.3.a:0 "The war is over, now we can focus on other things."
 Iberian_Interven.4.t:0 "End of India Front"
 Iberian_Interven.4.d:0 "The Indian Front of the Iberian Intervention was never about Iberia, it was about Goa, and with Goa reclaimed and pacified, the front was closed."
 Iberian_Interven.4.a:0 "Redirect our forces to Iberia!"
 Iberian_Interven.5.t:0 "End of Indonesian Front"
 Iberian_Interven.5.d:0 "The Indonesian Front of the Iberian Intervention was never about Iberia, it was about East Timor, and with East Timor reclaimed and pacified, the front was closed."
 Iberian_Interven.5.a:0 "Stand down men, we've already won!"
 Iberian_Interven.6.t:0 "Restoration of Aragon"
 Iberian_Interven.6.d:0 "One of several nations integrated into Spain when it was originally being formed by Castile, Aragon hasn't existed as an independent nation for centuries. However, we can use it as justification for partitioning the Global Defense Council."
 Iberian_Interven.6.a:0 "Long Live Aragon!"
 Iberian_Interven.7.t:0 "Restoration of Navarra"
 Iberian_Interven.7.d:0 "One of several nations integrated into Spain when it was originally being formed by Castile, Navarra hasn't existed as an independent nation for centuries. However, we can use it as justification for partitioning the Global Defense Council."
 Iberian_Interven.7.a:0 "Long Live Navarra!"
 Iberian_Interven.8.t:0 "Restoration of Galicia"
 Iberian_Interven.8.d:0 "One of several nations integrated into Spain when it was originally being formed by Castile, Galicia hasn't existed as an independent nation for centuries. However, we can use it as justification for partitioning the Global Defense Council."
 Iberian_Interven.8.a:0 "Long Live Galicia!"
 Iberian_Interven.9.t:0 "Restoration of Andalusia"
 Iberian_Interven.9.d:0 "One of several nations integrated into Spain when it was originally being formed by Castile, Andalusia hasn't existed as an independent nation for centuries. However, we can use it as justification for partitioning the Global Defense Council."
 Iberian_Interven.9.a:0 "Long Live Andalusia!"
 Iberian_Interven.10.t:0 "Collapse of the Stratocracy"
 Iberian_Interven.10.d:0 "The Stratocracy can no longer hold back the incursions from the Statists, with the fall of the major cities used to coordinate major portions of the Stratocracy, the army of the Council quickly became disorganized and was wiped out by the Statist forces, without an army to lead, many of the Anarchist Generals have fled. Those few that remain either put a bullet into themselves or prepare for their final broadcast..."
 Iberian_Interven.10.a:0 "The Stratocracy dissolves into Chaos while broadcasting an unconditional surrender."
 Iberian_Interven.11.t:0 "The Iberian Conference"
 Iberian_Interven.11.d:0 "With the Iberian Intervention over and done with, France has called for the nations who participated in the Intervention to join them in Barcelona to decide the fate of the Iberians."
 Iberian_Interven.11.a:0 "Portugal shall be restored and shall enter into Union with us."
 Iberian_Interven.11.b:0 "Claim the Mediterranean Islands and Valencia."
 Iberian_Interven.11.c:0 "Claim the Mediterranean Islands and give Aragon Valencia."
 Iberian_Interven.11.e:0 "Give Aragon our claims."
 Iberian_Interven.11.f:0 "Claim the Equatorial Colonies."
 Iberian_Interven.11.g:0 "Claim Mozambique."
 Iberian_Interven.11.h:0 "Return Mozambique to Portugal-Brazil."
 Iberian_Interven.11.i:0 "Give Mozambique to South Africa."
 Iberian_Interven.11.j:0 "Claim South Angola."
 Iberian_Interven.11.k:0 "Return South Angola to Portugal-Brazil."
 Iberian_Interven.11.l:0 "Claim the Iberian Colonies."
 Iberian_Interven.11.m:0 "Claim the Iberian Colonies except Portuguese Guinea."
 Iberian_Interven.11.n:0 "Claim the Spanish Colonies and return the Portuguese Colonies."
 Iberian_Interven.11.o:0 "Claim the Iberian Colonies."
 Iberian_Interven.11.p:0 "Claim the Iberian Colonies and return the Equatorial Colonies."
 Iberian_Interven.11.q:0 "Claim the Spanish Colonies and North Angola and return the rest."
 Iberian_Interven.11.r:0 "Claim the Spanish Colonies and return the Portuguese Colonies."
 Iberian_Interven.11.s:0 "Annex Castile and the Colonies."
 Iberian_Interven.11.u:0 "Annex Castile and all the Colonies except Portuguese Guinea."
 Iberian_Interven.11.v:0 "Annex Castile and the Spanish Colonies."
 Iberian_Interven.11.w:0 "Annex Castile and the Colonies."
 Iberian_Interven.11.x:0 "Annex Castile and all the colonies except the Equatorial ones."
 Iberian_Interven.11.y:0 "Annex Castile and the Spanish Colonies and North Angola."
 Iberian_Interven.11.z:0 "Annex Castile and the Spanish Colonies."
 Iberian_Interven.12.t:0 "Stabilization of Castile"
 Iberian_Interven.12.d:0 "With the destruction of the Stratocracy holding the Global Defense Council together, the peoples of old Castile have come together to form a new Republic in the war torn lands of Spain, let the outsiders have their fun, Castile will return to glory one day, even if it shall not be this century."
 Iberian_Interven.12.a:0 "Castile shall rise as a phoenix one day, but that day is not now."
