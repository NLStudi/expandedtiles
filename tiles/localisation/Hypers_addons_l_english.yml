 unite_north_africa_desc:0 "Ever since Rome conquered Carthage, outsiders have invaded and taken control of portions of North Africa, but no longer. Unlike our fore fathers, we have United North Africa under Africans. Long Live North Africa, for Africans, Ruled by Africans."
