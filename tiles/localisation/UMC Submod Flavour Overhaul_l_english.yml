 wargn.100.t:0 "[GetNewsHeadline]The Fall of The Hague"
 wargn.100.d:0 "German forces sweeping through [HOL.GetNameDef] have succeeded in capturing the Dutch seat of government, The Hague. \n\nA stubborn holdout of Dutch troops established themselves in the Vredespaleis where subsequent heavy fighting ensued until a Waffen-SS detatchment stormed the palace and raised the German flag over the building.\n\nThe Dutch royal family was evacuated prior to the city's fall.\n\nWith the fall of The Hague the fate of [HOL.GetNameDef] is almost certainly one of capitulation."
 wargn.100.a:0 "When will the Blitzkrieg end?"
 wargn.100.b:0 "A testament to the power of Blitzkrieg!"
 wargn.100.c:0 "This is a disaster!"
 
 wargn.101.t:0 "[GetNewsHeadline]The Fall of Brussels"
 wargn.101.d:0 "After quick successes in [BEL.GetNameDef], German troops have entered Brussels. \n\nFighting was the fiercest around the Grand-Place where Belgian snipers had set up in the town hall and could not be removed until Panzers were brought in to blow holes in the building, reducing the building to rubble in the process.\n\nThe capitulation of the once proud Belgian nation is now certain."
 wargn.101.a:0 "[GER.GetNameDef] seems unstoppable!"
 wargn.101.b:0 "The Panzers keep rolling!"
 wargn.101.c:0 "This is a disaster!"
 
 wargn.102.t:0 "[GetNewsHeadline]The Fall of Copenhagen"
 wargn.102.d:0 "The Danish capital has fallen to advancing German forces. \n\nThe bulk of the fighting in the city is over, yet stragglers from the Danish military can still be found fighting to the last in some sections of the city.\n\nHeavy fighting was expected around the Christiansborg Palace, yet the most stubborn resistance was encountered at the Marmorkirken which was stockpiled with munitions and heavily defended. The dome of the church eventually collapsed after sustained artillery fire from German positions outside of the city. \n\nThe surrender of the Danes is now certain."
 wargn.102.a:0 "Dangerous times indeed."
 wargn.102.b:0 "Shame about the church."
 wargn.102.c:0 "This is a disaster!"
 
 wargn.103.t:0 "[GetNewsHeadline]The Fall of Stockholm"
 wargn.103.d:0 "The beautiful city of Stockholm, widely known as "The Venice of the North", has fallen to German forces today. \n\nSporadic fighting can still be heard from some northern suburbs, but the fight for Stockholm is certainly over. \n\n After the bulk of the fighting was completed, German soldiers could be seen taking pictures with the statues of the Germanic gods on the Djurgårdsbron. \nIt seems the Swedish royal family was successfully evacuated before the city fell, but the surrender of [SWE.GetNameDef] now seems certain."
 wargn.103.a:0 "The German state grows larger..."
 wargn.103.b:0 "Another victory for the Vaterland!"
 wargn.103.c:0 "The Swedish Tiger will rise again!"
 
 wargn.104.t:0 "[GetNewsHeadline]The Fall of Lakehurst"
 wargn.104.d:0 "The site of the terrible Hindenburg Disaster, the Lakehurst Naval Air Station, has been captured by advancing German forces. \n\nAfter clearing out the huge Hanger No. 1 of stubborn American troops, the German soldiers at the base held an impromptu ceremony in honor of the German citizens who died in the disaster. \n\nJoseph Goebbels has vowed to visit the site to hold an official ceremony when the area will be deemed safe and out of reach of American forces."
 wargn.104.a:0 "An interesting development."
 wargn.104.b:0 "Bleib du im ew'gen Leben..."
 wargn.104.c:0 "It could be worse."
 
 wargn.105.t:0 "[GetNewsHeadline]The Fall of Oslo"
 wargn.105.d:0 "German forces have moved quickly and conquered the Norwegian capital of Oslo. \n\nAfter fighting through the city and seizing most districts, a contingent of German troops stormed the Akershus Fortress which was garrisoned by persistent Norwegian defenders. After a battle lasting into the evening, the fortress finally fell and the German flag was raised over it. \n\nIt is believed some Norwegian defenders have retreated into the surrounding countryside and fjords to fight on."
 wargn.105.a:0 "Where is that Viking spirit?"
 wargn.105.b:0 "The North Sea is ours!"
 wargn.105.c:0 "Drive them back into the sea!"
 
 wargn.106.t:0 "[GetNewsHeadline]The Liberation of Vilnius"
 wargn.106.d:0 "An early victory for German forces fighting on the Ostfront. The old capital of Lithuania has been liberated by German forces. \n\nAs fighting raged on in the city, many Lithuanians rose up and aided German forces in either finding or fighting the shattered Russian forces. \n\nAfter the city was won, the Lithuanian population could be seen celebrating with the German soldiers in the streets. \n\nThis could be the beginning of the fall of the Soviet Union."
 wargn.106.a:0 "An interesting development"
 wargn.106.b:0 "Another victory for the Vaterland!"
 wargn.106.c:0 "A minor setback."
 
 wargn.107.t:0 "[GetNewsHeadline]The Liberation of Riga"
 wargn.107.d:0 "An early victory for German forces fighting on the Ostfront. The old capital of Latvia has been liberated by German forces. \n\nAs fighting raged on in the city, many Latvians rose up and aided German forces in either finding or fighting the shattered Russian forces. \n\nAfter the city was won, the Latvian population could be seen celebrating with the German soldiers in the streets. \n\nThis could be the beginning of the fall of the Soviet Union."
 wargn.107.a:0 "An interesting development."
 wargn.107.b:0 "Another victory for the Vaterland!"
 wargn.107.c:0 "A minor setback."
 
 wargn.108.t:0 "[GetNewsHeadline]The Liberation of Tallinn"
 wargn.108.d:0 "An early victory for German forces fighting on the Ostfront. The old capital of Estonia has been liberated by German forces. \n\nAs fighting raged on in the city, many Estonians rose up and aided German forces in either finding or fighting the shattered Russian forces. \n\nAfter the city was won, the Estonian population could be seen celebrating with the German soldiers in the streets. \n\nThis could be the beginning of the fall of the Soviet Union."
 wargn.108.a:0 "An interesting development."
 wargn.108.b:0 "Another victory for the Vaterland!"
 wargn.108.c:0 "A minor setback."
 
 wargn.109.t:0 "[GetNewsHeadline]The Fall of Edinburgh"
 wargn.109.d:0 "After a successful and unprecedented invasion of the British Isles, German forces have taken control of the city of Edinburgh. \n\nFighting was fierce in the city, and there are still reports of small-arms fire in the city's outskirts. \n\nMany German soldiers lost their lives taking Edinburgh Castle, but it ultimately fell after the fight for the historic building was decided by a heavy German artillery barrage. \n\nThe loss of Edinburgh is a devastating blow to British morale."
 wargn.109.a:0 "An interesting development."
 wargn.109.b:0 "A Scottish puppet might be in order."
 wargn.109.c:0 "We can't let this happen again!"
 
 wargn.110.t:0 "[GetNewsHeadline]The Fall of Rome"
 wargn.110.d:0 "The German Blitzkrieg knows no end, and as of today the city of Rome has fallen into German hands. \n\nFighting in the city was unexpectedly swift as many of the Italian defenders retreated or simply gave up, wanting to keep the historical city and its monuments intact. \n\nUltimately, the German flag was raised over the Colosseum, and to mock the defeated Italians, a Triumph in the style of the Romans was held in the city with cries of "Heil Hermann!" heard all around. \n\nThe Italian hope of a new Roman Empire has now been put to rest."
 wargn.110.a:0 "An interesting development."
 wargn.110.b:0 "Hermann would be proud!"
 wargn.110.c:0 "Rome will not be recaptured in a day."
 
 wargn.111.t:0 "[GetNewsHeadline]The Fall of Budapest"
 wargn.111.d:0 "As of today, the German flag can be seen flying over the Hungarian capital of Budapest. \n\nGermans assaulted the city from all sides, eventually pushing the last Hungarian defenders to a final stand at the Hungarian Parliament Building which sustained heavy damage in the fight. \n\nWith the fall of the city to the Germans, many Hungarians are sadly reminded of the times of the nation's union with Austria. \n\nWith this new aquisition, the Third Reich will be seen as the heir to both the German and Austro-Hungarian Empires."
 wargn.111.a:0 "An interesting development."
 wargn.111.b:0 "Two Reichs for the price of one!"
 wargn.111.c:0 "Its just like the Habsburgs."
 
 wargn.112.t:0 "[GetNewsHeadline]The Fall of Athens"
 wargn.112.d:0 "The ancient bastion of democracy, Athens, has been captured by German forces. \n\nMuch of the fighting centered around the Acropolis which was reluctantly turned into a fort in preparation for a German attack. This proved useless, however, as a detachment of German forces managed to take the historic site. \n\n[From.GetLeader] has expressed a desire to restore the Acropolis to its former glory after hearing of its capture. \n\nWith the fall of such a historic city, the light of democracy may be dying out."
 wargn.112.a:0 "An interesting development."
 wargn.112.b:0 "Another victory for the Vaterland!"
 wargn.112.c:0 "Greece has weathered worse!"
 
 wargn.113.t:0 "[GetNewsHeadline]The Fall of Belgrade"
 wargn.113.d:0 "[YUG.GetNameDef] lost its capital today as German forces have been spotted entering the city. \n\nThe city was heavily bombed by the Luftwaffe in preparation for an attack. Later, a combined force of infantry and Panzer forces entered the city only to be met with a brutal fight among the city's rubble. \n\nWhile in the outskirts of the city there are still reports of some small Yugoslavian forces fighting in a tactical retreat, the city can now be considered under German control. \n\nThe city which has been razed forty four times before has been raised and conquered yet again."
 wargn.113.a:0 "An interesting development."
 wargn.113.b:0 "Let's not take a tour of Sarajevo."
 wargn.113.c:0 "No worse than the Ottomans or Habsburgs!"
 
 wargn.114.t:0 "[GetNewsHeadline]The Fall of Tokyo"
 wargn.114.d:0 "In a move thought impossible, the capital of Japan has fallen to German forces. \n\nThe Imperial Palace, occupied by the Emperor's fanatical Imperial Guard was the most strongly defended location in the city. \n\nThe German High Command was forced to call in elite German units, equipped with flamethrowers, Panzers, and rockets, to reduce the palace to nothing more than a ruin. The whereabouts of the Emperor are unknown at this time. \n\nThe Empire of the Rising Sun may have set for the final time."
 wargn.114.a:0 "An interesting development."
 wargn.114.b:0 "One sun sets, and another rises."
 wargn.114.c:0 "The Divine Wind will wipe them away!"
 
 wargn.115.t:0 "[GetNewsHeadline]The Fall of Ottawa"
 wargn.115.d:0 "The long tentacles of the Wehrmacht reached North America today. \n\nThe Canadian capital fell quickly in a decisive battle. By midday, the German flag was raised over the city and all combat had been ceased. \n\nMany Canadians reportedly fled into the vast Canadian wilderness to begin guerrilla warfare against the German occupiers. \n\nWith the capital of Canada now in German hands, Germans now hold vast territory and influence on the Americas as a whole."
 wargn.115.a:0 "An interesting development."
 wargn.115.b:0 "Soon the entire Atlantic will be our sea."
 wargn.115.c:0 "The Maple Leaf will rise again!"
 
 wargn.116.t:0 "[GetNewsHeadline]The Fall of Boston"
 wargn.116.d:0 "One of the oldest American cities, Boston, has fallen to German invaders. \n\nGerman troops had to fight block by block through the historic city, even against armed irregulars taking refuge in Boston's highrises. \n\nAt some point during the fight, the historic Bunker Hill Memorial was hit by a stray shell and collapsed. It is unknown which side fired it at this time. \n\nWith the capture of such a historic city, it is surely a great victory for the German Reich and a great blow to American morale."
 wargn.116.a:0 "An interesting development."
 wargn.116.b:0 "Be sure to keep partisans in check."
 wargn.116.c:0 "Time for a second shot heard round the world."
 
 wargn.117.t:0 "[GetNewsHeadline]The Fall of Philadelphia"
 wargn.117.d:0 "German forces have successfully captured the city of Philadelphia. \n\nStubborn American holdouts had been set up in the Philadelphia Museum of Art to bleed the German forces as much as possible. After a day of fighting, however, German infantry were able to storm the building, killing the defenders and looting the art in the process. \n\nAfter capturing a convoy of American trucks attempting to leave the city, the Liberty Bell was found hidden among boxes of munitions. The Bell was reportedly shipped to Germany as a spoil of war. \n\nIt seems like the Bell of Liberty will never ring again."
 wargn.117.a:0 "An interesting development."
 wargn.117.b:0 "Another victory for the Vaterland!"
 wargn.117.c:0 "We'll drive the Krauts into the sea!"
 
 wargn.118.t:0 "[GetNewsHeadline]The Fall of Detroit"
 wargn.118.d:0 "One of the most important industrial centers of the US, Detroit has fallen into German hands today. \n\nMany vehicles in various states of completion were used as improvised anti-tank barriers along Detroit's many streets and alleys. \n\nThese defenses proved ineffective, however, as German Panzers smashed through the barriers and successfully captured the city. The Ford Motor Factory served as the last holdout of American troops with much of the building being bombed to root out the stubborn defenders. \n\nThe loss of such an important industrial center is surely a devastating blow to the American War Machine."
 wargn.118.a:0 "An interesting development."
 wargn.118.b:0 "Another victory for the Vaterland!"
 wargn.118.c:0 "We must recapture the city!"
 
 wargn.119.t:0 "[GetNewsHeadline]The Liberation of Tehran"
 wargn.119.d:0 "In an impressive show of the Wehrmacht's power, the far off city of Tehran has been liberated from Soviet control today. \n\nMany Iranians treated the advancing German troops as liberators rather than occupiers, readily aiding the Germans in their capture of the city. \n\n[GER.GetLeader] has declared the taking of Tehran as a momentous occasion and a step towards the "Reunification of the Western and Eastern Aryans". \n\nThe capture of Iranian oil is surely a major victory for the Wehrmacht. The Panzers can now roll for years to come."
 wargn.119.a:0 "An interesting development."
 wargn.119.b:0 "Another victory for the Vaterland!"
 wargn.119.c:0 "A minor setback."
 
 wargn.120.t:0 "[GetNewsHeadline]The Fall of Los Angeles"
 wargn.120.d:0 "In an unprecedented attack, German forces have converged on Los Angeles and routed the city's defenders. Surviving American forces and armed irregulars have retreated from the city into the surrounding hills to continue the fight, but the German High Command ensures they are a minor threat to control of the city.\n\nBefore the retreat, however, fighting was reportedly fierce in the Hollywood Hills, but this did not stop German troops from having pictures taken in front of the now badly damaged Hollywood Sign. It seems that Hollywood will be speaking German for now."
 wargn.120.a:0 "An interesting development."
 wargn.120.b:0 "Another victory for the Vaterland!"
 wargn.120.c:0 "A minor setback."
 
 wargn.121.t:0 "[GetNewsHeadline]The Fall of Delhi"
 wargn.121.d:0 "In an impressive show of the Wehrmacht's power, the jewel of British India, Delhi, has been captured today. \n\nThe reception of German troops in Delhi was mixed as some inhabitants praised them as liberators and others condemned them as conquerers. \n\n[GER.GetLeader] has declared the taking of Delhi as a momentous occasion and a step towards the "Reunification of the Western and Eastern Aryans". \n\nThe Wehrmacht has successfully plucked out the Crown Jewel of the British Empire, and this is surely a devastating blow to British Morale."
 wargn.121.a:0 "An interesting development."
 wargn.121.b:0 "Another victory for the Vaterland!"
 wargn.121.c:0 "A minor setback."
 
 wargn.122.t:0 "[GetNewsHeadline]The Fall of Tehran"
 wargn.122.d:0 "In an impressive show of the Wehrmacht's power, the far off city of Tehran has been captured today. \n\nThe defending Iranian forces put up a valiant defense. However, it proved all for naught as the Iranian forces were pushed back to the Toop Khāneh. The Waffen-SS had to uproot the defenders of the town square, building by building. \n\n[GER.GetLeader] has declared the taking of Tehran as a momentous occasion and a step towards the "Reunification of the Western and Eastern Aryans". \n\nWith Iranian oil now at the disposal of the German war machine, it seems that the Panzers will roll for years to come."
 wargn.122.a:0 "An interesting development."
 wargn.122.b:0 "Another victory for the Vaterland!"
 wargn.122.c:0 "A minor setback."
 
 wargn.123.t:0 "[GetNewsHeadline]The Fall of Jerusalem"
 wargn.123.d:0 "The City of God, Jerusalem, has been captured by advancing German forces. \n\nThe fighting in Jerusalem was the definition of Rattenkrieg as the much feared German Panzers could not traverse the narrow streets of the city, and German infantry were forced to take the city building by building, on foot. \n\nReports from an anonymous source also say that the German government is now considering the mass movement of European Jews to the newly captured Palestine instead of a currently unknown alternative plan. The future of Zion is surely dark, but it remains to be seen."
 wargn.123.a:0 "An interesting development."
 wargn.123.b:0 "Another victory for the Vaterland!"
 wargn.123.c:0 "A minor setback."
 
 wargn.124.t:0 "[GetNewsHeadline]The Fall of Mecca"
 wargn.124.d:0 "The holy city for all Muslim faithful, Mecca, has fallen to an attack by German forces today. \n\nThe city was fiercely defended by the Saudi military and armed irregulars. German forces had to take the city slowly, building by building, room by room. \n\nAs German forces inched closer towards the Masjid al-Ḥarām, the defending Saudis grew more rabid in their defense of the city, launching many suicidal counterattacks in a vain attempt at pushing back the advancing Germans. \n\nBy the end of the day, the Masjid al-Ḥarām and Kaaba suffered heavy damage from the fighting yet remained overall intact. This is a devastating blow to the Saudis and will serve as an inspiration for revenge for the Muslims for years to come."
 wargn.124.a:0 "An interesting development."
 wargn.124.b:0 "Another victory for the Vaterland!"
 wargn.124.c:0 "A minor setback."
 
 wargn.125.t:0 "[GetNewsHeadline]The Fall of the Urals"
 wargn.125.d:0 "The Ural Mountains, the dividing line between Europe and Asia, has fallen to German forces. \n\nGerman forces have worked tirelessly to expell stubborn Soviet forces from the strategically important mountain ranges. While most Soviet forces have now retreated east of the Urals, some stubborn holdouts engage in desperate guerrilla fighting in the caves, tunnels and mountain passes. \n\nWith the bulk of fighting in western Russia finished, the gates of Soviet Asia are now wide open for the Wehrmacht."
 wargn.125.a:0 "An interesting development."
 wargn.125.b:0 "Another victory for the Vaterland!"
 wargn.125.c:0 "Blyat."
 
 wargn.126.t:0 "[GetNewsHeadline]The Fall of the Vladivostok"
 wargn.126.d:0 "The unthinkable has become reality, the [SOV.GetAdjective] Far East has fallen to the Wehrmacht. \n\nAfter grueling fighting across the entirety of Siberia, the German victory over the [SOV.GetNameDef] has all but been decided by the fall of the port city of Vladivostok. Upon entering the city, German forces found most defenders and inhabitants starving, riddled with disease, and with little more than empty guns and knives to try and hold off the German onslaught. \n\nWith the fall of Vladivostok, the German Reich now stretches from the Atlantic to the Pacific, making it the largest nation on the planet."
 wargn.126.a:0 "An interesting development."
 wargn.126.b:0 "Another victory for the Vaterland!"
 wargn.126.c:0 "All is lost!"
 
 wargn.127.t:0 "[GetNewsHeadline]The Fall of Ulaanbaatar"
 wargn.127.d:0 "The homeland of one of the world's greatest conquerors, Genghis Khan, has fallen to advancing German forces. \n\nNeither the Soviets nor Mongolians ever anticipated the Wehrmacht to reach the Land of the Eternal Blue Sky, and so German Panzers easily smashed through hastily crafted defenses and swept Soviet and Mongol defenders aside. \n\nFighting has all but ceased in Ulaanbaatar, Mongolia's capital, with mixed feelings of joy and defeat from the Mongol populace. Many fear they have simply traded one oppressor for another."
 wargn.127.a:0 "An interesting development."
 wargn.127.b:0 "Another victory for the Vaterland!"
 wargn.127.c:0 "All is lost!"
 
 wargn.128.t:0 "[GetNewsHeadline]The Fall of Riga"
 wargn.128.d:0 "The city of Riga and all of its vital Baltic ports has fallen to advancing German armies. The Latvian nation has been considerably weakened, and this is a devastating blow to Latvian morale. Dark days lie ahead for the Latvian nation."
 wargn.128.a:0 "A Baltic blitz?"
 wargn.128.b:0 "We are just securing our flanks!"
 wargn.128.c:0 "Is this the end?"
 
 wargn.129.t:0 "[GetNewsHeadline]The Fall of Tallinn"
 wargn.129.d:0 "The city of Tallinn and all of its vital Baltic ports has fallen to advancing German armies. The Estonian nation has been considerably weakened, and this is a devastating blow to Estonian morale. Dark days lie ahead for the Estonian nation."
 wargn.129.a:0 "The Baltic blitz continues?"
 wargn.129.b:0 "We are protecting you from the Russian threat!"
 wargn.129.c:0 "We are doomed!"
 
operationsflavour.100: "[GetNewsHeadline]The Question of the Baltic states"
operationsflavour.100.t: "[GetNewsHeadline]The proposal of Operation Beige"
operationsflavour.100.d: "To secure our Northen flanks and to prevent the Soviets from expanding their influence closer to the Vaterland, the Generalstaff presented a plan for a Grand Invasion of the Baltic States, codenamed Operation Beige."
operationsflavour.100.a: "Commence Unternehmen Beige!"
operationsflavour.100.b: "The risk of Soviet intervention is too big!"

operationsflavour.101: "[GetNewsHeadline]Unternehmen Beige"
operationsflavour.101.t: "[GetNewsHeadline]Germans invade Baltic states!"
operationsflavour.101.d: "The Germans have commenced their Great Invasion of Baltic States, codenamed Unternehmen Beige. The German war machine rushes forward at full speed, and the German armies capture city after city in the Baltics. The defenders are brave, however they cannot challenge the power of the Wehrmacht."
operationsflavour.101.a: "The time has come to fully secure our borders!"
operationsflavour.101.b: "Blitzkrieg in the Baltics, you say?"
operationsflavour.101.c: "We shall fight to the last soldier!"
operationsflavour.101.g: "That is our sphere of influence!"

operationsflavour.102: "[GetNewsHeadline]Soviet Intervention in Baltic War"
operationsflavour.102.t: "[GetNewsHeadline]Soviet Intervention in Baltic War!"
operationsflavour.102.d: "Seeing German aggression in the Baltic states as a threat to their so-called Sphere of Influence, the Soviets have launched an attack on the German armies. The Soviet Army is now moving into the Baltics to counter the German expansion."
operationsflavour.103.a: "The Great Crusade Begins!"
operationsflavour.103.b: "We are not ready for this war. Try to find a diplomatic solution!"
operationsflavour.102.c: "This is the beginning of the war in the East."
operationsflavour.102.e: "Onwards!"

operationsflavour.103: "Situation on the fornt"
operationsflavour.103.t: "Heavy fighting in the Baltic states!"
sue_for_peace_sovger: "The Sense of this Conflict"

waroperationswar_sov: "Soviet Military Operations"
waroperationswar_sov_desc:"The Soviet Union launched many military operations during WW2. They managed to achieve many victories, however the cost on their manpower and resources were severly high."
interventionbaltics: "Launch a intervention in Baltics!"
operation_beigen: "Unternehmen Beige"

operations_ger: "German Military Operations"
operations_ger_desc:"Germany launched many military operations during WW2. Their speed shocked the defenders and their effectiveness were very high."
operationsflavour.103.d: "Our soldiers fight bravely against the Soviet hordes, but is it really necessary to waste our manpower and equipment for so little gains? Maybe we should push for agreement with the Soviets to end the hostilites at least for now."
sovier_intervention_balticss: "Soviets launched intervention in Baltics"
invasion_baltics_ger: "Germans commence Operation Beige"
operationsflavour.102.a: "Scheiße!"

cityflavour.100: "[GetNewsHeadline]Fall of Smolensk"
cityflavour.100.t: "[GetNewsHeadline]Fall of Smolensk"
cityflavour.100.d: "After heavy fighting, the city of Smolensk has fallen to German armies. The loss of the city is a great blow to Soviet Military Operations in the area, and a counterattack seems unlikely at this time. For now, it seems that the war has taken a turn for the worse for the USSR."
cityflavour.100.a: "Another hit on the Russians."
cityflavour.100.b: "We are gettin closer to Moskau!"
cityflavour.100.c: "Someone will get shot for this!"

cityflavour.101: "[GetNewsHeadline]Liberation of Smolensk"
cityflavour.101.t: "[GetNewsHeadline]Liberation of Smolensk"
cityflavour.101.d: "Soviet forces liberated the city of Smolensk today. This is surely a great victory for the Soviet Armies. The invincibility of the German Army is now being questioned, both in Germany and outside. It is surely a great morale boost for the shattered Soviet populations."
cityflavour.101.a: "Russians are striking back!"
cityflavour.101.b: "This can't be!"
cityflavour.101.c: "Onwards to Minsk!"

cityflavour.102: "[GetNewsHeadline]Mittelafrika has been established"
cityflavour.102.t: "[GetNewsHeadline]"
cityflavour.102.d: ""
cityflavour.102.a: "The Germans have finally realised their dream!"
cityflavour.102.b: "The Germans have finally realised their dream!"

cityflavour.103: "[GetNewsHeadline]Babi Yar"
cityflavour.103.t: "[GetNewsHeadline]Babi Yar"
cityflavour.103.d: "At a meeting near Kiew, German High Officials discussed options for the punishment of Jewish populations in the city of Babi Yar, for sabotage actions against German garrisons."
cityflavour.103.a: "We are not monsters!"
cityflavour.103.b: "Do what must be done."

cityflavour.104: "[GetNewsHeadline]Liberation of Arkhangelsk"
cityflavour.104.t: "[GetNewsHeadline]Liberation of Arkhangelsk"
cityflavour.104.d: "Soviet troops have launched a surprise offensive against the city of Arkchangelsk, and liberated it from the hands of German occupiers. The German Wehrmacht is now in the process of preparing a counterattack. However, this is a great military victory and a morale boost for the Soviet Red Army."
cityflavour.104.a: "Russian bear rises again!"
cityflavour.104.b: "Goddamn Mongol hordes!"
cityflavour.104.c: "Our soldiers are the heroes of Soviet Union!"

cityflavour.105: "[GetNewsHeadline]Fall of Arkchangelsk"
cityflavour.105.t: "[GetNewsHeadline]Fall of Arkchangelsk"
cityflavour.105.d: "After fierce fights, German panzer divisions have entered the city of Arkchangelsk. The city port is a key strategic point for control over Barents Sea, and this loss is a devastating blow for Russian Naval Operations in the area. The Kreigsmarine and the Wehrmacht are rejoicing this victory over the Russians."
cityflavour.105.a: "Another hit for Russians."
cityflavour.105.b: "We have reached the northern point of AA line!"
cityflavour.105.c: "The navy is full of traitors anyway."

cityflavour.106: "[GetNewsHeadline]Unternehmen Barbarossa"
cityflavour.106.t: "[GetNewsHeadline]Unternehmen Barbarossa launched!"
cityflavour.106.d: ""
cityflavour.106.a: "Blitzkrieg in the east then."
cityflavour.106.b: "Großer Kreuzzug beginnt!"
cityflavour.106.c: "Let them come!"

cityflavour.107: "[GetNewsHeadline]Fall of Bialystok"
cityflavour.107.t: "[GetNewsHeadline]Fall of Bialystok"
cityflavour.107.d: "German Panzer divisions have encircled the city of Bialystok, and have taken over the city after some fighting. A devastating loss to the Soviets, it seems to be only one of the firsts of many to come."
cityflavour.107.a: "Another hit for Russians."
cityflavour.107.b: "They don't even know how to fight!"
cityflavour.107.c: "Useless Polish wasteland!"

cityflavour.108: "[GetNewsHeadline]Breton state established!"
cityflavour.108.t: "[GetNewsHeadline]Breton State established by Germans!"
cityflavour.108.d: "Today, the Breton State has been officialy proclaimed. For now it is under German jurisdiction but with promise of liberty after the war. This is a blow to the French ideal of unity, and will reduce resistance against the Germans in Britanny."
cityflavour.108.a: "This is an artificial creation."
cityflavour.108.b: "We shall balkanize France as much as we can!"

cityflavour.109: "[GetNewsHeadline]Burgundy joins the war against Bolshevism!"
cityflavour.109.t: "[GetNewsHeadline]Burgundy has joined the war against Bolshevism!"
cityflavour.109.d: ""
cityflavour.109.a: "Snap back to Middle Ages."
cityflavour.109.b: "Deutsche Zwillingsstaaten kämpfen gemeinsam gegen den Bolschewismus!"

cityflavour.110: "[GetNewsHeadline]Fall of Chelabinsk"
cityflavour.110.t: "[GetNewsHeadline]Fall of Chelabinsk"
cityflavour.110.d: "German panzers rolling down the Ural slopes have managed to quickly overrun the defenders of Chelabinsk. The fall of Chelabinsk is a great hit for the Russian industry, recently evacuated east of the Urals, and can only indicate the near fall of the Union."
cityflavour.110.a: "The end of communism is near!"
cityflavour.110.b: "We bombed them. Now we will push them all the way to siberian wilderness!"
cityflavour.110.c: "The end is near!"

cityflavour.111: "[GetNewsHeadline]Liberation of Chelabinsk"
cityflavour.111.t: "[GetNewsHeadline]Liberation of Chelabinsk"
cityflavour.111.d: "What previously seemed impossible has happened. Surprisingly, the Red Army managed to successfully reorganise, and after series of miraculous counterattacks, pushed the Germans out of Chelabinsk. Shortly after, the liberated factories were reopened and production resumed with incredible efficency.  This event may turn the tide of the war in the east, and possibly even lead to a greater Soviet Counterattack."
cityflavour.111.a: "Russians are amazing!"
cityflavour.111.b: "Nein!"
cityflavour.111.c: "Kill the fascist scum and liberate Motherland!"

cityflavour.112: "[GetNewsHeadline]Decentralization of Mittelafrika"
cityflavour.112.t: "[GetNewsHeadline]Reichskolonie Mittelafrika has been decentralised!"
cityflavour.112.d: "Reichsmarshall Hermann Göring has announced the decentralization of Mittelafrika. He was visibly disappointed as his dream of his own Central African Empire is now shattered. The decentralization of Mittelafrika could be the beginning of Göring's fall from power."
cityflavour.112.a: "It was never a stable state to begin with."
cityflavour.112.b: "A great German dream destroyed."

cityflavour.113: "[GetNewsHeadline]Fall of Gorki"
cityflavour.113.t: "[GetNewsHeadline]Fall of Gorki"
cityflavour.113.d: "German forces have stormed and captured the city of Gorki, where Vladimir Lenin passed away. It is a great blow to Soviet prestige, nearly as big as the fall of Moscow. However, it has been reported that Lenin's belongings and memoirs have been evacuated into an unnamed city in Eastern Siberia."
cityflavour.113.a: "Pity the Soviets!"
cityflavour.113.b: "The city where the old idiot kicked the bucket is ours now!"
cityflavour.113.c: "How could we allow this? Shoot the man responsible!"

cityflavour.114: "[GetNewsHeadline]Liberation of Gorki"
cityflavour.114.t: "[GetNewsHeadline]Liberation of Gorki"
cityflavour.114.d: "Soviet Divisions have managed to encircle and liberate the city of Gorki. It is a city with great symbolism to the Soviets as it is where the Father of the Revolution, Vladimir Lenin, passed away. A massive parade was held to commemorate this great victory, and the troops were awarded the Medal for Battle Merit."
cityflavour.114.a: "Impressive."
cityflavour.114.b: "They are getting too close to Moskau!"
cityflavour.114.c: "We have washed away the disgrace to the Revolution! Now onwards to Moskva!"

cityflavour.115: "[GetNewsHeadline]Fall of Irkutsk"
cityflavour.115.t: "[GetNewsHeadline]Fall of Irkutsk"
cityflavour.115.d: "Japanese troop, with help of many White Russian soldiers, have managed to capture the city of Irkutsk. Located on the shore of Lake Baikal, it is a city with great importance, both strategic and patriotic. This may be the end of Soviet presence in Far Eastern Asia."
cityflavour.115.a: "Japan seems to be unstoppable!"
cityflavour.115.b: "For the Pride of the Emperor!"
cityflavour.115.c: "Maybe we should consider peace talks?"

cityflavour.116: "[GetNewsHeadline]Liberation of Irkutsk"
cityflavour.116.t: "[GetNewsHeadline]Liberation of Irkutsk"
cityflavour.116.d: "Soviet Forces have launched a surprise offensive against Japanese positions near Irkutsk, and after a quick breakthrough, the Russian tanks entered the nearly undefended city. Japanese and White Russian officials fled in panic, leaving behind important intelligence, which is sure to help the Soviet Struggle. It is a great patriotic victory for the people and a great military victory for the soldiers."
cityflavour.116.a: "A great victory to be sure."
cityflavour.116.b: "Goddamn Russians!"
cityflavour.116.c: "We will crush the Samurais and catch all the traitors!"

cityflavour.117: "[GetNewsHeadline]Fall of Khabarovsk"
cityflavour.117.t: "[GetNewsHeadline]Fall of Khabarovsk"
cityflavour.117.d: "Japanese Imperial Guards, with great help from Imperial Air Force, have managed to capture the city of Khabarovsk, an important city with huge industrial capability. Its loss will definitely affect Russian war production, and the morale of the people and the troops."
cityflavour.117.a: "Rising Sun rises over Russia!"
cityflavour.117.b: "Party like its 1904!"
cityflavour.117.c: "What a show of incompetence!"

cityflavour.118: "[GetNewsHeadline]Liberation of Khabarovsk"
cityflavour.118.t: "[GetNewsHeadline]Liberation of Khabarovsk"
cityflavour.118.d: "Soviet infantry units, with help of special shock troops, have managed to liberate the heavily defended city of Khabarovsk. The defenders of city were mostly mobilised White Russians who fought savagely,to not let the events of the October Revolution be repeated. It is reported that for some time, the defenders were commanded by Konstantin Rodzaevsky himself. After the battle, nearly all prisoners were shot on the spot for collaboration with the invaders."
cityflavour.118.a: "Russians are on the march!"
cityflavour.118.b: "Manchuria is in danger! Mobilize all the reserves!"
cityflavour.118.c: "We shall have a parade in Tokio!"

cityflavour.119: "[GetNewsHeadline]Fall of Kharkov"
cityflavour.119.t: "[GetNewsHeadline]Fall of Kharkov"
cityflavour.119.d: "German forces have managed to gain full control over Kharkov, overrunning the disorganized Soviet defenders, who couldn't match the German speed and power. The last stand reserves were not enough to stop the German Panzer Divisions from encircling the city, and Soviet troops have withdrawn from the area, preparing for a better defense or even a counterattack."
cityflavour.119.a: "Another hit to Russian industry!"
cityflavour.119.b: "A splendid offensive!"
cityflavour.119.c: "Five Year plans were for nothing!"

cityflavour.120: "[GetNewsHeadline]Liberation of Kharkov"
cityflavour.120.t: "[GetNewsHeadline]Liberation of Kharkov"
cityflavour.120.d: "Soviet forces of United Southern Front, under General Timoshenko, have managed to carry out a successful frontal assault on occupied Kharkov. The Liberation of Kharkov is a great propaganda and industrial victory for the Soviets, and a great blow to the German war effort on the Eastern Front."
cityflavour.120.a: "That sounds very Russian."
cityflavour.120.b: "We will be back!"
cityflavour.120.c: "Great news! Now get those Nazi signs out of the streets!"

cityflavour.121: "[GetNewsHeadline]Second Fall of Kharkov"
cityflavour.121.t: "[GetNewsHeadline]Second Fall of Kharkov"
cityflavour.121.d: "After a great counteroffensive carried out by the German division 'Leibstandarte Adolf Hitler', the city of Kharkov once again fell to the Reich. To commemorate this event, the main square of the city was renamed to 'Platz des Leibstandarte'. The tide has turned once again on the Eastern front, and it remains to be seen if it will change again. For now, however, it is a devastating blow to the Soviet population, and a terrible fate for the city's residents."
cityflavour.121.a: "What a mess!"
cityflavour.121.b: "The boys are back in town!"
cityflavour.121.c: "Stubborn fascists!"

cityflavour.122: "[GetNewsHeadline]Second Liberation of Kharkov"
cityflavour.122.t: "[GetNewsHeadline]Second Liberation of Kharkov"
cityflavour.122.d: "Soviet forces have once again entered Kharkov and it seems that this time, they will stay there for good. After destroying the German defenders in a hurricane of steel and fire, the Soviet tanks paraded in the Main Street of Kharkov. For now, the people of Kharkov seem to be breathing a sigh of relief. Joseph Stalin has sent his personal congratulations to the troops who undertook the valiant operation."
cityflavour.122.a: "Wait.. Again?!"
cityflavour.122.b: "We will be back again! Hopefully."
cityflavour.122.c: "Finally!"

cityflavour.123: "[GetNewsHeadline]Kiev battle begins"
cityflavour.123.t: "[GetNewsHeadline]Kiev battle begins"
cityflavour.123.d: "The First German divisions have closed up to Kiev - the heart of Ukrainian Soviet Socialist Republic. The fall of Kiev will open the road to Rostov and the stores of Ukrainian grain. It is a great propaganda, material and military loss for the Soviet Union." 
cityflavour.123.a: "Lets hope for the best."
cityflavour.123.b: "Manstein vorvarts!"
cityflavour.123.c: "Hold the city at all costs!"

cityflavour.124: "[GetNewsHeadline]Fall of Kiev"
cityflavour.124.t: "[GetNewsHeadline]Fall of Kiev"
cityflavour.124.d: "The Wehrmacht has proudly announced the total capitulation of the defenders of Kiev. The city was first encircled by fast Panzer Corps and then the defenders were slowly bled out, because of a lack of supplies. This is a perfect example of the effectiveness of the German War Doctrine, and a huge blow to the Soviet Red Army."
cityflavour.124.a: "No wheat for Russians!"
cityflavour.124.b: "Today Kiew, tomorrow Baku!"
cityflavour.124.c: "Find the man responsible and shoot him!"

cityflavour.125: "[GetNewsHeadline]Liberation of Kiev"
cityflavour.125.t: "[GetNewsHeadline]Liberation of Kiev"
cityflavour.125.d: "Soviet tank divisions have managed to overrun the exhausted German defenders of Kiev and liberate the city from German occupation. Surviving German Divisions are talking about a true storm of steel and fire, as Soviet IS tanks were smashing through barricades, even killing their own comrades under their tracks. However, it seems that the liberation of the city is all that matters to the Soviet Government at present, since no memorial service has been organised for the fallen troops."
cityflavour.125.a: "Impressive battle indeed."
cityflavour.125.b: "Try to perform a quick counteroffensive!"
cityflavour.125.c: "Snap back to Khruschev!"

cityflavour.126: "[GetNewsHeadline]Liberation of Kuibyshev"
cityflavour.126.t: "[GetNewsHeadline]Liberation of Kuibyshev"
cityflavour.126.d: "Divisions of the Soviet Beloretsk Front, under Georgy Zhukov, performed a great offensive codenamed 'Rodina' that ended up liberating vast swathes of territory, including the city of Kuibyshev, where the Soviet government had fled during Siege of Moscow. This indicates that the German Wehrmacht is running out of steam, and the Russians are getting closer to liberating Moscow itself."
cityflavour.126.a: "Zhukov seems to be based."
cityflavour.126.b: "How could we let this happen?"
cityflavour.126.c: "Perform a great parade!"

cityflavour.127: "[GetNewsHeadline]Fall of Kuibyshev"
cityflavour.127.t: "[GetNewsHeadline]Fall of Kuibyshev"
cityflavour.127.d: "German Panzer Divisions, consisting mostly of Pz.Kpfw.II Luchs and some Panthers, have managed to cut the city of Kuibyshev in half and encircle it. This led to prolonged fighting in the city, which was devastated by earlier Luftwaffe air strikes. The Germans are getting closer to the Urals and most likely, to end of their advances in the East."
cityflavour.127.a: "Germans are unstoppable."
cityflavour.127.b: "Now we must reach the Wall of Europe and then we can announce the end of the Großer Kreuzzug!"
cityflavour.127.c: "Snap back to Khruschev!"

cityflavour.128: "[GetNewsHeadline]Fall of Minsk"
cityflavour.128.t: "[GetNewsHeadline]Fall of Minsk"
cityflavour.128.d: "German Panzer divions have encircled the great city of Minsk. After cutting Minsk off from supply, they left the city defenders to slowly bleed to death. The loss of Minsk is a great loss to Soviet operations in Byelorussia, and to the greater Soviet nation as a whole."
cityflavour.128.a: "That was fast."
cityflavour.128.b: "One of our stops on the road to Moskau!"
cityflavour.128.c: "The Belarussians are not even fighting!"

cityflavour.129: "[GetNewsHeadline]Liberation of Minsk"
cityflavour.129.t: "[GetNewsHeadline]Liberation of Minsk"
cityflavour.129.d: "Soviet Guard Tank divisions, under Rokossovsky, have liberated the city of Minsk. After fierce fighting, the Germans retreated, knowing that behind them stood their Vaterland. The Soviets are preparing a new offensive which will liberate the whole of Poland and even capture Prussia. It seems like things are quickly turning worse for Germany on the Eastern Front."
cityflavour.129.a: "The Germans are on their knees!"
cityflavour.129.b: "Fight for the Vaterland!"
cityflavour.129.c: "We shall march to lair of the fascist beast!"

cityflavour.130: "[GetNewsHeadline]Liberation of Moscow"
cityflavour.130.t: "[GetNewsHeadline]Liberation of Moscow"
cityflavour.130.d: "As a part of Operation Rodina, the Soviets have managed to liberate Moscow. After incredibly brutal fighting only comparable to medieval battles, the city was completely overrun by Soviet forces, pouring in from all directions. \n\nAll Germans taken prisoner were publicly shot and the wounded ones were laid down and crushed under the parading Russian tanks. Shortly after the victory, nearly all of the Soviet officials including [SOV.GetLeader] himself arrived to watch the greatest parade in Russian history. \n\nThis is one of the greatest propaganda and political victories for the Soviet Union, which was previously failing to hold itself together. The German High Command is reportedly preparing a counter offensive to drive the Soviets back, however, the result of this remains to be seen. \n\nFor now, however, the skies of the Soviet Union will be filled with warplanes and fireworks."
cityflavour.130.a: "A great victory of course, but what they did to prisoners is just unacceptable!"
cityflavour.130.b: "I should have shot the generals just like Stalin did!"
cityflavour.130.c: "Moskva za Nami!"

cityflavour.131: "[GetNewsHeadline]Fall of Moscow"
cityflavour.131.t: "[GetNewsHeadline]Fall of Moscow"
cityflavour.131.d: "After a successful offensive, the Germans have captured Moscow. German troops, along with some Tiger tanks, are now seen parading on the Red Square, which has been renamed to 'Adolf Hitler Platz'. \n\nThe battle was costly for both sides, and there were many suicidal attacks performed by political, military and NKVD officials. NKVD members were seen sacrificing themselves in order to slow down advancing German Grenadiers so their colleuges could fully burn all of the Lubianka's archives. The fighting still continues from the deep Moscow metro, but the Germans are planning on flooding or gassing it. The Fall of Moscow is definitely one of the biggest blows to Soviet Union yet and most likely has devastated their morale. The fate of the USSR remains to be seen."
cityflavour.131.a: "Will the USSR recover from this?!"
cityflavour.131.b: "Große Kreuzzug nähert sich dem ende!"
cityflavour.131.c: "Shoot all the generals that commanded the defense! And Beria.... I didn't think he was that heroic."

cityflavour.132: "[GetNewsHeadline]Fall of Murmansk"
cityflavour.132.t: "[GetNewsHeadline]Fall of Murmansk"
cityflavour.132.d: "Finnish forces, with help of Germans, have managed to capture Murmansk and its port facilities. The port was vital for lend lease support for the USSR and its loss will definitely have major repercussions in the Soviet offensive capabilities."
cityflavour.132.a: "The Russians stand alone now."
cityflavour.132.b: "Great news! Now the Russians shall starve and surrender!"
cityflavour.132.c: "We shall fight without Captialist help!"
cityflavour.132.e: "Greater Finnland is closer than ever!"

cityflavour.133: "[GetNewsHeadline]Liberation of Murmansk"
cityflavour.133.t: "[GetNewsHeadline]Liberation of Murmansk"
cityflavour.133.d: "Soviet Arctic Troops have managed to perform a large scale offensive and liberate the city of Murmansk. The Western Allies have already promised to send additional lend lease to the Union to help them with their future offensives. It is a breath of fresh air for the Union which was previouslt struggling with its logistics and supplies."
cityflavour.133.a: "The Soviets will be well-supplied again. Together against the Reich!"
cityflavour.133.b: "This changes nothing!"
cityflavour.133.c: "Very well, offensive activities are now possible. Together against the Reich!"
cityflavour.133.e: "Vittu!"

cityflavour.134: "[GetNewsHeadline]Fall of Orel"
cityflavour.134.t: "[GetNewsHeadline]Fall of Orel"
cityflavour.134.d: "German Panzer Corps, under Heinz Guderian, have performed a quick but costly encircling maneuver against the city of Orel, and in effect isolated it completely. The fall of Orel stabilizes the German flanks on the Moscow Front and opens up many possibilities for new offensives. As of now, the German High Command is focusing on consolidating their gains and supplying their forward troops for the march into Russian Siberia."
cityflavour.134.a: "The German war machine rolls again!"
cityflavour.134.b: "Wünderbar Herr Guderian!"
cityflavour.134.c: "Maybe purging the officers was a mistake?"

cityflavour.135: "[GetNewsHeadline]Liberation of Orel"
cityflavour.135.t: "[GetNewsHeadline]Liberation of Orel"
cityflavour.135.d: "Soviet Guard Rifle divisions, commanded by Vasilievsky, have encircled the city of Orel and after heavy urban fighting, liberated it. German prisoners were greatly oppressed and most of them were sent directly to the Siberian Gulags. It is a small but significant victory for the USSR."
cityflavour.135.a: "They are just paying them off!"
cityflavour.135.b: "Goddamn barbarians!"
cityflavour.135.c: "Onwards to total liberation!"

cityflavour.136: "[GetNewsHeadline]Second Fall of Orel"
cityflavour.136.t: "[GetNewsHeadline]Second Fall of Orel"
cityflavour.136.d: "The Germans have managed to regain control of Orel, now renamed to 'Adler' to commemorate this victory. The Germans have killed nearly all of the city's population in revenge for the opression of Germans during the previous liberation."
cityflavour.136.a: "They're all barbarians!"
cityflavour.136.b: "They got what thay deserved!"
cityflavour.136.c: "Teutonic spirit."

cityflavour.137: "[GetNewsHeadline]Reichskommisariat England established"
cityflavour.137.t: "[GetNewsHeadline]"
cityflavour.137.d: ""
cityflavour.137.a: "Britons never shall be slaves!"
cityflavour.137.b: "Britannien ist jetzt Teil der Neuordnung"

cityflavour.138: "[GetNewsHeadline]Fall of Rostov"
cityflavour.138.t: "[GetNewsHeadline]Fall of Rostov"
cityflavour.138.d: "German divisions have managed to secure their hold on city of Rostov, which with its port and strategic position makes a great starting base for the planned invasion of Caucasus. The Germans are now consolidating their gains and preparing for the offensive on the Caucasian oil fields."
cityflavour.138.a: "The Russians are falling back."
cityflavour.138.b: "I can already smell that OIL!"
cityflavour.138.c: "The gates of the Caucasus have been destroyed!"

cityflavour.139: "[GetNewsHeadline]Liberation of Rostov"
cityflavour.139.t: "[GetNewsHeadline]Liberation of Rostov"
cityflavour.139.d: "Soviet divisions have commenced an attack against the weakened German divisions in Rostov. It was a fast but costly attack, and the Soviets were able to push the invaders out of the city, securing the gates of the Caucasus, at least for now. It seems that the German War Machine will not have any oil for the time being."
cityflavour.139.a: "A truly interesting development. We'll just have to wait for the Germans to run out of steam."
cityflavour.139.b: "Try to perform a quick counterattack!"
cityflavour.139.c: "We won't let the fascist beast take that city again!"

cityflavour.140: "[GetNewsHeadline]Second liberation of Rostov"
cityflavour.140.t: "[GetNewsHeadline]Second liberation of Rostov"
cityflavour.140.d: "Soviet tank divisions have encircled Rostov again, and after some rest, performed a frontal assault, in effect smashing the defenders and ramming and crushing most of them under the Soviet Tank tracks. It seems that the Germans have been decisively driven out of the gates of the Caucasus, but the results remain to be seen."
cityflavour.140.a: "The Russians truly don't play games."
cityflavour.140.b: "We shall be back!"
cityflavour.140.c: "Now towards liberation of Ukraine!"

cityflavour.141: "[GetNewsHeadline]Battle for Moscow begins"
cityflavour.141.t: "[GetNewsHeadline]Battle for Moscow begins"
cityflavour.141.d: "The German Army Group Center has reached the city of Rzhev - one of last main goals of Operation Tajfun, and beyond it stands Moscow. The Germans are at full speed but the weather and terrible road conditions are slowing their advance. Can the German war machine withstand the harsh Russian Winter?"
cityflavour.141.a: "The world watches with a baited breath."
cityflavour.141.b: "We shall have a huge parade on Red Square soon!"
cityflavour.141.c: "Moskva za nami!"

cityflavour.142: "[GetNewsHeadline]Fall of Rzhev"
cityflavour.142.t: "[GetNewsHeadline]Fall of Rzhev"
cityflavour.142.d: "The Germans have managed to gain full control over the Rzhev area. They are now very close to commencing a grand attack on Moscow itself. The Russians are mobilizing hundreds of thousands of people to build anti-tank barricades and trenches, and a Great Army is being formed to stop the German advance. The effectiveness of the Soviet defense and counterattack remains to be seen."
cityflavour.142.a: "The world's eyes now lie on Moscow."
cityflavour.142.b: "We shall capture this cursed city! We are better than Napoleon!"
cityflavour.142.c: "The defenders of Moskva stand strong at the Moskva river!"

cityflavour.143: "[GetNewsHeadline]Liberation of Rzhev"
cityflavour.143.t: "[GetNewsHeadline]Liberation of Rzhev"
cityflavour.143.d: "Soviet Guard corps have successfully carried out a major surprise offensive against the German troops in Rzhev. The Germans were caught totally off guard when the Soviet heavy battalions rushed through the main streets of Rzhev, crushing everything in their way. Casualities on the German side are very high, mostly because Soviet troops gassed the bunkers in which the Germans were hiding. A major blow to the Germans, it remains to be seen whether this city will be retaken in future."
cityflavour.143.a: "The Union is striking back!"
cityflavour.143.b: "We shall hold!"
cityflavour.143.c: "Crush the Nazi scum!"

cityflavour.144: "[GetNewsHeadline]Liberation of Sevastopol"
cityflavour.144.t: "[GetNewsHeadline]Liberation of Sevastopol"
cityflavour.144.d: "Soviet tank divisions, after securing the whole of Crimea, have commenced a huge attack on Sevastopol- the main port in the region. The German troops fought savagely but the Soviet superiority in numbers and fire power allowed them to finally liberate the city. Having established Soviet domination in the Caucasus and the Black Sea, the Red Army is now planning to undertake a major push into Ukraine and Romania."
cityflavour.144.a: "An impressive battle indeed."
cityflavour.144.b: "Terrible seige flashbacks haunt us!"
cityflavour.144.c: "We shall push the fascists out of Black Sea and the Caucasus!"

cityflavour.145: "[GetNewsHeadline]Fall of Sevastopol"
cityflavour.145.t: "[GetNewsHeadline]Fall of Sevastopol"
cityflavour.145.d: "The Germans, after a siege that lasted far too long and consumed a lot of resources, have finally occupied Sevastopol. The siege lasted for weeks and the Germans were forced to use super-heavy, long-range railway guns that devastated the city entirely. As a result of the terrible seige, the Germans are now greeted with a ruined city. However, the fall of Sevastopol opens the doors to Crimea and even the Caucasus itself. The effects of the German offensive remain to be seen."
cityflavour.145.a: "The Germans are securing their grip over the Black Sea."
cityflavour.145.b: "Krim shall become a part of the Reich."
cityflavour.145.c: "Shoot the man responsible!"

cityflavour.146: "[GetNewsHeadline]Battle for Stalingrad begins"
cityflavour.146.t: "[GetNewsHeadline]Battle for Stalingrad begins"
cityflavour.146.d: "The Germans have closed up to city of Stalingrad and the first Luftwaffe air strikes have begun. The capture of Stalingrad is a major goal of the German plan to cut off the Caucasus and to seize the oil plants of Baku, codenamed 'Fall Blau'. Fierce fighting is expected as the Germans and the Soviets try to wrestle control of the city that bears Stalin's name. No matter which side wins, it will be a terrible fate for the soldiers fighting and the civilians living in the region."
cityflavour.146.a: "The world's eyes are on Stalingrad."
cityflavour.146.b: "We shall capture the city in no time! Paulus will get the job done!"
cityflavour.146.c: "The defenders of Stalingrad stand strong at the Volga river!"

cityflavour.147: "[GetNewsHeadline]Liberation of Stalingrad"
cityflavour.147.t: "[GetNewsHeadline]Liberation of Stalingrad"
cityflavour.147.d: "The Soviet divisions of the Kazakh Front, under Chuikov, have commenced a large-scale offensive against the occupied city of Stalingrad. Soviet forces first encircled the city, and then sent special heavy squads with sniper deatachmets to decimate the Germans. After a siege longer than Stavka expected, all German taken prisoner were sent directly to the Siberian Gulagas and some of them were even killed on their way. [SOV.GetLeader] himself attended a Great Parade on the Main Square that saw the most action during siege. This is surely one of the greatest victories for the Soviet Union, and will definitely turn the tide of the war against the Germans."
cityflavour.147.a: "What a victory!"
cityflavour.147.b: "Scheiße! We are loosing Wolga!"
cityflavour.147.c: "The city of Stalin shall remain Soviet!"

cityflavour.148: "[GetNewsHeadline]Fall of Stalingrad"
cityflavour.148.t: "[GetNewsHeadline]Fall of Stalingrad"
cityflavour.148.d: "The German army in Stalingrad, under Freidrich Paulus, have finally crossed the Volga and pushed the Soviets out of the city. It was, however, a Pyrrhic Victory for the Germans. Both sides took great casualties in the struggle, and are now looking to regroup and reorganise. The gates of the Caucasus now lay wide open for the Germans. However, the fate of the Soviet Union remains to be seen."
cityflavour.148.a: "The Caucasus will fall."
cityflavour.148.b: "A great victory! The Wehrmacht stands on the gates of the oilfields."
cityflavour.148.c: "Shoot every soldier that was defending the city!"

cityflavour.149: "[GetNewsHeadline]Fall of Sverdlovsk"
cityflavour.149.t: "[GetNewsHeadline]Fall of Sverdlovsk"
cityflavour.149.d: "German troops have entered Sverdlovsk, the city widely known as 'Nova Moskva'. The Germans swiftly overran the defenders and have seized one of the last Soviet industiral complexes. It seems that the Soviets will most likely fall to the advancing Wehrmacht, with their last option being to retreat to the Siberian wilderness and to try and hide in the forests. In any case, the downfall of the Union of Soviet Socialist Republics seem to be at hand. The pride and glory of Communism, professed by the Soviets, will most likely die in the coming months, and the German grasp on the world grows ever stronger."
cityflavour.149.a: "The Soviet Union is done for. Dark days lie ahead."
cityflavour.149.b: "Bloshevism shall be removed from the face of Earth!"
cityflavour.149.c: "Tyomnaya Noc..."

cityflavour.150: "[GetNewsHeadline]Liberation of Sverdlovsk"
cityflavour.150.t: "[GetNewsHeadline]Liberation of Sverdlovsk"
cityflavour.150.d: "Soviet armies, under Marshall Zhukov, have managed to carry out a miraculous offensive against the Germans. With help of partisans, the Soviets have liberated the city of Sverdlovsk, now called 'Nova Moskva'. The Germans seem to be totally speechless, for the nation they called "a dead bear" has roared again, ready to reatake its homeland and inflict destruction on the invaders."
cityflavour.150.a: "It's truly impressive, how the Soviets can reorganise!"
cityflavour.150.b: "It can't be!"
cityflavour.150.c: "Onwards to Moscow!"

cityflavour.151: "[GetNewsHeadline]Fall of Odessa"
cityflavour.151.t: "[GetNewsHeadline]Fall of Odessa"
cityflavour.151.d: "The Romanians, with great help from the Germans, have managed to finally conclude the Siege of Odessa, and occupy the city. The Siege lasted for a long time and tied up many Axis forces, preventing them from getting to other parts of the Ostfront. The Romanians commemorated the martyred General Alexandru Ioaniţiu, by naming part of the area in his name. Thanks to the Soviet Black fleet still being in good shape, a lot of heavy equipment and troops were successfully evacuated to fight the Germans another day."
cityflavour.151.a: "The Russians seem to stubborn."
cityflavour.151.b: "The costs of the Crusade may be high but the fruits of victory shall surpass them!"
cityflavour.151.c: "We had our Dunkirk."

cityflavour.152: "[GetNewsHeadline]Liberation of Odessa"
cityflavour.152.t: "[GetNewsHeadline]Liberation of Odessa"
cityflavour.152.d: "The Soviet Southern Troops have managed to smash through the Romanian lines, encircle the city of Odessa and liberate it. Many officials paid their respects to the early defenders of Odessa. The liberation of Odessa has opened the doors to the Balkans, and the Soviet Union is surely planning to expand their influence there. A great victory for the USSR, and a devastating defeat for Romania and the Axis Forces."
cityflavour.152.a: "The Balkans shall fall to Communism!"
cityflavour.152.b: "Hold the Romanian Oil fields at any cost!"
cityflavour.152.c: "Romania shall be next!"

SOV_terror_bomb: "Luftwaffe bombings of Siberia"
SOV_terror_bomb_desc:"Having pushed the Soviets behind the Ural mountains, the Germans have begun a large-scale aerial operation to completely destroy our industrial and military capabilities and to spread terror across the shattered USSR. The Soviet people now live with constant fear of death from the German bombs." 

SOV_terror_bomb_ger: "Unternehmen Stahlregen"
SOV_terror_bomb_ger_desc:"'Unternehmen Stahlregen', first proposed by Luftwaffe chief Hermann Göring, is a well-planned large-scale aerial operation that aims to completely destroy what remains of the USSR after the Crusade. This is an important ideological and tactical mission, but at the same time, it costs us a lot of resources especially fuel. However, thanks to the Oil fields of the Caucasus and the resources of nearly the whole of Russia, we can continue this undertaking for a long time. Hermann Göring speaks very highly about the effectiveness of his Luftwaffe's operation, but the Abwehr reports that the Russians are slowly learning how to defend against our attacks, and we may see a big decrease in Soviet casualities in the future."
operationterrorbomb:"Commence Unternehmen Stahlregen!"

operationterrorraid: "Commence Unternehmen Totes Wasser!"
SOV_terror_raids:"Kriegsmarine raids against our merchant ships"
SOV_terror_raids_desc:"The German Kreigsmarine has started to sink any Soviet ship they can find. They have mastered the art of convoy raiding, and we have nearly no way to defend our convoys as most trade routes lead through German controlled waters. These convoys carry food and supplies necessary for our survival, and our eastern ports cannot supply the whole Union by themselves. As a result, there is a great famine throughout the Soviet Union and the peasants are getting more anxious. It seems like a revolt is on the horizon."
SOV_terror_raids_ger:"Unternehmen Totes Wasser"
SOV_terror_raids_ger_desc:"Großadmiral Dönitz, with the help of the whole Kriegsmarine, has managed to gain full control over Soviet trade routes. Thanks to this development we can sink nearly all Soviet transports, and in effect destroy the surviving Union from the inside. No foreign help will reach the shores of Siberia - Russia shall stand alone!"

