flavourmr.13.t:"[GetNewsHeadline]Stalin is dead!"
flavourmr.13.d:"Reports come form the Soviet Union that thier supreme leader Joseph Stalin has been killed during his evacuation from the besiged Moscow. He was stubborn enough to stay in the besiged city till the end as he belived this would boost up morale, or maybe he just knew that fall of Moscow will mean the end of his reign. When the situation became cirtical his personal guard escorted him form Kremiln bunker to train station where his armored train was waiting. After boarding the train it quickly began rushing through the burning remants of Moscow. Just before the train made it out of the city a pair of German Junkers bombers spotted the it and opened fire. The armor piercing bullets somehow managed to get through the roof of the wagon that Stalin was in. Stalin got hit by two bullets in the chest and stomach. Due to the lack of medical personell Stalin bled out."
flavourmr.13.a:"This is a total disaster! We must fill in the power vaccum before its too late!"
flavourmr.13.b:"We got him! Award the pilots!"
flavourmr.13.c:"The end of a era"


flavourmr.14.t:"The Moscow situation"
flavourmr.14.d:"Germans are very close to our capital - Moscow. Stalin has been advised to leave the city as the rest of the politburo is plannin to do, but deep inside he knows that if he leaves the city now the soldiers morale will be low and, should the city fall, his whole career and life will collapse too. If he will stay in the city it can lead to his death and catasrophic political turmoil as he has no real successor."
flavourmr.14.a:"Stalin remains in Moscow, till the end..."
flavourmr.14.b:"Evacute to Kuybyshev!"


flavourmr.15.t:"The question of Lenins body"
flavourmr.15.d:"The Lenins body is still in Mausoleum. German invaders are qucikly advnacing into our territory and Moscow may soon face aerial bombings. We must decide what to do with the Lenins body. Keeping it on display is a way of maintainig stability among the population but this way we are risking that it can be destroyed or damaged by a bombing. We must decide what to do."
flavourmr.15.a:"Keep the body in Moscow!"
flavourmr.15.b:"Evacute it behind the Urals!"


flavourmr.16.t:"Evacuation form Moscow"
flavourmr.16.d:"After his brave decision to remain in Moscow Stalin is now being evacuated. His presonal guard along the NKVD and Guards elite forces are preparing a safe passage form the bunker system beneath the Kremlin to the secret train station where Stalins personal armored trian is waiting. The question remains.."
flavourmr.16.a:"... Can he make it?"

flavourmr.17.t:"[GetNewsHeadline]Stalin escapes form Moscow!"
flavourmr.17.d:"Reports come form the Soviet Union that thier supreme leader Joseph Stalin has been succesfully evacuated form the besiged Moscow. He was stubborn enough to stay in the besiged city till the end as he belived this would boost up morale, or maybe he just knew that fall of Moscow will mean the end of his reign. When the situation became cirtical his personal guard escorted him form Kremiln bunker to train station where his armored train was waiting. Along the way Stalin had several opportunities where he used his presonal gun to defend himself. The train quickly began rushing through the burning remants of Moscow. Just before the train made it out of the city a pair of German fighters bombers spotted it and opened fire. Their bullets ricocheting from the roof of the wagon that Stalin was in. The two planes were quickly shot down by onborad AA."
flavourmr.17.a:"The great leader and great strategist"
flavourmr.17.b:"Bastard was this close!"
flavourmr.17.c:"The situation is truly dire!"


flavourmr.18.t:"The Stalins last will"
flavourmr.18.d:"A sealed envelope containing Stalins last notes that he made just deciding to stay in Moscow till the end. They were meant to be openeded only after his death and today is this day, Vyacheslav Molotov, Lavrenty Beria, Lazar Kaganovich and finally Kliment Voroshilov have all gathered in the new countrys capital and are waiting for the most unnerving question to be answered, who would it be that Stalin choose to succeed him in his last will?"
flavourmr.18.a:"Vyacheslav Molotov - the negotiator"
flavourmr.18.b:"Lavrenty Beria - the butcher"
flavourmr.18.c:"Lazar Kaganovich - the follower"
flavourmr.18.e:"Kliment Voroshilov - the militarist"


flavourmr.19.t:"Molotovs plan to save Soviet Union"
flavourmr.19.d:"We have fought off the German invaders with all we've got. Tanks, planes and most importantly people. We have lost all of it and most of the major inustrial areas and in the recent days our great leader. People are not happy and the unrest rises with every new wave of conscription. We lack men but more importantly we lack the will to fight. This whole war is a lost cause and only way we can prevent a total collapse of our state is by negotiation with the hated Germans. It is wrong but it is the only way.. We will give up all the land up to AA line excep some major cities in the Transvolga region."
flavourmr.19.a:"Send the proposition to the Reich"

flavourmr.20.t:"Soviets send us a peace deal"
flavourmr.20.d:"After death of Stalin Red army is in total disarray and we are pushing them further and fruther everyday and inflicting some serious casualities. But we take casualities too, and our soldiers are getting tired of this bloody war. We can accept this treaty and get all of land up to AA line except few cities in the Transvolga region that are not that important to our cause."
flavourmr.20.a:"Agree to this terms our soldiers are needed elsewhere"
flavourmr.20.b:"We will talk when we reach the AA line and then who knows!"

flavourmr.21.t:"[GetNewsHeadline]Soviets sign separate peace with Germany!"
flavourmr.21.d:"Today German and Soviet delegations met in occupied Moscow to discuss the possibility of peace. The new chairman - Molotv decided that to save the union from total collapse some sacrifices have to be made. After prolonged negotiations an agreement was reached, Germans get all the lands up to the AA line except major cities in the Transvolga region"
flavourmr.21.a:"Great news!"
flavourmr.21.b:"We did what we had to"
flavourmr.21.c:"Defeatists!"

flavourmr.22.t:"[GetNewsHeadline]German Reich rejects peace talks!"
flavourmr.22.d:"Today German and Soviet delegations met in occupied Moscow to discuss the possibility of peace. The new chairman - Molotv decided that to save the union from total collapse some sacrifices have to be made. When the delegation arrived all of its members were arrested and sent to Lubianka for interrogation. After that Germans cut all contact with the Soviets. This means the war will rage on"
flavourmr.22.a:"We don't negotiate with bolsheviks!"
flavourmr.22.b:"Fascist monsters!"
flavourmr.22.c:"Inhumane war"

flavourmr.23.t:"Chairman Beria"
flavourmr.23.d:"After being choosen by Stalin to succeed him Beria announced to do antything to get revenge on the German invaders even if it means waging total war and retreating behind Urals. 'When we march through Berlin they will see what Stalins revange means!' he said in his speech"
flavourmr.23.a:"Increase the NKVD presence on the battlefield and behind enemy lines!"

flavourmr.24.t:"Chairman Kaganovich"
flavourmr.24.d:"After being choosen by Stalin to succeed him Kaganovich announced to continue the Stalins plans in terms of winning the war. He plans to immortalize Stalin and make him an icon of Soviet resistance against the German invaders"
flavourmr.24.a:"Tovarish Stalin lives in our hearts!"

flavourmr.25.t:"Chairman Voroshilov"
flavourmr.25.d:"After being choosen by Stalin to succeed him Voroshilov announced to beef up the Soviet war economy and totally redesing the command system allowing generals for more freedom on the battlefield. This change is already showing its impact on the battles as we are slowly regaining initiative"
flavourmr.25.a:"The modern art of war"

flavourmr.26.t:"We have reached the AA line!"
flavourmr.26.d:"After a long time of battles, offensives and counteroffensives now here we stand, controlling all of our strategic objectives in Russia. We can send Soviets a peace propostition or push further to the Urals to secure our grip over whole European Russia. It will cost much more lives of our soldiers but our grip will be more firm"
flavourmr.26.a:"Send Russians the peace offer!"
flavourmr.26.b:"We will capture the Urals!"

flavourmr.27.t:"Demands from Germany!"
flavourmr.27.d:"After a long many many battles, offensives and counteroffensives now here we stand, beaten and crippled by the German armies,  they control the main cities in European Russia and we are in no position to retake them. We can accept the peace treaty, keep some land in Europe and achieve peace. In theory we can keep the fight up till the Urals and then, who knows"
flavourmr.27.a:"We should accept the treaty and rebuild our fractured contry"
flavourmr.27.b:"No deals with fascists!"

flavourmr.28.t:"Soviets accept the peace"
flavourmr.28.d:"Soviets accepted the peace terms, now we control the majority of European Russia with all of its resources and manpower. We can use it to totally reshape Europe and in future maybe even the whole world! One is certain the bolshevik threat was dealt with and 1000 year Reich is secure "
flavourmr.28.a:"Deutschland siegt an allen fronten!"

flavourmr.29.t:"Soviets reject the peace"
flavourmr.29.d:"Soviets rejected the peace terms, they chose to fight till the end. This only prolongs this already won war and will most likely cost many more unnecessary losses of our brave boys.This barbaric nation does not want peace!"
flavourmr.29.a:"Verdammte mongolische horden!"

flavourmr.32.t:"We have reached the border of Europe"
flavourmr.32.d:"Toady our first Gebris divisionen reached the Ural peaks and now can observe the vast lands behind this so called 'border of Europe'. Here we stand in fornt of a vital decision, should we call out current achivements a total victory and end this war here or maybe march on beyond the urals and to fully destroy the Soviet state and Bolshevism once and for all!"
flavourmr.32.a:"End this conflict, Bolsheviks are defeated for good already"
flavourmr.32.b:"Push further until we reach China!"

flavourmr.30.t:"[GetNewsHeadline]German Reich wins the war in the east"
flavourmr.30.d:"After reaching its strategic goals German Reich managed to take full control over European areas of Russia totally crippling the Soviet state and forcing it to surrender. Massive parades and celebrations are being held in all major former soviet cities. The biggest parade is in, now the heart of Europe - Berlin. Great shining panzer columns move along the city, soldiers proudly saluting their commanders watching them from above. There is also a exhibition of captured equipment like T-34 tanks accompanied by a few of the heavier ones like KV-1s and KV-2s. Hitler in his speech during the event said that bolshevism was finally destroyed and Germany achieved its destiny."
flavourmr.30.a:"Der Bolschewismus wurde endgültig besiegt!"
flavourmr.30.b:"We lost everything"
flavourmr.30.c:"Russia is lost"


flavourmr.31.t:"[GetNewsHeadline]Soviets fight on"
flavourmr.31.d:"After reaching its strategic goals German Reich managed to take full control over European areas of Russia totally crippling the Soviet state and as everybody assumed forced it to surrender. This however did not happen. Soviet forces managed to reorganise, and miraculously managed to perform a few counter offensives in response to German peace offers. The partisan activity is stronger than ever  and Soviets are getting some major help form the allies to help them in their fight."
flavourmr.31.a:"Hartnäckige Mongolen!"
flavourmr.31.b:"We shall liberate Moscow and then take Berlin!"
flavourmr.31.c:"Brave move"


flavourmr.33.t:"[GetNewsHeadline]Germans cross the Urals"
flavourmr.33.d:"After Germans reached the Ural mountains the whole world held its breath waiting for the Reichs next move and the worst perdictions turned out true. The Reich decided to push furhter into the Siberian wilderness chasing the remants of the Red Army. The logistical challange of this operation is the biggest one in whole history as Reich now needs to supply its soldiers few thousand kilometers from their mainland under constant logistical partisan strikes. We will see the outcome within the next few months"
flavourmr.33.a:"Vorwats! Drive these barbarians into the Siberia"
flavourmr.33.b:"We will kill them all!"
flavourmr.33.c:"The don't know where to stop!"


flavourmr.34.t:"[GetNewsHeadline]Germans cross the Englih Channel"
flavourmr.34.d:"After a long and fierce air and naval battle for Britain Germany managed to achive enough superiority to commence operation Sea Lion. The preparations for landings began a week ago with a powerful and swift bombing campagin of British frotifications on the beaches. Toady after a bloody fight on the beaches and in the streets, first German divisions managed to assert control over ports thus enabling them to send in reinforcements need to solidify their positions and continue the invasion. United States issued an diplomatic ultimatum to Germany threatening to join the war if Germany does not step down."
flavourmr.34.a:"We will crush the stubborn brits!"
flavourmr.34.b:"Jhonny get Your gun!"
flavourmr.34.c:"Mobilize the home guard fast!"
flavourmr.34.e:"Incredible times we live in indeed!"


flavourmr.35.t:"[GetNewsHeadline]The Yankes are coming!"
flavourmr.35.d:"Following the invasion of British Isles, American Government decided to interve in the European affairs once more and declared war on Germany and its allies. First American divisions are now being prepared to cross the Atlantic and join their Angloshpere comrades in this struggle against nazism"
flavourmr.35.a:"Goddamn Americans!"
flavourmr.35.b:"Over there!"
flavourmr.35.c:"The giant wakes!"



flavourmr.36.t:"German peace offer"
flavourmr.36.d:"After total collapse of the United Kingdom followed by Axis powers seizing most of the strategically important targets in Europe and Africa, with collapse of the Soviet Union and finally with German offensive in Africa being a total success we have no choice but to give up to their terms. At this point only lose men as Axis positions are heavily fortified. Let our boys go back home to their families. We have lost, maybe we joind the fray too late, the history will judge us..."
flavourmr.36.a:"Sign it there is no other way"
flavourmr.36.b:"There is still hope! "

flavourmr.38.t:"Americans reject the peace offer!"
flavourmr.38.d:"Americans rejected our generous peace offer! This is outrageous! The only way to end this war is to perform a successful landing in the states, that in practice equals to landing on the moon! If we want to win this war we better start investing in long range missiles and bombers, ramp up  Nuclear research to finally achieve an edge over the Americans!"
flavourmr.38.a:"Stubborn fools!"


flavourmr.43.t:"Question of Moscow metro partisans"
flavourmr.43.d:"There are many partisans hiding in the depths of Moscow metro and the metro itself is totally inaccesable to us due to heavy resistance inside. Apart form resistance fighters there are thousands of civilians inside that are willingly or not staying there. SS proposed to gas the metro to avoid damaging it for future colonizers. This could lead to massive international outrage if this information gets out. On the other hand we can detonate charges in some key areas to allow the flow of river water into the metro. We could frame it as a accident. Drying up the metro will take some time and resoruces tho."
flavourmr.43.a:"Flood it!"
flavourmr.43.b:"Gas it!"


flavourmr.37.t:"[GetNewsHeadline]Axis powers win the war with Allies"
flavourmr.37.d:"After total collapse of the United Kingdom followed by Axis powers seizing most of the strategically important targets in Europe and Africa, with collapse of the Soviet Union and finally with German offensive in Africa being a total success United States of America decided to sign a peace treaty. The delegations met in Azores Islands and signed the treaty that ultimately leaves Europe to German hegemony.There are massive celebrations in the Reich that will span for antoher month and this date will be forever commemorated in the Reich!"

flavourmr.37.a:"Sieg Heil Victoria"
flavourmr.37.b:"We lost Europe..."
flavourmr.37.c:"The new order arises..."

flavourmr.44.t:"[GetNewsHeadline]Germans gas the Moscow metro!"
flavourmr.44.d:"Today the unthinkable happend, even considering the bloodines of the war in the east today the brutalness reached its maximum. With the decision coming form Hitler himself Germans decided to gas the Moscow metro that was inhabited by thousands of civilians. The silent death killed nearly everyone inside with only a few managing to run out of the metro and not getting shot by the German SS waiting outside."

flavourmr.44.a:"Scheise! Who leaked this!"
flavourmr.44.b:"Fascist monsters!"
flavourmr.44.c:"They are war criminals.."



flavourmr.39.t:"[GetNewsHeadline]Beria choosen as Stalins sucessor!"
flavourmr.39.d:"Following the unexpected death of Stalin Soviet Union political sphere fell into total chaos and its armies were in total disarray. Today everything is going to chagne as in Stalins last will he chose a sucessor from within of his inner circle."

flavourmr.39.a:"One more bolshevik to kill!"
flavourmr.39.b:"Long live Beria!"
flavourmr.39.c:"New face of communism"

flavourmr.40.t:"[GetNewsHeadline]Voroshilov choosen as Stalins sucessor!"
flavourmr.40.d:"Following the unexpected death of Stalin Soviet Union political sphere fell into total chaos and its armies were in total disarray. Today everything is going to chagne as in Stalins last will he chose a sucessor from within of his inner circle."

flavourmr.40.a:"One more bolshevik to kill!"
flavourmr.40.b:"Long live Voroshilov!"
flavourmr.40.c:"New face of communism"

flavourmr.41.t:"[GetNewsHeadline]Molotov choosen as Stalins sucessor!"
flavourmr.41.d:"Following the unexpected death of Stalin Soviet Union political sphere fell into total chaos and its armies were in total disarray. Today everything is going to chagne as in Stalins last will he chose a sucessor from within of his inner circle."

flavourmr.41.a:"One more bolshevik to kill!"
flavourmr.41.b:"Long live Molotov!"
flavourmr.41.c:"New face of communism"

flavourmr.42.t:"[GetNewsHeadline]Kaganovich choosen as Stalins sucessor!"
flavourmr.42.d:"Following the unexpected death of Stalin Soviet Union political sphere fell into total chaos and its armies were in total disarray. Today everything is going to chagne as in Stalins last will he chose a sucessor from within of his inner circle."

flavourmr.42.a:"One more bolshevik to kill!"
flavourmr.42.b:"Long live Kaganovich!"
flavourmr.42.c:"New face of communism"

