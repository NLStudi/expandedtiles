umcflavour.5:"China has fallen!"
umcflavour.5.t:"China has fallen!"
umcflavour.5.d:"Despite our great effort to help China in stopping the Japanese invasion we've failed. Now Japan is one of the strongest powers in Asia and we must reaproach them in the light of their victory. Our colonies now directly border the Japanese Empire and are more vulnerable than ever. We can make a deal with Japan by offer them recognition of their territorial gains in exchange for a buffer zone inbetween our two empires. We must be careful not to push our demands too far as it may result in a major land war in Asia"
umcflavour.5.a:"Just recognize their gains and don't provoke them"
umcflavour.5.b:"Send them our demands"
umcflavour.5.c:"Invade Sinkiang!"
umcflavour.5.e:"Why would we bother"

umcflavour.6:"England send its demands!"
umcflavour.6.t:"England send its demands!"
umcflavour.6.d:"England sent us a list of demands that if we accept them they will recognize all of our territorial gains in China. This is a good sign as the westerners seem to finally recognize us a major world power, there is a problem however, westerners want a large portion of southern China, namely the costline from Indochina all the way to french Fort Bayard, that including the island of Kainan. The british demand the whole Pearl river, with its resources and powerful industy. We can try to negotiatie better terms but we may risk a war with the west"
umcflavour.6.a:"Accept their terms peace is more important than some industry"
umcflavour.6.b:"There is no way we are accepting this!"
umcflavour.6.c:"There is no way we are accepting this in its current form!"

umcflavour.7:"England demands our withdrawl from China!"
umcflavour.7.t:"England demands our withdrawl from China!"
umcflavour.7.d:"England send us a ultimatum! They demand our total withdrawl from China but they allow us to keep contorl over most of the ports and pre Sino-Japanese war terriotries, that should ensure Chinese economic dependency on us. However it will greatly damage our prestige and position in Asia not to mention all the losses we have suffered!"
umcflavour.7.a:"Our prestige is less important than peace!"
umcflavour.7.b:"They are bluffing!"

umcflavour.8:"Japan accepted our terms"
umcflavour.8.t:"Japan accepted our terms"
umcflavour.8.d:"Japanese foreing minister has signed the agreement now known as The Treaty of Hong Kong. Japan will transfer the southern territories mostly in the Guanxi region including the two biggest cities of the region, namley Guangzhou and Nanning that will go to Britain and France respectivley."
umcflavour.8.a:"Great! Where is my whisky?"

umcflavour.9:"Japan rejected our terms"
umcflavour.9.t:"Japan rejected our terms"
umcflavour.9.d:"Japan made it clear that they won't give up any land in China even if it may lead to a war with us. We can either push forward and declare war but that will have catastrophic consequences as Japanese army is the strongest force in Asia at the moment. Doing this will surely force us out of any war in Europe. We can simply accept the facts and let Japan keep its newly obtain colony"
umcflavour.9.a:"Let them choke on it!"
umcflavour.9.b:"We never leave our allies in need!"

umcflavour.10:"Japan presented us new terms"
umcflavour.10.t:"Japan presented us new terms"
umcflavour.10.d:"Japan gave us a modified set of our demands. They greatly reduced the size of land they are willing to give us but it should be sufficent to ensure stability in our colonies."
umcflavour.10.a:"Thats a good deal!"
umcflavour.10.b:"Our original demands stand!"

umcflavour.11:"Situation with west stabilizes"
umcflavour.11.t:"Situation with west stabilizes"
umcflavour.11.d:"The west is no longer interested in our gains in China. We will dominate whole Asia and later whole Pacific!"
umcflavour.11.a:"Banzai!"


umcflavour.12:"The fate of China"
umcflavour.12.t:"The fate of China"
umcflavour.12.d:"With our great victory in China came a lot of new provinces for our Empire. We must decide wheather to disband China as much as possible to better keep it in our fold or to create a strong united Chinese puppet that will help us in our future military affairs on the continent"
umcflavour.12.a:"China must be weakend as much as possible! They are our colony!"
umcflavour.12.b:"We must create a loyal puppet!"

umcflavour.13:"Soviets invade Sinkiang!"
umcflavour.13.t:"Soviets invade Sinkiang!"
umcflavour.13.d:"Following the fall of China Soviets decided to invade the farthest province of China- Sinkiang! We must decide carefully what to do about that as we may spark a war with the USSR"
umcflavour.13.a:"Propose to create a neutral zone of the rest of Sinkiang"
umcflavour.13.b:"Mobilize our forces and launch an invasion of Sinkiang!"
umcflavour.13.c:"Let them have this meaningless territory"

umcflavour.14:"USSR stays neutral"
umcflavour.14.t:"USSR stays neutral"
umcflavour.14.d:"Soviets are not interested in China to risk a war. We may have overestimated their abilites."
umcflavour.14.a:"Great!"

umcflavour.15:"Japan proposes the creation of neutral zone in Sinkiang"
umcflavour.15.t:"Japan proposes the creation of neutral zone in Sinkiang"
umcflavour.15.d:"Japan proposes the creation of neutral zone in Sinkiang. We can keep our current gains but the rest of Sinkiang shall stay independetnt"
umcflavour.15.a:"We don't need a war with Japan"

umcflavour.16:"Japan launched an intervention!"
umcflavour.16.t:"Japan launched an intervention!"
umcflavour.16.d:"Japanese decided to launch an intervention into Sinkiang and managed to take the whole south. We can just accept the split or push forward and risk a war"
umcflavour.16.a:"We are not interested in Sinkiang as a whole"
umcflavour.16.b:"Crush them!"

umcflavour.17:"Japan does not interevene"
umcflavour.17.t:"Japan does not interevene"
umcflavour.17.d:"Japan decided not to intervene in our invasion of Sinkiang and we can easily take the rest now"
umcflavour.17.a:"Vperyod!"


umcflavour.18:"Report from the front"
umcflavour.18.t:"Report from the front"
umcflavour.18.d:"This war is taking more and more casualities and the fact that there was no offical war declaration is slowly damaging our prestige. We must decide to either continue this struggle or to stop the hostilites"
umcflavour.18.a:"We must have peace"
umcflavour.18.b:"We will only stop in Tokyo!"

umcflavourevents.2:"Russo-Japanese clashes in Asia!"
umcflavourevents.2.t:"Russo-Japanese clashes in Asia!
umcflavourevents.2.d:"Soviets and Japanese are now clashing all along their border with some minor advancements being made. However there was no official war declaration and the war is not in a full scale at least for now. It all started with the Soviet invasion in Sinkiang and the later Japanese intervention that escalated quickly"
umcflavourevents.2.a:"Blood in the east"
umcflavourevents.2.c:"Goddamn Samurais!"
umcflavourevents.2.b:"Sinkiang is part of our Empire!"

umcflavourevents.3:"Russo-Japanese armistice!"
umcflavourevents.3.t:"Russo-Japanese armistice!
umcflavourevents.3.d:"Soviets and Japanese have decided to stop all the hostilities. The delegations met in Sikiang where it all started and signed a peace treaty. There is no real winner of this conflict"
umcflavourevents.3.a:"Bloodshed stooped"
umcflavourevents.3.b:"We did our best"
umcflavourevents.3.b:"This is a great hit to our honor"

umcflavourevents.4:"Second Russo-Japanese war!"
umcflavourevents.4.t:"Second Russo-Japanese war!
umcflavourevents.4.d:"After over a month of clashes along the border the situation in Asia turned into a total war! Japanese are launching aerial and naval attack targeted at Vladivostok and other port cities in Soviet far east, the battle od Sakhalin already began and took its toll. It seem that this war will be as bloody as the first Russo-Japanese war"
umcflavourevents.4.a:"Even more bloodshed"
umcflavourevents.4.b:"We will crush the enemy!"
umcflavourevents.4.b:"Banzai!"

war_in_asia_idea:"War in Asia"
JAP_offensive:"Japanese surpirise attack!"
Subject_of_samurai:"Subject of Samurai"
Subject_of_samurai_desc:"This country is totally dependent on the Empire of Japan both economically and politically"

Parnter_of_samurai:"Partner of Samurai"
Parnter_of_samurai_desc:"This country is lightly dependent on the Empire of Japan both economically and politically. It is more of a equal relation"
