umcflavourevents.29.t:"Counteroffensive?"
umcflavourevents.29.d:"We managed to stop the Hungarian advance into Slovakia at the river Uzh. Hungarian forces are in disarray and we can sieze this vulnerability to possbily retake whole Carpathia. This however will be costly and highly risky"
umcflavourevents.29.a:"We will liberate our land!"
umcflavourevents.29.b:"We should request support from Germany"
umcflavourevents.29.c:"We already achieved a lot don't risk it"


umcflavourevents.30.t:"Hungarian victory at the river Uzh!"
umcflavourevents.30.d:"Hungarian forces have managed to hold their lines and stop Slovakian counteroffensive. There are many dead."
umcflavourevents.30.a:"We saved our prestige!"
umcflavourevents.30.b:"Thats devastating!"


umcflavourevents.31.t:"Hungarian humaliation at the river Uzh!"
umcflavourevents.31.d:"Hungarian forces couldn't hold against Slovak advance. Slovak forces quickly crossed the Uzh river and pushed the disorganized Hungarian forces out of Carpathia. It is rumored that Slovakia was helped by Germany with equipment and military expertise."
umcflavourevents.31.a:"How is this even possible!?"
umcflavourevents.31.b:"Our nation is finally reborn!"



umcflavourevents.32.t:"Stalemate at the river Uzh!"
umcflavourevents.32.d:"Slovak forces couldn't achive a breakthrough on Hungarian lines. After Hungarian reinforcements arrived they mangaed to stabilize the front. After prolonged shelling conducted by both sides they decided to negotiate. The borded did not change at all."
umcflavourevents.32.a:"Good!"
umcflavourevents.32.b:"At least we tried"

umcflavourevents.33.t:"[GetNewsHeadline]Slovak miracle at the river Uzh!"
umcflavourevents.33.d:"For a few days now Slovak and Hungarian forces clashed for some strategically important land in Carpathian mountains. Hungarian forces couldn't achive a breakthrough on Slovak lines and quickly exhausted their forces trying to capture the town of Sobrance. After Slovak reinforcements from Bohemia arrived and were joined by some of the former Czech troops they mangaed to achieve double numerical superiority and in a major counteroffensive push the Hungarians all the way back to Mukacevo. That put the whole southern Slovakia that is occupied by Hungary in great danger and forced Hungarian side to negotiate. Carpatho Ukraine is back in Slovak hands and Hungarian presige is totally devastated."
umcflavourevents.33.a:"Shocking news!"

USFO_sendadvisors:"We will send §8military advisors and equimpment§!, if the side we support manages to §Gwin§! we will get some §7army experience§! and §9trade influence§!"


umcflavourevents.34.t:"Letter from Slovakia"
umcflavourevents.34.d:"Slovak government asked us to respond to the recent Hungarian aggresive actions against their state. They managed to halt Hungarian advance on their own. We promised them protection after the dissolution of Czechoslovakia so in theory we are obliged to help them. On the other hand do we really want to risk a war with our possible ally in balkans which is Hungary?"
umcflavourevents.34.a:"Send them equipment annd adivsors!"
umcflavourevents.34.b:"We won't destabilize the situation in the region any further!"
umcflavourevents.34.c:"Hungary was the one to break the protection treaty! Vorwarts nach Budapest!"


umcflavourevents.35.t:"Germans send equipment and advisors!"
umcflavourevents.35.d:"Our German allies sent us some necessary equipment to help us win this conflict!"
umcflavourevents.35.a:"Mukacevo will soon be back!"



umcflavourevents.36.t:"Germans don't want to be involved"
umcflavourevents.36.d:"Our German allies told us that they don't want to destabilize the situation in region any further and sent us nothing!"
umcflavourevents.36.a:"Fine We will do it ourselves!"
umcflavourevents.36.b:"The risk is too high"


umcflavourevents.37.t:"[GetNewsHeadline]Germany intervention in Slovak-Hungarian War!"
umcflavourevents.37.d:"For a few days now Slovak and Hungarian forces clashed for some strategically important land in Carpathian mountains. Hungarian forces couldn't achive a breakthrough on Slovak lines and quickly exhausted their forces trying to capture the town of Sobrance. Slovakia asked Germany to fulfill their protection guarantees and thats exactly what they did. This morning hundreds of German bombers started massive bombardments of major Hungarian towns and strategic complexes. Slovakian troops are said to have crossed the border and enter Southern Carpathians. In many villages Hunagrian flags are being torn down and replaced with Slovak ones. Hungarian ambitions of greatness were cut short."
umcflavourevents.37.a:"We protect our allies!"
umcflavourevents.37.b:"We will destroy those goddamn imperialists!"
umcflavourevents.37.c:"Hungarys darkest hour!"
umcflavourevents.37.e:"Our brothers will die!"
umcflavourevents.37.f:"Blood in the Carpathians!"



umcflavourevents.38.t:"An opportunity"
umcflavourevents.38.d:"Our hated neighbour to the north - Hungary is at the brink of total collapse. If we want to retake our lost land  we must act quickly!"
umcflavourevents.38.a:"Commence invasion!"
umcflavourevents.38.b:"The risk is too high"

scramble_for_ant:"§CScramble for Antarctica has begun§!"


rem_germany_expanded.11.t:"The question of Ödenburg (Sopron)"
rem_germany_expanded.11.d:"Now that we have fully integrated Ostmark we must decide what to do with Ödenburg a city that was ripped from our Vaterland after the last Weltkrieg. City has a large German population and lies in hands of our possible ally - Hungary. Is it really worth antagonizing them just to unite the German volk?"
rem_germany_expanded.11.a:"Ödenburg will be back in Vaterland! Send the ultimatum!"
rem_germany_expanded.11.b:"It's better to have an ally than another enemy in the Balkans"



rem_germany_expanded.12.t:"German ultimatum regarding Sopron"
rem_germany_expanded.12.d:"Not fulfilled with recent annexation of Austria Germans sent us a ultimatum to hand them over the city of Sopron (Ödenburg) and surrounding regions. The city has a large population of Germans but most of it's population is Hungarian. If we give this land back we will lose lots of prestige, refusing to give it will most likely result in German invasion which we cannot withstand"
rem_germany_expanded.12.a:"Sopron shall become Ödenburg.."
rem_germany_expanded.12.b:"Sopron shall remain with us!"


rem_germany_expanded.13.t:"Ödenburg is back in Vaterland!"
rem_germany_expanded.13.d:"Hungarian government handed us over the city Ödenburg and all of the surrounding areas, the German volk is once again united! Our hold in the balkans only grows stronger!"
rem_germany_expanded.13.a:"Willkommen zurück im Vaterland!"


rem_germany_expanded.14.t:"Hungarians refuse to give Ödenburg back!"
rem_germany_expanded.14.d:"Hungarian government declined our demand to hand us over Ödenburg! This is outrageous! OKH is already drawing up invasion plans to quickly bring Hungary into our grip and secure its vast oil resources. This may spark a major unrest in the Balkans and possibly in the West even. Ribbentropp suggest we back down but Generalfeldmarschall Göring suggests we crush Ungarn "
rem_germany_expanded.14.a:"Approve the invasion plans and commence as soon as possible!"
rem_germany_expanded.14.b:"Ribbentropp is right it's not worth it.."

GER_uboot_base:"\n Establish Uboot bases"
GER_uboot_base_desc:"Now that we are expanding our Uboot fleet we must ensure that they have a realible bases to operate from. As our conquers progress we must make sure to develop reinforced bases for our wolf packs to rest and preapare in."

USFO_ubootbaseflav:"Allows establishment of §CUboot bases§! all around the Reich controlled shores."


rem_germany_expanded.15.t:"Operation Weserübung"
rem_germany_expanded.15.d:"Operation Weserübung is our plan to secure Scandinavia. There are two main objectives - establishing bases for the Kriegsmarine in the northern ports and securing access to tungsten and chromium ore form Sweden. In order to maintain our trade with Sweden have to secure the northern Norwegian railway near Narvik. Sweden could be a useful ally during the invasion of USSR, but they still are a democratic regime and may ally with the west in the future endangering our vital ore supply. Also leasing the port of Gotenborg would be a perfect support to our conquest of Norway and control over the Danish straits."
rem_germany_expanded.15.a:"Invade Norway and Denmark, Sweden is our ally"
rem_germany_expanded.15.b:"Invade Norway and Denmark, demand direct control over Swedish mines and Gotenborg port"
rem_germany_expanded.15.c:"Invade Norway, Denmark and Sweden. This ore is too valuable!"




rem_germany_expanded.16.t:"Demands form Berlin"
rem_germany_expanded.16.d:"Germans just launched a full scaled invasion of our Scandinavian neighbours - Norway and Denmark. Just a few hours before first bombs Oslo and Copenhagen German ambassador in Stockholm handed us a demand list including leasing Kriegsmarine port of Gotenborg and letting German companies administer our mines in the north. These mines are vital to our economy and export but by rejecting this offer we may find ourselves in the same situation as our neighbours."
rem_germany_expanded.16.a:"We shall fight alongside our brothers!"
rem_germany_expanded.16.b:"Accept their demands..."


rem_germany_expanded.17.t:"Sweden rejects!"
rem_germany_expanded.17.d:"Sweden rejected our demands and cut ties with our country! This is outrageous! We must act quickly thankfully OKH had already drawn plans for invasion of this ungrateful state."
rem_germany_expanded.17.a:"Commence the operation"
rem_germany_expanded.17.b:"Not really worth it"

rem_germany_expanded.18.t:"Sweden accepts!"
rem_germany_expanded.18.d:"Sweden accepted our demands and allowed us to govern their mines in the north, first shipments are expected to arrive soon. Also the port of Gotenborg is in our hands and thus our conquest will be far more swift. The only thing we still have to decide is wheater we want to push the Swedes any further in terms of resources, they have plenty of them and they could really help out our industry."
rem_germany_expanded.18.a:"Just take what we agreed on"
rem_germany_expanded.18.b:"Take all of their tungsten mines in ther north"
rem_germany_expanded.18.c:"Take control of all the mines and other resources in the north"

