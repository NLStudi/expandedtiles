flavourmr.4:"Mobilizing the Moskva Defenders"
flavourmr.4.t:"Mobilizing the Moskva Defenders"
flavourmr.4.d:"Every citizen of Moskva is from now on a soldier of the Red Army and shall fight like one. Like many times in our history  Moskva shall stand no matter what! Students from Moskva universities shall help as engineering support to our proletariat divisions."
flavourmr.4.a:"Moskva za nami!"
flavourmr.5:"Mobilizing the Leningrad Defenders"
flavourmr.5.t:"Mobilizing the Leningrad Defenders"
flavourmr.5.d:"Every citizen of Leningrad is from now on a soldier of the Red Army and shall fight like one. As Stalins order states there will be no evacuation of civilians form the city, they will either defend it or die trying. The birthplace of revolution shall withstand!"
flavourmr.5.a:"Lenin is young again and the battle is on!"
flavourmr.6:"Mobilizing the Stalingrad Defenders"
flavourmr.6.t:"Mobilizing the Stalingrad Defenders"
flavourmr.6.d:"Every citizen of Stalingrad is form now on a soldier of the Red Army and shall fight like one! Stalingrad the city of our glorious lead Joseph Stalin is under attack! No a single German soldier can cross the Volga!"
flavourmr.6.a:"Za Stalina!"
flavourmr.7:"Germans are close to Krym!"
flavourmr.7.t:"Germans are close to Krym!"
flavourmr.7.d:"Germans are very close to Sevastopol! We must mobilize the local Red fleet units into regural army and face the invader!"
flavourmr.7.a:"For the glory of Red Fleet!"
flavourmr.8:"Zhukov asks for more units to commence the counter-offensive"
flavourmr.8.t:"Zhukov asks for more units to commence the counter-offensive"
flavourmr.8.d:"With winter upon us we must quickly mobilize as many troops as possible to increase our offensive power and drive the Germans back as far as we can! We can either use only the local reserves or pull the Siberian elite reserves, that will however mean that we are exposing our far east to a potential Japanese attack. We must decide!"
flavourmr.8.a:"We shall use only the local reserves Japanese cannot be trusted"
flavourmr.8.b:"This may be the decisive moment of this war! Use all the available reserves!"
flavourmr.9:"Enemy in the Far East!"
flavourmr.9.t:"Enemy in the Far East!"
flavourmr.9.d:"Our old foe came back to his backstabbing ways, Japanese are attacking our exposed lands!"
flavourmr.9.a:"Deploy the Siberian elite! The Samurais shall regret even thinking about this invasion!"
flavourmr.9.b:"We don't have any more reserves!"
ResKremover.1:"German Soviet commercial trade agreement"
ResKremover.1.t:"German Soviet commercial trade agreement"
ResKremover.1.d:"With our constantly imporving relations with the Soviets, we can possibly arrange a commercial trade agreement for resources we lack the most, namely oil, grain and some rare raw materials in exchange for a loan in Reichsmark and some support with expanding the Red fleet. Molotov already sent us a proposition. It may seem like helping our ultimate enemy out but we have to destroy allies first, this is also a great distraction for Soviets so when we attack they won't see it coming."
ResKremover.1.a:"Great idea let us sign this agreement"
ResKremover.1.b:"We will not support or sponsor Bolsheviks in any way!"
