SOV_ssrplus_territorial_burgenland_austria:"The fate of Burgenland"
map_events.8.t:"The question of Polish border"
map_events.8.d:"Polish eastern border is still an open question. Now that we are fully securing our grip over the eastern Europe we must decide what to do to ensure longlasting stability. We can keep the borders as they are now keeping some of core polish areas like Zamost and Bialystok, alternatively we can draw Polish broder along the Bug river(HISTORICAL). Some of the Polish communists are begging us to keep the city of Lvov in Polish borders as it serves as a symbol for the people. The more extreme requests mention the city of Grodno"
map_events.8.a:"Give them land up to Bug river"
map_events.8.b:"Grant them their beloved city of Lwow"
map_events.8.c:"Lets appease poles as much as we can, they suffered to much"
map_events.8.e:"Remember that they were against us before the war! Give them nothing!"


ssrplus.1.c:"Split Silesia between Czechs and Poles, let Poles keep the rest"
ssrplus.1.e:"Split Silesia and West Prussia between Germans and Poles"
ssrplus.1.f:"Split Silesia between Czechs and Poles, split West Prussia between Germans and Poles"



map_events.9.t:"The question of Gdansk"
map_events.9.d:"The city of Gdansk is a key to controlling the Baltic sea. We can keep control over it but since it is a symbol for the Polish people and keeping it may destabilize their govenrment."
map_events.9.a:"Give it to Poland"
map_events.9.b:"Expand our naval base of Kaliningrad but give Poles the city"
map_events.9.c:"We will secure the city as an expansion to Kaliningrad!"

map_events.10.t:"The question of Burgenland"
map_events.10.d:"The area of Burgenland is disputed between Austria and Hungary. There is a significant Hungarian minority in the city but originally city was under Austrian administartion."
map_events.10.a:"Give it to Hungary"
map_events.10.b:"Give it to Austria"


Bombingraids.7.t:"Strategic bombing campagin in Caucasus was succesful!"
Bombingraids.7.d:"Last allied bombing campagin was a total success and we have managed to temporarily destroy the oil fields of Baku and cause German oil supply to plummet."
Bombingraids.7.a:"Curse those filthy capitalists!"
Bombingraids.7.b:"We did it again boys!"



Bombingraids.8.t:"Baku oil fields are operational again "
Bombingraids.8.d:"Last allied bombing campagin left the baku oil fields in shambles. Through some great effor our enemies mamaged to rebuild it and the oil is now flowing again."
Bombingraids.8.a:"The allies can't stop us!"
Bombingraids.8.b:"They won't use it for long!"


Bombingraids.9.t:"We were bombed by the allies"
Bombingraids.9.d:"Our city of Baku and nerby oil fields, vital to our economy, were bombed by allied bombers today. The civilian casualities are not yet fully counted but the number is high. We have to start a long rebuilding project. This will definitely hit our economy significantly"
Bombingraids.9.a:"Demand a formal apology and compensation!"
Bombingraids.9.b:"This is it! Time to end this bourgeoisie scum!"


allies_expandedtt.1:"We will join a military alliance with the [SOV.GetName], we will be able to commence major offensives together"
allies_expandedtt.2:"We will join a military alliance with the [GER.GetName], we will be able to commence major offensives together"
BAKU_destroyed_GER:"Baku oil fields burning"










umcflavour.19.t:"Germans have curshed the Soviets in the west"
umcflavour.19.d:"The German army managed to crush the Soviets in their campagin in the west. This significantly weakend the Russian bear and opened many opportunities for us. Our intelligence suggests that we can strike across Amur river without any major consequences. We are preety much just finishing them off at this point"
umcflavour.19.a:"Commence attack on a limited scale"
umcflavour.19.b:"Launch a major scale invasion of the far east!"
umcflavour.19.c:"Launch a full scale invasion of the far east and march on Irkutsk!"




umcflavour.20.t:"Alarming report from the far east"
umcflavour.20.d:"For a few days our border guards observed some movements on the Japanese side of Amur river, but since our main efforts were concentrated on stopping the German menace in the west we did not mobilize defences there. Now the Japanese army has marched into our exposed lands entrenched there. They are clearely awaiting a reaction from us. We can demand their withdrawl or just leave them be. Alternatively we can launch a full scale counteroffensive but fighting a two front war may be disastarous."
umcflavour.20.a:"We can't afford managing another front"
umcflavour.20.b:"Demand their immediate withdrawl behind the Amur!"
umcflavour.20.c:"This is it the Samurais will get whats coming to them!"


umcflavour.21.t:"Russian bear sleeps"
umcflavour.21.d:"Soviets did not react to our invasion of the far east. This only solidifies our control over the region. Some of our generals suggest we should push for more land but is it really necessary?"
umcflavour.21.a:"Tell them to be content with what we have"
umcflavour.21.b:"Tell them to do what they see fit"



umcflavour.22.t:"Soviets ask for our immediate withdrawl behind Amur"
umcflavour.22.d:"Soviets sent us a official letter demanding our immediate withrawl to the original borders. They say the alternative is full scale war. Some of our general staff calls it a bluff but  intelligence noticed some major troop movements to our border"
umcflavour.22.a:"The are clearly bluffing!"
umcflavour.22.b:"We may have ouverstayed our welcome"


umcflavour.23.t:"Victory in the east!"
umcflavour.23.d:"We have managed to beat the Soviet armies of the far east and solidified our position. We can now dictate peace terms and the Soviets should accept."
umcflavour.23.a:"Just let us keep our original gains, let them rot in the rest of their lands"
umcflavour.23.b:"Take greater Manchuria and our claims"
umcflavour.23.c:"Demand total far eastern surrender!"



umcflavour.24.t:"Japanese demands"
umcflavour.24.d:"We have beaten back sevearly by the Japanese invasion. We did not manage to reclaim our lands and now face a prolonged static war of exhaustion. The Japanese sent us a list of demands that will ensure the end of this conflict but how much are we ready to pay for peace? The demands are:"
umcflavour.24.a:"Let Japan keep their original gains from before the conflict"
umcflavour.24.b:"Let Japan take major ports in far east and greater Manchuria"
umcflavour.24.c:"Let Japan take whatever they want at this point"
umcflavour.24.e:"Let Japan choke on these demands! We will fight till the bitter end!"


umcflavour.25.t:"Soviets break down the peace talks"
umcflavour.25.d:"Soviets ceased the peace talks when we provided them with the list of our demands. They want to fight till the bitter end!"
umcflavour.25.a:"Fools!"



umcflavour.26.t:"Eastern invaders were beaten back!"
umcflavour.26.d:"Our glorious armies managed to stop the backstabbing enemies and pushed them back into their territory. Now that we secured our grip we can send them a list of demands to end this conflict"
umcflavour.26.a:"Demand return of our lands alongside full control over Sakhalin and half of Manchuria!"
umcflavour.26.b:"All of above plus Korea!"
umcflavour.26.c:"All of above plus Japanese withdrawl from Northern China!"
umcflavour.26.e:"All of above plus Japanese withdrawl from all of China!"



umcflavour.27.t:"Soviet demands!"
umcflavour.27.d:"We have overestimated our capabilites and were harshly beaten back. In order to save anything we must negotiate peace. Soviets sent us a list of demands. We must swallow our pride and sit at the negotiating table. They have demnaded:"
umcflavour.27.a:"Let Soviets retake their originally lost lands plus Sakhalin and half of Manchuria as compensation"
umcflavour.27.b:"Let Soviets retake their originally lost lands plus Sakhalin, Manchuria and Korea as compensation"
umcflavour.27.c:"Let Soviets retake their originally lost lands plus Sakhalin, Manchuria, Korea, withdrawl from Northern China as compensation"
umcflavour.27.e:"Let Soviets retake their originally lost lands plus Sakhalin, Manchuria, Korea, withdrawl from all of China as compensation"


umcflavour.28.t:"Japan breaks down the peace talks"
umcflavour.28.d:"Japan broke the peace talks after hearing our list of demands. That means a total war of exhaustion."
umcflavour.28.a:"Stubborn Samurais!"



umcflavourevents.41.t:"[GetNewsHeadline]Japan invades Russian far east!"
umcflavourevents.41.d:"In a stunning escalation of the global conflict, Japan has launched a invasion of the Soviet Far East, taking advantage of the Soviet Union's weakened position after Nazi Germany's breakthrough to the Arkhangelsk-Astrakhan line in the west. Japanese forces, bolstered by naval and air support, attacked Soviet positions in Siberia and the strategic city of Vladivostok early this morning. The invasion comes as Germany, having reached its ambitious AA line goals, consolidates its dominance over European Russia. With the Soviets stretched thin on western front, Japan seized the opportunity to expand its influence . Japanese Prime Minister [JAP.GetLeader] declared that the attack is 'necessary to secure Asia from Bolshevik threats'. Military experts predict the Soviet Union will struggle to fight a two-front war as Japan's invasion opens a new chapter war."
umcflavourevents.41.a:"Russia will fall"
umcflavourevents.41.b:"Banzai!"
umcflavourevents.41.c:"We must prepare an equal reponse!"





umcflavourevents.42.t:"[GetNewsHeadline]Second Russo-Japanese war"
umcflavourevents.42.d:"In a stunning escalation of the global conflict, Japan has launched a invasion of the Soviet Far East, taking advantage of the Soviet Union's weakened position after Nazi Germany's breakthrough to the AA line in the west. Japanese forces, bolstered by naval and air support, attacked Soviet positions in Siberia and the strategic city of Vladivostok early this morning. With the Soviets stretched thin on their western front, Japan seized the opportunity to expand its influence in the East. Japanese Prime Minister [JAP.GetLeader] declared that the attack is 'necessary to secure Asia from Bolshevik threats.' Soviet leader,vowed to defend Soviet territory. 'We face enemies on all sides', [SOV.GetLeader] stated in a radio address, urging the Red Army to hold firm despite mounting pressure. Military experts predict the Soviet Union will have trouble sustaining two front war."
umcflavourevents.42.a:"Russia will fall"
umcflavourevents.42.b:"Banzai! To Irkutsk!"
umcflavourevents.42.c:"Quick! Ask Stavka for reserves!"




umcflavourevents.43.t:"[GetNewsHeadline]Japan wins the Second Russo-Japanese war!"
umcflavourevents.43.d:"In a shocking development, Japan has successfully conquered the Soviet Far East following a decisive campaign in Siberia, as the Soviet Union reels from its defeats on both fronts. Taking advantage of Nazi Germanys advance to the Arkhangelsk-Astrakhan AA line in the west, Japan launched its invasion earlier this year, and today, its forces have fully captured key Soviet territories, including Vladivostok and the surrounding region. Japanese Prime Minister [JAP.GetLeader] declared the victory as 'a triumph for the Empire of Japan and a safeguard against communist expansion in Asia.' The swift and relentless advance of Japanese troops overwhelmed Soviet defenses, already weakened by the massive German offensive in the west.Soviet leader Joseph Stalin has acknowledged the loss of the Far East but vowed that the war is far from over. 'We have lost ground, but not the fight. The Soviet people will resist to the last,' [SOV.GetLeader] said in a defiant speech.This victory solidifies Japan's control over vast resources in Siberia and disrupts Soviet supply lines, putting further pressure on the USSR as it lost the war against both Axis powers. Western Allies, struggling to contain the growing Axis influence, now face a drastically altered balance of power in both Europe and the Pacific."
umcflavourevents.43.a:"This is the end"
umcflavourevents.43.b:"We are superior!"
umcflavourevents.43.c:"This can't be, we will be back!"


umcflavourevents.44.t:"[GetNewsHeadline]Russia wins the Second Russo-Japanese war!"
umcflavourevents.44.d:"In a major victory, Soviet forces have repelled Japan's attempted invasion of the Far East, despite the immense pressure of Nazi Germany in the west. The Japanese, aimed to capitalize on Soviet vulnerabilities by seizing Siberia and key strategic locations such as Vladivostok, but they were met with fierce resistance.[SOV.GetLeader] hailed the victory as 'a testament to the Red Army's resolve', emphasizing that Soviet forces had successfully defended their eastern territories while battling the German onslaught in the west. Japanese forces suffered heavy losses, and their retreat from Siberia marks a significant blow to their ambitions. Military experts believe the defeat will shift Japans focus back toward the Pacific theater. This Soviet victory brings some relief to a nation fighting a brutal two-front war and signals that the USSR remains a formidable force."
umcflavourevents.44.a:"Very brave people"
umcflavourevents.44.b:"So this is how it ends"
umcflavourevents.44.c:"Go back home samurais!"