treu_tapfer_est:"Formalize Schuma battalions!"
lokot_est:"Grant some autonomy to Lokot area!"
Kaukasusarmee:"Form Spezielle Kaukasische Gebirgsdivisionen!"
RWO_kosaken:"Form Helmuth von Pannwitz Kosaken Battalionen!"
