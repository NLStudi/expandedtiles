OST_KDF_desc:"Kraft Durch Freude has been expanded into this Reichskommisariat."

OST_Kultur_progress:"Kulturkampf in progress"
OST_Kultur_progress_desc:"This Reichskommisariat is undergoing Kulturkampf."

OST_Kulutr_fnished:"Postitive Christianity adopted"
OST_Kulutr_fnished_desc:"Positive Christianity has been widely accepted in this Reichskommisariat."

Kultur_baltics_begin:"Start Kulturkampf in Baltisch"
Kultur_baltics_begin_desc:"The process of converting the Baltics to Positive Christianity will be easier than in other parts of our conquered lands. Baltic culture has always been close to Germanic culture and the dominant religion is Catholicism, which makes things even easier."
Kultur_baltics_phase1:"Start erasing traditional Christianity form the Baltics!"
Kultur_baltics_phase1_desc:"We shall demolish and loot all churches, detain all priests and construct new Positive Christianity temples!"
Kultur_baltics_phase2:"Replace crosses with swastikas!"
Kultur_baltics_phase2_desc:"If we are to fully covert the Baltics to Positive Christianity, we must remove the greatest symbol of traditional Christianity - the Cross, which can be found in nearly every house in this region. We will replace them with Swastikas. It will be a brutal, but necessary process to acheive the New Order!"
Kultur_baltics_finish:"Officially announce that Ostland is fully converted to Positive Christianity!"

Kultur_ukraine_begin:"Start Kulturkampf in West Ukraine!"
Kultur_ukraine_begin_desc:"The process of converting the West Ukraine to Positive Christianity will be harder than in other parts of our conquered lands. Ukrainian culture always has been far different from Germanic culture and the dominant religion is Orthodoxy, which makes things even harder."
Kultur_ukraine_phase1:"Start erasing Orthodoxy form Ukraine!"
Kultur_ukraine_phase1_desc:"We shall demolish and loot all churches, detain all popes and construct new Positive Christianity temples!"
Kultur_ukraine_phase2:"Replace Orthodox crosses with swastikas!"
Kultur_ukraine_phase2_desc:"If we are to fully covert Ukraine to Positive Christianity, we must remove the greatest symbol of Orthodox Catholicism - the Orthodox Cross, which can be found in nearly every house in this region. We will replace them with Swastikas. It will be a brutal, but necessary process to acheive the New Order!"
Kultur_ukraine_finish:"Officially announce that Ukraine is fully converted to Positive Christianity!"

kultstarted:"The Kulturkampf has begun."
kultstarted1:"Erasing process has begun."
kultstarted2:"We have replaced crosses with Swastikas!"

just_zittadelle:"Conventional Operation Zitadelle was chosen."
zittadelle_plus:"Operation Zitadelle, with some unconventional elements, was chosen."

ostreich.16:"Kulturkampf has begun."
ostreich.16.t:"The Kulturkampf has begun."
ostreich.16.d:"We have started a new Kulturkampf that aims to convert one of our Reichskommisariats to the only true faith - Positive Christianity!"
ostreich.16.a:"Gone with long dead gods!"

defense_berlin_now:"The Russians are very close to Berlin"

ostreich.17:"Kulturkampf accomplished in Ostalnd!"
ostreich.17.t:"Kulturkampf accomplished in Ostalnd!"
ostreich.17.d:"Ostland is now fully converted to Positive Christianity! Neue Ordnung is getting closer!"
ostreich.17.a:"The Swastika beats the Cross!"

ostreich.18:"Kulturkampf accomplished in Ukraine!"
ostreich.18.t:"Kulturkampf accomplished in Ukraine!"
ostreich.18.d:"Ukraine is now fully converted to Positive Christianity! Neue Ordnung is getting closer!"
ostreich.18.a:"The Schwarzmeer Deutsche are now a true part of the Reich!"

ostreich.19:"New KDF project launched!"
ostreich.19.t:"New KDF project launched!"
ostreich.19.d:"The KDF have launched a new great investment project to help develop the Ostreich. They focus on creating new vacation destinations for German workers."
ostreich.19.a:"Maybe a new cheap holiday destination for the next year?"

ostreich.20:"Museum des Sewastopol Schlaht construction!"
ostreich.20.t:"Museum des Sewastopol Schlaht construction!"
ostreich.20.d:"Construction of the Museum of the Siege of Sewastopol has started. It will include real photos and battle plans from that time."
ostreich.20.a:"Commemorate the battle that secured our final victory against Bolschewismus!"

ostreich.21:"Museum des Unternehmen Edelweiß construction starts!"
ostreich.21.t:"Museum des Unternehmen Edelweiß construction!"
ostreich.21.d:"The head of the KDF announced the construction of a new museum in the Kaukasus. This museum commemorates the greatest success of Operation Barbarossa - Unternehmen Edelweiß. Edelweiß granted us acces to the Caucasian oil fields and in effect cemented our victory against the Soviets. The museum will include real photos and battle plans from that time."
ostreich.21.a:"A Great victory for our brave soldiers!"

ostreich.22:"KDF project completed!"
ostreich.22.t:"KDF project completed!"
ostreich.22.d:"The KDF has announced that one of their projects has been completed. It opens up new travel oppurtunities for the workers of the Reich!"
ostreich.22.a:"So what is my next holiday destination?"

RWO_kosaken_form:"Form Helmuth von Pannwitz Kosaken Battalionen!"
operationsflavour.119:"Germany launches Operation Citadel!"
operationsflavour.119.t:"[GetNewsHeadline]Germany launches Operation Citadel!"
operationsflavour.119.d:"German forces have launched an attack against Soviet formations in Kursk, in an operation named Operation Zitadelle. New Panther and Tiger tanks will face the Soviet Defense-in-depth techinques. While experts are critical of the possibility of a German victory, the outcome of this battle remains to be seen. If Germany succedes a large portion of Soviet army will be encircled and tide in the east may turn again."
operationsflavour.119.a:"Our superior tanks will mow down the Soviets!"
operationsflavour.119.b:"We will flood the German tanks with Soviet blood! Hold Kursk at all costs!"
operationsflavour.119.c:"German tanks against Soviet manpower. Interesting."






cityflavour.153: "Fall of Konigsberg"
cityflavour.153.t: "[GetNewsHeadline]Fall of Konigsberg"
cityflavour.153.d: "Advancing Soviet forces have managed to capture the heart of Prussia, the grand old city of Konigsberg. The German defenders put up a fierce fight but the Soviet troops managed to break through and overrun the city. The city now stands as a burning pile of rubble but it is expected that reconstruction will soon begin.\n\nNow that the Soviets have managed to take a major Prussian city, the situation has worsened for the Germans on the Eastern Front. A Soviet offensive across the Vistula is expected in the next few days, after which the road to Berlin will lay open for the Soviets."
cityflavour.153.a: "These are the final moments of the Reich."
cityflavour.153.b: "The Soviets shall pay for every step!"
cityflavour.153.c: "Ura! Onwards to Berlin!"

cityflavour.154:"Liberation of Konigsberg"
cityflavour.154.t:"[GetNewsHeadline]Liberation of Konigsberg"
cityflavour.154.d:"German forces supported by the Volkssturm have managed to push Soviet forces out of Konigsberg. In an impressive display of ingenuity and bravery, the German soldiers managed to trap the Soviets in a pincer movement and destroy their heavy weapons and artillery, and within hours, cleared out the region surrounding the city.\n\nHowever, it is not clear how long this victory will last. Soviet forces were seen amassing near Prussia and an offensive to take back the city is expected within the next few days."
cityflavour.154.a:"Impressive."
cityflavour.154.b:"We can still defeat the Soviets!"
cityflavour.154.c:"The last attacks of a dying empire."

cityflavour.155:"Siege of Marienburg begins"
cityflavour.155.t:"[GetNewsHeadline]Siege of Marienburg begins"
cityflavour.155.d:"Marienburg, the old capital of the Teutonic Order and one of the great fortress-castles in Prussia, is now under attack by advancing Soviet formations. Reports indicate that the Soviets are preparing to launch an assault on the castle within the next week, and that intense shelling and bombardment of the region will begin soon.\n\nThe Siege of Marienburg is yet another step in the Soviet advance towards Berlin. It is also yet another devastating loss for the Germans, who are now preparing to defend their homeland to the end. A lot of violence and bloodshed is expected in Eastern Germany in the next few days."
cityflavour.155.a:"Another loss for the Germans."
cityflavour.155.b:"We will defend our heritage to the end!"
cityflavour.155.c:"Another step to Berlin! Ura!"

cityflavour.156:"Fall of Danzig"
cityflavour.156.t:"[GetNewsHeadline]Fall of Danzig"
cityflavour.156.d:"The City of Danzig, for which the Germans once threatened war, has fallen to the Soviet Army. The region, which was expected to hold out for months, fell within the span of a week when faced with the full force of the Red Army. The German defenders have retreated further into their country, trying to stop the Soviets at all cost.\n\nThe Fall of Danzig marks the beginning of the end for the German Reich's Eastern Front. With the Soviets now crossing into the German heartland, it is expected that the Germans will put up a fierce fight. It remains to be seen how terrible the situation will be in Eastern Germany."
cityflavour.156.a:"The end is near."
cityflavour.156.b:"Goddamn Slavic hordes!"
cityflavour.156.c:"We will get to Berlin soon!"

cityflavour.157:"Liberation of Danzig"
cityflavour.157.t:"[GetNewsHeadline]Liberation of Danzig"
cityflavour.157.d:"In a surprising turn of events, the city of Danzig has been recapturing by defending German forces. The city was taken by relatively inexperienced Volkstrumm divisions who used ingenious tactics to surround and overwhelm the relatively stronger Russian divisions.\n\nDanzig is not expected to remain in German hands for long. The overwhelming Russian advance will sooner or later overrun the city too. For now, the liberation of Danzig remains a small German victory in the enormous German defeat on the Eastern Front."
cityflavour.157.a:"Maybe the Germans aren't as weak as we thought."
cityflavour.157.b:"This is just the beginning."
cityflavour.157.c:"Final blows of a dying empire."

cityflavour.158:"Fall of Breslau"
cityflavour.158.t:"[GetNewsHeadline]Fall of Breslau"
cityflavour.158.d:"After intense fighting over a week long, the Soviets have managed to overrun Breslau, the capital of the region of Silesia in South-East Germany. The fighting has devastated the local population, and made the city almost completely into ruins. However, reconstruction is soon expected to begin as the city is also an important supply hub for the region.\n\nThe fall of Breslau marks yet another dark milestone of the war for the Germans. A Soviet offensive into Southern Germany is expected which will cripple the German industry and war effort. This may mean the end of the war in Europe."
cityflavour.158.a:"The end is near for the Germans."
cityflavour.158.b:"Our Eastern Front is collapsing!"
cityflavour.158.c:"We will crush the Germans soon."

cityflavour.159:"Liberation of Breslau"
cityflavour.159.t:"[GetNewsHeadline]Liberation of Breslau"
cityflavour.159.d:"In a surprising turn of events, German forces on the defensive have managed to counterattack and retake the city of Breslau from the Soviets. The counteroffensive took the Soviet Army Command by surprise, leading to the encirclement of several Soviet divisions. Reports state that the Germans are planning to erect hasty defenses to protect the city from Soviets attacks within the next few weeks.\n\nThe counterattack is proof of the fact that the Germans can still fight. With this turn of events, the Germans may have prevented the Soviets from reaching and devastating their industrial heartland once and for all."
cityflavour.159.a:"The Germans still have it in them."
cityflavour.159.b:"Schleisen mein Vaterland!"
cityflavour.159.c:"Nothing but a minor stepback."

cityflavour.160:"Fall of Brno"
cityflavour.160.t:"[GetNewsHeadline]Fall of Brno"
cityflavour.160.d:"After a short, powerful offensive into Czechoslovakia, the German Wehrmacht has captured the city of Brno, one of the largest cities in the country and one of the largest supply hubs in the region. Reports indicate that the Czech defenders were forced to retreat after sustained shelling from German artillery and that a counteroffensive is being prepared to retake the city.\n\nWith the fall of Brno, the Czechoslovakian defensive line is expected to break down even further. It is expected that the loss of this major supply hub will also demoralize the Czech armies. It remains to be seen how much the fall of Brno has shortened the war, however."
cityflavour.160.a:"The Czechs will soon lose."
cityflavour.160.b:"Czechoslovakia will soon be ours."
cityflavour.160.c:"The Germans will split us in half!"

cityflavour.161:"Liberation of Brno"
cityflavour.161.t:"[GetNewsHeadline]Liberation of Brno"
cityflavour.161.d:"In an unexpectedly successful counterattack, the Czech Army has managed to strike at the German defenders of Brno and retake the city. The effective counteroffensive was headed by experienced Czech generals, who executed a pincer movement and trapped the Germans in the city.\n\nDue to the intense fighting over the past few days, the city has been almost completely reduced to rubble, but reconstruction is expected to begin soon. The liberation of a major supply hub has boosted Czech morale, but it seems that the Battle for Brno is not yet over."
cityflavour.161.a:"The Czechs still have it in them."
cityflavour.161.b:"Just a minor setback."
cityflavour.161.c:"We will take our country back, step by step!"

cityflavour.162:"Construction of exterritorial German autobahn in Poland has started"
cityflavour.162.t:"[GetNewsHeadline]Beginning of Extraterritorial German Autobahn in Poland"
cityflavour.162.d:"The construction of the Extraterritorial German Autobahn through Polish territory has begun. It is expected that the construction will take only a few months to finish, and that it will finally allow East Prussians to travel to and from their Fatherland more easily.\n\nThe construction was started as part of the Ribbentrop-Beck Treaty which allowed for the use of the Polish corridor for the transportation of Germans. However, The Polish Government has denied to comment on the treaty as of today. It seems that the question of the Polish Corridor has been solved without much bloodshed."
cityflavour.162.a:"The Germans cannot be trusted."
cityflavour.162.b:"Wünderbar!"
cityflavour.162.c:"We must keep an eye on them."

cityflavour.163:"The exterritorial German autobahn is finished!"
cityflavour.163.t:"[GetNewsHeadline]Extraterritorial German Autobahn Completed!"
cityflavour.163.d:"The construction of the Extraterritorial German Autobahn through the Polish Corridor has been completed, and traffic is being routed through the roads. Reports indicate that thousands of East Prussians are now filling up the Autobahn, excited to get back to their Fatherland. The Polish Government has moved some troops to the region to maintain order, but it is not expected that any violence will break out between the Germans and the Poles."
cityflavour.163.a:"Well done."
cityflavour.163.b:"A Great success!"
cityflavour.163.c:"Peace, but at what cost?"

cityflavour.164:"Festung Danzig"
cityflavour.164.t:"[GetNewsHeadline]Festung Danzig Proclaimed!"
cityflavour.164.d:"With the ongoing war on the Eastern Front, the German Government has officially proclaimed the City of Danzig to be a frontline defensive city. The residents have been ordered to leave their homes and report to the military bases at once to procure arms to fight against the enemies.\n\nThe fort of Danzig has been repurposed to act as a defensive stronghold, and it is expected that intense fighting will occur in the region soon. With the Goverment's proclamation, thousands have taken to the streets to defend their Fatherland to the very end. It remains to be seen how long Danzig will hold out."
cityflavour.164.a:"Barbaric methods."
cityflavour.164.b:"Be loyal to Your Vaterland to the very end!"
cityflavour.164.c:"Blank words!"

cityflavour.165:"Festung Konigsberg"
cityflavour.165.t:"[GetNewsHeadline]Festung Konigsberg Proclaimed!"
cityflavour.165.d:"With the ongoing war on the Eastern Front, the German Government has officially proclaimed the City of Konigsberg to be a frontline defensive city. The residents have been ordered to leave their homes and report to the military bases at once to procure arms to fight against the enemies.\n\nThe fort of Konigsberg has been repurposed to act as a defensive stronghold, and it is expected that intense fighting will occur in the region soon. With the Goverment's proclamation, thousands have taken to the streets to defend their Fatherland to the very end. It remains to be seen how long Konigsberg will hold out."
cityflavour.165.a:"Barbaric methods."
cityflavour.165.b:"Be loyal to Your Vaterland to the very end!"
cityflavour.165.c:"Blank words!"

cityflavour.166:"Festung Posen"
cityflavour.166.t:"[GetNewsHeadline]Festung Posen Proclaimed!"
cityflavour.166.d:"With the ongoing war on the Eastern Front, the German Government has officially proclaimed the City of Posen to be a frontline defensive city. The residents have been ordered to leave their homes and report to the military bases at once to procure arms to fight against the enemies.\n\nThe fort of Posen has been repurposed to act as a defensive stronghold, and it is expected that intense fighting will occur in the region soon. With the Goverment's proclamation, thousands have taken to the streets to defend their Fatherland to the very end. It remains to be seen how long Posen will hold out."
cityflavour.166.a:"Barbaric methods."
cityflavour.166.b:"Be loyal to Your Vaterland to the very end!"
cityflavour.166.c:"Blank words!"

cityflavour.169:"Soviets enter Krakau"
cityflavour.169.t:"[GetNewsHeadline]Soviets enter Krakau"
cityflavour.169.d:"Advancing Soviet spearheads have managed to reach the city of Krakau, and have overrun its German defenders. In a brilliantly executed assault, the Soviet forces managed to take over the city without much casualties. However, the German defenders have been all but destroyed.\n\nWith the fall of Krakau, the situation worsens for the German Wehrmacht on the Eastern Front. It remains to be seen how this turn of events will influence German strategy and Soviet morale."
cityflavour.169.a:"Another German loss."
cityflavour.169.b:"The Soviets are right next to the Vaterland!"
cityflavour.169.c:"Another Soviet victory. Ura!"

cityflavour.167:"Germans enter Kraków"
cityflavour.167.t:"[GetNewsHeadline]Germans enter Kraków"
cityflavour.167.d:"After a quick and decisive attack, the German Army has managed to capture the city of Kraków. The Polish organized resistance was brave but could not withstand the German Army's superiority.\N\NThe loss of Kraków is another major blow to the Polish defensive strategy. Being a major supply hub and a major cultural center, the loss of Kraków is sure to demoralize the Polish defenders."
cityflavour.167.a:"Another German victory."
cityflavour.167.b:"The Poles stand no chance against us."
cityflavour.167.c:"Poland is not yet lost!"

cityflavour.168:"Poles liberate Kraków!"
cityflavour.168.t:"[GetNewsHeadline]Poles liberate Kraków!"
cityflavour.168.d:"Polish forces have managed to reorganise and performed a quick counterattack that pushed the Germans out of Kraków. The attack came as a result of quick improvisation and strong willpower of Polish forces, who managed to trap the German forces and quickly crush them.\n\nBeing a major supply hub and a major cultural center, the reclamation of Kraków is sure to boost the morale of the Polish forces."
cityflavour.168.a:"The Germans are not invincible after all."
cityflavour.168.b:"Verdammt! Polnische Schweinen!"
cityflavour.168.c:"We will take Poland back!"

cityflavour.170:"Munich conference begins"
cityflavour.170.t:"[GetNewsHeadline]Munich Conference begins"
cityflavour.170.d:"The Munich Conference, which will decide the fate of the Czechoslovakian region of the Sudetenland, is now ongoing. Leaders from the United Kingdom, France ,Italy and Germany will now discuss the fate of Sudetenland, and the Sudeten Germans.\n\nThe Conference came as the result of intense border conflicts between Germany and Czechoslovakia, and violent riots by the Sudeten Germans. It is expected that the Conference will finally solve the long standing question of German territories lost to Czechoslovakia in the aftermath of the Great War."
cityflavour.170.a:"We must aim for peace in our time."
cityflavour.170.b:"We expect full justice for the Sudeten Germans."
cityflavour.170.c:"There is no good outcome for us."

cityflavour.171:"Soviets enter Posen!"
cityflavour.171.t:"[GetNewsHeadline]Soviets enter Posen!"
cityflavour.171.d:"The Soviet Army has declared that they have entered the Western Polish city of Posen after a sustained offensive which lasted over a week. The capture came as the result of quick thinking on the part of the Soviet attackers, and a lack of supplies on the side of the Germans.\n\nWith the fall of Posen, very few German strongholds remain in Poland. It seems that the situation in the Eastern Front will continue to worsen for the German military for the foreseeable future."
cityflavour.171.a:"Another victory for the Soviets."
cityflavour.171.b:"We will achieve Endsieg!"
cityflavour.171.c:"The Germans will soon be crushed!"

cityflavour.172:"Germans reatake Posen"
cityflavour.172.t:"[GetNewsHeadline]Germans retake Posen"
cityflavour.172.d:"Following a counterattack conducted in the dark of night, German Generals announced that Posen has been retaken and that preparations are being made to cut further into the Soviet frontlines. In a well-thought out pincer maneuver, the German forces managed to trap the Soviet forces in the city, and then decimated them with aerial and artillery bombings.\n\nThe city has been thoroughly destroyed, many of its old and famous buildings now nothing but piles of rubble on the ground. The German occupation of Posen is not expected to last long, however, as sources in the Red Army have confirmed that preparations are being made to retake the city once more."
cityflavour.172.a:"This will not matter in the long run."
cityflavour.172.b:"We Germans still have it in us!"
cityflavour.172.c:"A minor setback."

cityflavour.173:"Fall of Poznań"
cityflavour.173.t:"[GetNewsHeadline]Fall of Poznań"
cityflavour.173.d:"In a spectacular display of military power, the advancing German cities have taken the city of Poznań after thoroughly destroying it with intense artillery bombardment. The Polish defenders were not even given a chance to fire their guns as the bombardment destroyed many of them and left the others shell-shocked.\n\nThe fall of Poznań marks another step in the German conquest of Poland. It is fully expected that the German Wehrmacht will keep their momentum and push further into Polish territory in the following days."
cityflavour.173.a:"What a tragedy."
cityflavour.173.b:"The world sees our power now!"
cityflavour.173.c:"That is terrible news!"

cityflavour.174:"Poles liberate Poznań"
cityflavour.174.t:"[GetNewsHeadline]Poles liberate Poznań!"
cityflavour.174.d:"Polish defensive forces have managed to perform an impressive counterattack and have retaken the city of Poznań. The German forces were taken by surprise by the unexpected counter-offensive, and have decided to pull back to reorganize their forces for further offensives into Poland.\n\nBeing a major supply hub and a cultural center, the liberation of Poznań is expected to be a major morale boost for the Polish forces and a humiliation for the German military. The outcome of the war remains to be seen, however."
cityflavour.174.a:"An interesting turn of events."
cityflavour.174.b:"Damn Poles!"
cityflavour.174.c:"Poland is not yet lost!"

cityflavour.175:"Fall of Prauge"
cityflavour.175.t:"[GetNewsHeadline]Fall of Prague"
cityflavour.175.d:"After a sustained offensive that lasted for almost a week, the German Wehrmacht has managed to capture Prague, the capital city of Czechoslovakia. The Generals who headed the offensive and the brave soldiers who took part in it will be honored by German High Officials later this week.\n\nThe fall of Prague marks the beginning of the end of the war, and most likely the end of their nation, for the Czechoslovakians. They had hoped to defend at the Sudetenland, but now that the Germans have broken through into the Czechian plains, it seems their collapse is imminent."
cityflavour.175.a:"The Germans increase their territory once more."
cityflavour.175.b:"Glory to the Vaterland!"
cityflavour.175.c:"This is the beginning of the end."

cityflavour.176:"Czechoslovaks liberate Prauge"
cityflavour.176.t:"[GetNewsHeadline]Czechoslovaks liberate Prague"
cityflavour.176.d:"Czechoslovakian forces have managed to retake the city of Prague following a surprise counterattack conducted yesterday night. Reports indicate that the Czechoslovaks used the element of surprise to their advantage and caught the Germans off-guard. This led to intense fighting which only lasted a few hours, at the end of which the defending Czechoslovak forces won a major offensive victory.\n\nThe liberation of Prague, while certainly a great morale boost for the Czechoslovakians, seems to be a short-lived victory for them in a time of defeat. It remains to be seen how long the Czechoslovaks will be able to hold the city, as reports indicate German troops concentrating in the region for a second major offensive to retake the city."
cityflavour.176.a:"The Czechoslovaks still have it in them?"
cityflavour.176.b:"A small setback."
cityflavour.176.c:"We will take our country back, step by step!"

cityflavour.177:"Soviets enter Prag"
cityflavour.177.t:"[GetNewsHeadline]Soviets enter Prag"
cityflavour.177.d:"As part of their continuing offensive into German territory, the Soviets have now entered the city of Prag. One of the largest cities in the region and one of the earliest German conquests, the fall of Prag will be a significant blow to German morale.\n\nThe capture of Prag is sure to destabilize any German military operations in Central Europe as it is a major supply and transportation hub. Reports indicate that the Soviets are now looking to push further into Germany and Austria, and that the Germans are preparing to defend their homeland to the very end. Immense bloodshed is expected."
cityflavour.177.a:"The Soviets may be getting too close to us."
cityflavour.177.b:"Verdammt!"
cityflavour.177.c:"Onwards to Berlin! Ura!!"

cityflavour.178:"Hitler visits Prag"
cityflavour.178.t:"[GetNewsHeadline]Hitler visits Prag"
cityflavour.178.d:"The German leader Adolf Hitler visited Prag yesterday to talk to the local people and assure them of the love Germany has for them. In his speech he declared: "For years, Czechs and Slovaks have been suffering under a decadent regime. We Germans could not tolerate the oppression of our brothers in Czechoslovakia. So we decided to intervene. Now, the Slovaks have freedom and the Czechs have a bright future. Together, we will lead our peoples to prosperity, for we are nothing but brothers!"\n\nThe speech was met with immense applause from the crowd that gathered to hear him speak. After the address, Hitler visited many old and famous landmarks of the region, and then promptly returned to Berlin. It is expected that Czecho-German relations will be improved as a result of this visit."
cityflavour.178.a:"This is all just propaganda." #for others
cityflavour.178.b:"The future is bright for both our peoples." #for GER
cityflavour.178.c:"Empty promises." #for CZE

cityflavour.179:"Ribbentrop-Beck pact"
cityflavour.179.t:"[GetNewsHeadline]Munich conference begins"
cityflavour.179.d:"Munich conference that will decide the fate of Czechoslovakia is now ongoing. Leaders od England, France ,Italy and Germany now discuss the fate of Sudetenland."
cityflavour.179.a:"Lets hope it will be peaceful"
cityflavour.179.b:"Let justice win!"
cityflavour.179.c:"The are going to sell us to the Germans!"

cityflavour.180:"Ribbentrop visits Warsaw"
cityflavour.180.t:"[GetNewsHeadline]Ribbentrop visits Warsaw"
cityflavour.180.d:"German Foreign Minister Joachim von Ribbentrop visited Warsaw yesterday as a sign of goodwill between the two nations. It was the first visit by a German official to independent Poland, and signified the willingness of Germany to pursue friendly relations with the Poles. The minister visited the Tomb of the Unknown Soldier to pay his respects and later mate with Josef Beck to discuss the possibility of a Non-Aggression Pact.\n\nThis visit brings with it great hope of peace and prosperity for both nations. While some would want an aggressive war, it is clear that both Germany and Poland desire nothing but friendship and cooperation."
cityflavour.180.a:"It seems peace will be preserved... for now."
cityflavour.180.b:"The Poles will be great allies to our cause."
cityflavour.180.c:"The Germans will be great allies to our cause."

cityflavour.181:"Warszawa fall to the Germans"
cityflavour.181.t:"[GetNewsHeadline]Warszawa falls to the Germans"
cityflavour.181.d:"After an offensive that barely lasted a week, the Germans have managed to surround and destroy the Polish forces defending Warszawa, the capital of Poland. The last remaining defenders capitulated late into the night yesterday, and by early morning, all the buildings were cleared of any resisting populace. A victory parade was organized in the afternoon, after which German Generals addressed their troops from a pile of rubble.\n\nThe city, long considered to be one of the most important cultural and economic cities in Eastern Europe, is now nothing but a pile of rubble. It's fall marks the beginning of the end of the war, and most likely the end of their nation, for the Poles."
cityflavour.181.a:"Dark days lie ahead for the poles."
cityflavour.181.b:"Another victory for the Vaterland!"
cityflavour.181.c:"May God help us all."

cityflavour.182:"Soviets enter Warshau"
cityflavour.182.t:"[GetNewsHeadline]Soviets enter Warschau"
cityflavour.182.d:"Advancing Soviet troops have finally entered the city of Warschau after intense fighting which lasted for almost a week. The city is now thoroughly destroyed, with experts predicting that the city may never see its past glory again.\n\nThe capture of Warschau came as the result of intense shelling and bombardment, with the Soviet forces burning through hundreds of tons of explosives by the day. In the end, however, the German defenders were overpowered by the sheer strength of the Soviet infantry, and capitulated within two hours of intense room-to-room fighting. The capture of Warschau marks the successful end of the Soviet offensive into German-occupied Poland, and now reports indicate they are preparing for a drive into Germany itself."
cityflavour.182.a:"The war is finally ending."
cityflavour.182.b:"Prepare to defend the Vaterland to the very last!"
cityflavour.182.c:"Victory is near! Ura!"

cityflavour.183:"Poles liberate Warszawa"
cityflavour.183.t:"[GetNewsHeadline]Poles liberate Warszawa!"
cityflavour.183.d:"After a surprise counteroffensive, Polish forces have managed to liberate Warszawa, the former capital of the nation. The liberation came as a result of poor strategic decisions on the part of the Germans, and great improvisation on the part of the Poles.\n\nRetaking the city will be a major morale boost for the Poles, and a major hinderance for the Germans. Reports indicate that German troops are concentrating in the region for a renewed offensive to take the city once and for all. It seems that the last few buildings standing in the city will soon fall..."
cityflavour.183.a:"Hopefully the Poles manage to keep it for some time."
cityflavour.183.b:"We will get Warschau back!"
cityflavour.183.c:"We will take our country back, step by step!"

cityflavour.184:"Poland invades Zalozie!"
cityflavour.184.t:"[GetNewsHeadline]Poland invades Zaolzie!"
cityflavour.184.d:"In a surprising turn of events, the Polish Government delivered an ultimatum to the Czechoslovakian Government, demanding the immediate transfer of Zaolzie. When the Czechoslovak Government conceded before their dissolution, they quickly moved troops into the region, ostensibly "to protect Polish populations living in the region."\n\nThe annexation of Zaolzie has undoubtedly soured Poland's relationship with the Western Allies. Reports indicate that English and French ambassadors will soon discuss the ramifications of this aggressive move. However, for now, it seems order has been retained in the region."
cityflavour.184.a:"This is an unfortunate turn of events."
cityflavour.184.b:"Good. We can share the blame now." #for GER
cityflavour.184.c:"We have to protect the Zaolzie Poles." #for POL

cityflavour.185:"Soviets capture Stettin"
cityflavour.185.t:"[GetNewsHeadline]Soviets capture Stettin"
cityflavour.185.d:"The Red Army has managed to capture Stettin, one of the largest cities in Eastern Germany. It is one of the first major German cities to fall to the Soviets. Being a major cultural center and an important transport hub, the capture of Stettin is sure to demoralize the German people and hinder German operations in the region.\n\nWith the fall of Stettin, the German defenders are retreating further into their homeland. Now that the frontlines are closer to Berlin than they are to Moscow, it seems that the German fighters will be even more fierce as they fight not for glory, but for survival."
cityflavour.185.a:"The end of the war is near."
cityflavour.185.b:"Defend the Vaterland to the last man!"
cityflavour.185.c:"The Germans will be crushed soon. Ura!"

cityflavour.186:"Germans retake Stettin"
cityflavour.186.t:"[GetNewsHeadline]Germans retake Stettin"
cityflavour.186.d:"After an intense counterattack, the German defenders along with a large number of Volkssturm forces have managed to retake the East German city of Stettin from the Soviet Forces. The feat was achieved by a combination of strong German artillery and the intense willpower and dedication of the Volkssturm battalion.\n\nStettin is not expected to be in German hands for long, however. Reports indicated that Soviet forces are already preparing for a renewed offensive to capture Stettin once and for all. However, it remains to be seen how long it will take them to overrun the city and destroy the German defenders."
cityflavour.186.a:"This changes nothing."
cityflavour.186.b:"German might is not yet destroyed!"
cityflavour.186.c:"Nothing but a small setback."

cityflavour.187:"Germans crossed the Sudeten"
cityflavour.187.t:"[GetNewsHeadline]Germans cross the Sudetenland"
cityflavour.187.d:"German troops have crossed the Czech defenses of the Sudetenland and have reached the plains of Bohemia-Moravia.\n\nThe Sudeten Defenses, which were some of the strongest in the world, were expected to hold out for some time. However, it became clear that the defenses had some terrible setbacks, as the Germans managed to break through at various points and surround the defenders. With the Germans now closer to Prague, it seems to be only a matter of time before Czechoslovakia capitulates."
cityflavour.187.a:"The Czechs are done, then."
cityflavour.187.b:"Onwards to Prag!"
cityflavour.187.c:"We will hold the line at the plains then!"

cityflavour.188:"Fall of Zurich"
cityflavour.188.t:"[GetNewsHeadline]Fall of Zurich"
cityflavour.188.d:"Zurich, one of the largest Swiss cities close to the Swiss-German border, fell to advancing German armies yesterday. Intense fighting was reported as the Swiss defenders used their defensive tools to the best of their abilities to repel German attacks. A great loss of life has been reported on the German side, however, German officials were quick to denounce these claims.\n\nThe fall of Zurich marks one of the first major victories for the German Wehrmacht in Switzerland. However, it remains to be seen if the Germans can keep their momentum to conquer the rest of Switzerland."
cityflavour.188.a:"We must keep a close eye on the situation."
cityflavour.188.b:"Switzerland will soon be ours!"
cityflavour.188.c:"They will pay for every step!"

cityflavour.189:"Liberation of Zurich"
cityflavour.189.t:"[GetNewsHeadline]Liberation of Zurich"
cityflavour.189.d:"The German occupation of Zurich was cut short when Swiss forces performed a counteroffensive and liberated the city and some of its surrounding regions. The impressive feat was accomplished by the fact that the German occupiers of the city were weak and small in number owing to the great casualties inflicted on them during their offensive.\n\nThe liberation of Zurich was celebrated by the Swiss people as they marched on the streets chanting "Die Schweiz ist nicht Deutschland!" meaning "Switzerland is not Germany!". Reports indicate the German High Command is taking stock of the situation and looking to perform a renewed offensive within the next few weeks."
cityflavour.189.a:"The Swiss are performing well."
cityflavour.189.b:"The war is not over yet!"
cityflavour.189.c:"The Germans have underestimated us."

cityflavour.190:"Fall of Berne"
cityflavour.190.t:"[GetNewsHeadline]Fall of Berne"
cityflavour.190.d:"German forces have surrounded and entered the capital of Switzerland, the city of Berne. The attack was preceded by intense artillery bombardment which nearly brought the city to the ground, and crushed most Swiss defenders in the region. The remaining Swiss forces were taken care of by advancing German troops, who entered and cleared the city within the span of 24 hours.\n\nWith the fall of Berne, the capitulation of Switzerland seems imminent. However, it remains to be seen whether the Swiss will actually do so."
cityflavour.190.a:"Another nation falls to the Germans."
cityflavour.190.b:"Soon we will have full control over Switzerland."
cityflavour.190.c:"This is the beginning of the end."

cityflavour.191:"Liberation of Berne"
cityflavour.191.t:"[GetNewsHeadline]Liberation of Berne"
cityflavour.191.d:"Following a surprise counterattack by the Swiss Army, German forces have been forced to withdraw from the city of Berne, leaving it to be liberated by the Swiss troops. The counteroffensive came as a result of brilliant tactics adopted by the Swiss Generals, and incredible willpower of the Swiss troops.\n\nThe liberation of Berne is a humiliation in the face of the German Army. As a result, it is expected that the Germans will invest considerable resources in taking the city back. Reports indicate a large concentration of German forces heading for Berne at the moment. It remains to be seen how long and bloody the renewed German offensive will be."
cityflavour.191.a:"The Swiss are doing better than expected."
cityflavour.191.b:"We will take Berne back!"
cityflavour.191.c:"We can still hurt the Germans!"

cityflavour.192:"Fall of Viipuri"
cityflavour.192.t:"[GetNewsHeadline]Fall of Viipuri"
cityflavour.192.d:"Viipuri, one of the largest Finnish cities on the Finnish-Soviet Border, fell to advancing Soviet Armies yesterday, after a brutal offensive that lasted for a week. The city, strongly defended by Finnish elite forces, faced the total might of the Soviet Army and were crushed by the power of Soviet artillery. Recent reports indicate, however, that Soviet military incompetence and inexperience caused them immense casualties. However, the Soviet Government was quick to denounce these claims.\n\nWith the fall of Viipuri, the Soviets have overcome a major obstacle and are now free to penetrate further into the Finnish Plains. The Finnish Government is expected to put up a fierce resistance."
cityflavour.192.a:"The Soviets will soon win." #for others
cityflavour.192.b:"Onwards to Helsinki!" #for USSR
cityflavour.192.c:"We must defend our country!" #for Finland

cityflavour.193:"Liberation of Viipuri"
cityflavour.193.t:"[GetNewsHeadline]Liberation of Viipuri"
cityflavour.193.d:"The Soviet Army faced major embarrassment yesterday when the Finnish Army managed to retake Viipuri after a surprise counter-offensive. The counteroffensive was carried out by elite Finnish forces, who used the element of surprise and the weather to their advantage, to knock down the Soviet defenders of the city and reoccupy it.\n\nThe city has been thoroughly devastated by all the fighting. However, being a major supply hub, it's reconstruction is expected to begin soon."
cityflavour.193.a:"The Finns are a brave people indeed." #for others
cityflavour.193.b:"Nothing but a minor setback." #for USSR
cityflavour.193.c:"Hakkaa Päälle! Destroy them!" #for Finland

operationsflavour.120:"Germany launches Fall Grunn!"
operationsflavour.120.t:"[GetNewsHeadline]Germany launches Fall Grunn!"
operationsflavour.120.d:"Germany launched a major offensive against Czechoslovak state. German panzer colums have been seen rushing through narrow Sudeten roads and first reports of fighting are filling the news. Along with this first evidence of German losses have been reported and depiced by numerous photos. The air obove whole Czechoslovakia is a one big aerial battlefield, sadly despite the bravery of Czechoslovak pilots many cities were already sevearly bombed. German OKW perdicts the fall of Czechoslovakia within 20 days."
operationsflavour.120.a:"We must protect our volk at all cost!"
operationsflavour.120.b:"All the bombed cities..."
operationsflavour.120.c:"Terrible!"

operationsflavour.121:"Germany launches Fall Weiss!"
operationsflavour.121.t:"[GetNewsHeadline]Germany launches Fall Weiss!"
operationsflavour.121.d:"Germany launched a major offensive against Polish state. German panzers are steamrolling through Polish plains and will soon reach the Vistula river, the situation for defenders is dire as the Germans posses a massive air superiority."
operationsflavour.121.a:"Crush this artificial state at once!"
operationsflavour.121.b:"Poland is not yet lost!"
operationsflavour.121.c:"Barbaric"

operationsflavour.122:"Germany launches Fall Gelb!"
operationsflavour.122.t:"[GetNewsHeadline]Germany launches Fall Gelb!"
operationsflavour.122.d:"Germany launched a major offensive against the whole Benelux area. Followed by a gigantic bomber campagin was a large scaled invasion of Benelux, main German effort is put to quickly reach France through Luxemburg and Belgium and cut off the allied reinforcements while they are still there"
operationsflavour.122.a:"Lest hope that Manstein knows what he is doing"
operationsflavour.122.b:"No! It's 1914 all over again!"
operationsflavour.122.c:"Ah shit here we go again!"

operationsflavour.123:"Germany launches Fall Rot!"
operationsflavour.123.t:"[GetNewsHeadline]Germany launches Fall Rot!"
operationsflavour.123.d:"Germany launched a major offensive against French state. Germans quickly overrun Belgium and are now headed to Paris. France, country that once stopped the German invasion and managed to beat Germany into submission is now close to total collapse!"
operationsflavour.123.a:"The ultimate revange!"
operationsflavour.123.b:"We should start packing..."
operationsflavour.123.c:"Impossible"
operation_gelb:"Commence §YFall Gelb§!!"
operation_gelb_desc:"§YFall Gelb§! aims to quickly overrun Benelux and enter France"
operation_rot:"Commence §RFall Rot§!!"
operation_rot_desc:"§RFall Rot§! aims to quickly advance into France and thus capture most of the most important cities and in effect force France to surrender"
operation_weiss:"Commence Fall Weiß!"
operation_weiss_desc:"Fall Weiß aims to completly destroy the Polish state in one quick and very large scaled offensive, Poland shall be no more!"
