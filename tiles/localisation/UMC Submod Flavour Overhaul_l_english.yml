cityflavour.194:"Fall of Gomel"
cityflavour.194.t:"[GetNewsHeadline]Fall of Gomel"
cityflavour.194.d:"Gomel, one of the largest cities in Eastern Europe and a major industrial powerhouse of the Soviet Union, has fallen to advancing German armies.\nThe city saw a sustained onslaught of German artillery, followed by the encirclement and subsequent occupation of the city by the Wehrmacht. The battle for the city featured brave attacks and counterattacks from both sides, and saw many young German officers being promoted for their ingenuity.\nThe conquest of the city, which was expected to hold out for weeks, and perhaps even months, came as a shock to the Soviet leadership. With Gomel under their control, the Germans are set to conquer the rest of the surrounding regions, and to destroy a vital part of the Soviet supply lines.\nThe fall of the city marks yet another grave milestone in the relentless German drive into the heart of Soviet Russia, and has brought them one step closer to Moscow..."
cityflavour.194.a:"Another critical loss for the Soviets."
cityflavour.194.c:"Onwards to Moskau!"
cityflavour.194.b:"We must hold the line at all costs!"

cityflavour.1:"Liberation of Gomel"
cityflavour.1.t:"[GetNewsHeadline]Liberation of Gomel"
cityflavour.1.d:"In a surprising turn of events, the Red Army has managed to outmaneuver the Wehrmacht, and recapture the occupied city of Gomel.\nThe liberation came as a result of a decisive counterattack by the Red Army, which saw the Germans being pushed into a defensive stance. With the support of their powerful artillery, some Soviet troops managed to completely bring the city under their control within the span of a few days. The city saw the bravery and sacrifice of many young soldiers, who are to be honored within the week at a special ceremony at the Kremlin.\nMany observers are of the opinion that the recapture of Gomel is just a small victory at a time of crisis for the USSR. However, many are of the opinion that the liberation of the city is just the first step of a major push by the Soviets; one that could bring them all the way to Berlin, even..."
cityflavour.1.a:"Interesting turn of events."
cityflavour.1.c:"We will get the city back soon!"
cityflavour.1.b:"For the Motherland! URA!"

cityflavour.2:"Fall of Kursk"
cityflavour.2.t:"[GetNewsHeadline]Fall of Kursk"
cityflavour.2.d:"The famed city of Kursk has fallen to the Germans.\nIn a daring and unexpected encircling movement, the Germans managed to surprise the Soviet garrisons stationed in and around the city, and overwhelm them quickly into submission. Even though reports vary, many experts are of the opinion that the Soviet casualties are bound to be much greater than the Germans. Sources within the German High Command also claim that the amount of prisoners of war captured from the city is one of the highest on the Eastern Front so far.\nWith the capture of Kursk, the Germans have crossed off yet another important city from their list of objectives, and now look on to the Ukraine, the Caucasus and beyond..."
cityflavour.2.a:"The Germans may truly be unstoppable."
cityflavour.2.c:"Another one bites the dust."
cityflavour.2.b:"We will avenge this later!"

cityflavour.3:"Liberation of Kursk"
cityflavour.3.t:"[GetNewsHeadline]Liberation of Kursk"
cityflavour.3.d:"Advancing Red Armies have managed to wrestle the city of Kursk away from the Germans.\nThe recapture of the city came as the result of the combination of a variety of factors, such as the overwhelming firepower of the Soviet troops, the general loss of morale in the German garrisons stationed in the area, and finally the brilliant tactics employed by Soviet generals to achieve this goal. Sources within the German High Command claim that the city was never high on the list of important cities to defend, and so they decided to give it up without a fight. However, many experts concur that the loss of the city will be a major blow to German operations on the Eastern Front.\nWith Kursk back under their control, the Soviets now look to take back the rest of their Motherland, inch by inch, with a determination that may carry them all the way back to Warsaw...."
cityflavour.3.a:"The Eastern Front shifts again."
cityflavour.3.c:"This doesn't bother us at all...."
cityflavour.3.b:"Another loss for the fascists!"

cityflavour.4:"Fall of Novgorod"
cityflavour.4.t:"[GetNewsHeadline]Fall of Novgorod"
cityflavour.4.d:"Reports from the Wehrmacht have announced that they have captured Novgorod, widely considered one of the largest cities in the northern USSR, and one of the largest industrial cities in the Soviet Union.\nThe fall of the city was commemorated by an impressive fly-past by the Luftwaffe, celebrating the bravery and dedication of the German soldiers, and the ingenuity of the German generals. On the other side, some have reported that the Soviets have brought the city to near-complete destruction as they retreated, as part of their Scorched Earth tactics.\nWith the occupation of Novgorod, the Germans can now move on to securing their flanks in the Leningrad region, and strengthening their control over Western Russia."
cityflavour.4.a:"Another blow to the Russians."
cityflavour.4.c:"We are one step closer to Endsieg!"
cityflavour.4.b:"This occupation will be short-lived."

cityflavour.5:"Liberation of Novgorod"
cityflavour.5.t:"[GetNewsHeadline]Liberation of Novgorod"
cityflavour.5.d:"Following an intense offensive that lasted a few days, the Red Army has finally recaptured the important city of Novgorod.\nIn a stunning display of ingenuity and strength, the Soviets managed to encircle the city and clear out the Germans inside, while suffering minimal casualties. The Germans had reportedly not been prepared for a fight, and so the Russians were able to quickly dislodge them from their strongholds in the city and take the fight to the streets, where Russian armor and artillery quickly prevailed.\nThe liberation of Novgorod marks another milestone in the arduous Soviet reclamation of their Motherland, and another nail in the coffin of the German dreams for conquering the USSR..."
cityflavour.5.a:"The Eastern Front shifts again."
cityflavour.5.c:"We will get it back soon!"
cityflavour.5.b:"URA! Another blow to the Germans!"

cityflavour.6:"Fall of Stalino"
cityflavour.6.t:"[GetNewsHeadline]Fall of Stalino"
cityflavour.6.d:"The Soviet city of Stalino has fallen to a sustained German offensive.\nReports from the battlefield indicate that the city has been nearly reduced to rubble, and that the Germans have established defensive posts in the last few buildings still standing strong. The Red Army has reportedly abandoned the city and established a defensive line further east.\nWith Stalino under their control, the Germans have now strengthened their control over the Ukraine, and can now look to expanding their borders further east into the Caucasus, or securing their flanks in Central Russia..."
cityflavour.6.a:"Dear Lord, the Germans just won't stop!"
cityflavour.6.c:"Further and further into Russia we march!"
cityflavour.6.b:"This is a disgrace. We must get our revenge!"

cityflavour.7:"Liberation of Stalino"
cityflavour.7.t:"[GetNewsHeadline]Liberation of Stalino"
cityflavour.7.d:"Following a brilliant counterattack, the Soviets have managed to drive the German invaders out of Stalino, and destroyed their defensive positions in the city.\nThe liberation came as the result of the sheer bravery of the Soviet soldiers, and quick improvisation on the part of the Soviet generals. Reports indicate that the Germans have abandoned the region entirely, and that they will be retreating further west into more easily defensible regions.\nThe recapture of Stalino is not only a major military victory for the Soviets, but also a major propaganda victory. The Soviet leadership can now declare, with full confidence, "This is just the beginning! The Red Army will stand at the gates of Berlin one day!""
cityflavour.7.a:"Soviet willpower still remains the strongest."
cityflavour.7.c:"Goddamn Soviets! We must reorganize."
cityflavour.7.b:"Onwards! We must not pause until we reach Berlin!"

cityflavour.8:"Fall of Voroshilovgrad"
cityflavour.8.t:"[GetNewsHeadline]Fall of Voroshilovgrad"
cityflavour.8.d:"Building on their conquest of Stalino and the regions surrounding it, the Germans have now managed to occupy the key Ukrainian city of Voroshilovgrad.\nReports indicate that the Germans performed a devastating encirling movement around the city, trapping the Soviet troops in the city. Sources claim that the Russians expected to hold the city for at least a few months, and hence invested considerably in its defense. However, the encirlement made most of their defensive positions unusable, and so the Red Army had to withdraw.\nThe capture of Voroshilovgrad marks the finale of the German offensive into the Ukraine. With the Ukraine now in German hands, the Soviets have less resources to survive with, and now the question remains: where will the Germans push through next?"
cityflavour.8.a:"This is the beginning of the end for the Soviets."
cityflavour.8.c:"Another objective achieved!"
cityflavour.8.b:"Another region lost!"

cityflavour.9:"Liberation of Voroshilovgrad"
cityflavour.9.t:"[GetNewsHeadline]Liberation of Voroshilovgrad"
cityflavour.9.d:"In a devastating counteroffensive, the Soviets have managed to completely destroy the German garrisons in the city of Voroshilovgrad, and have taken back control of the entire city.\nSources claim that given the strength of the German defenses in the region, and the general lack of Soviet firepower, the Germans did not expect such a bold move from the Soviets. As such, their total unawareness worked to the advantage of the Soviets, delivering them a quick and decisive victory over the Germans at a time when such victories were quite rare.\nWith the Germans driven out of Voroshilovgrad, the Soviets are looking to liberate the rest of the Ukraine, and possibly push the Germans all the way back to Western Poland..."
cityflavour.9.a:"An excellent move."
cityflavour.9.c:"A small but unwelcome surprise."
cityflavour.9.b:"This is the beginning of the end for the Germans."
