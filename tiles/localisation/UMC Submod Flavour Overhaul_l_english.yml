GER_reichswerke:"\n Establish Reichswerke Hermann Göring"
GER_reichswerke_desc:"§YReichswerke Hermann Göring§! was an industrial conglomerate in Nazi Germany. It was established in July 1937 to extract and process domestic iron ores from Salzgitter that were deemed uneconomical by the privately held steel mills. "

GER_4_year_plan:"\n Vierjahresplan"
GER_4_year_plan_desc:"4 Year Plan aims to expand our economic capabilites and also make us less vulnerable to resource shortages"

rem_germany_expanded.1.t:"4 Year Plan begins"
rem_germany_expanded.1.d:"4 Year Plan aims to expand our economic capabilites and also make us less vulnerable to resource shortages"
rem_germany_expanded.1.a:"We can do this in less than 4 years!"

rem_germany_expanded.2.t:"Reichswerke Hermann Göring"
rem_germany_expanded.2.d:"Reichswerke Hermann Göring will help us expand our core industries and also integrate the foreign ones as we conquer more land!"
rem_germany_expanded.2.a:"Göring is the man for this job!"

rem_germany_expanded.3.t:"Consolidating the Lebensraum"
rem_germany_expanded.3.d:"Lebensram, our greatest and final goal as the German nation. The greatest struggle in history is upon us, the destruction of bloshevism and securing the living space for our volk!"
rem_germany_expanded.3.a:"One day it will be realised..."

rem_germany_expanded.4.t:"The question of Germanic volk"
rem_germany_expanded.4.d:"We must colonize our conquered areas in the east."
rem_germany_expanded.4.a:"We will achive our goals!"

rem_germany_expanded.5.t:"Plundering the east"
rem_germany_expanded.5.d:"Our newly acquierd Lebensraum is full of riches that are free for takes. We must conduct a organized operation to plunder as much as we can. This of course would not be well recived by the locals."
rem_germany_expanded.5.a:"Take whats ours!"

rem_germany_expanded.6.t:"Generalplan Ost"
rem_germany_expanded.6.d:"We must decide how to administrate our eastern claims. Rosenberg suggest splitting the areas into smaller states based on their nationality and geographical area called generalbezirken. Himmler on the other hand suggest making a larger reichskomissariats that will control more land and more ethnic diversity."
rem_germany_expanded.6.a:"Side with Rosenberg!"
rem_germany_expanded.6.b:"Side with Himmler!"
GER_SS_form:"\nSchutzstaffel Ordensstaaten"
GER_SS_form_desc:"Ordensstaaten - or Order states directly refering to Teutonic Order. Their main goal is to increase seciurity and safety of our newly conquered lands."


rem_germany_expanded.7.t:"Schutzstaffel"
rem_germany_expanded.7.d:"Forming the SS divisions form the aryan population in our conquered lands will allow us to create a elite force totally dedicated to our cause."
rem_germany_expanded.7.a:"We will deal with all the resistance and undesirables!"

rem_germany_expanded.8.t:"Schutzstaffel bases in the east"
rem_germany_expanded.8.d:"Establishing SS bases in the east would help to reduce resistance growth and, if it comes to it, rise up a elite fast response team to fight off a full scaled invasion."
rem_germany_expanded.8.a:"Authorize the plan"

rem_germany_expanded.9.t:"Question of specific city"
rem_germany_expanded.9.d:"After Anschluss we now control all of Ostmark. However some aspects of this core Germanic land are far from our standards. One city in particular is a thorn in the eye - Judenbrug. We have 2 options to choose from in order to get rid of it."
rem_germany_expanded.9.a:"Zirbenstadt - like Swiss pine tree!"
rem_germany_expanded.9.b:"Adolfsburg - to commemorate our great Führer!"
rem_germany_expanded.9.c:"Just keep it as it is"
rem_germany_expanded.10.t:"Ostmark is back"
rem_germany_expanded.10.d:"Austria is ours. Now to cement our control we shall rename it to its true name - Ostmark!"
rem_germany_expanded.10.a:"Ostmark is back in Vaterland!"
GER_hydroelectricpower:"\nEstablish Hydroelectric Powerplants"
GER_hydroelectricpower_desc:"Hydroelectric Powerplants procude energy and allow us to use the dried up land for exploitation. We have numerous power plants in Germany already but if we want to unlock their full potential we must renovate them"
USFO_Hydroallow:"Allows establishment of §GHydroelectric power plant§! facilities all around the Reich." 
GER_ig_farben:"\n Establish IG Farben facilities"
GER_ig_farben_desc:"IG Farben specializes in synthetic and chemical industry. It will help us in finding new ways of obtaining synthetic oil and rubber."
USFO_IGfarbenallow:"Allows establishment of §gIG Farben§! facilities all around the Reich."
Igfarbenest:"Established §gIG Farben§!"
GER_reichswerke_ost:"\n Expand Reichswerke to the East"
GER_reichswerke_ost_desc:"With our newly conquered land in the east now in our full control we can start exploiting and integrating it into the Reichswerke."
