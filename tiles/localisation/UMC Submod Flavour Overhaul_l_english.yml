operationsflavour.104:"[GetNewsHeadline]Unternehmen München begins!"
operationsflavour.104.t:"[GetNewsHeadline]Unternehmen München begins!"
operationsflavour.104.d:"Romanian forces have launched a great coordinated attack along with Germans to seize the formerly Romanian provinces of Bessarabia and Odessa. It is unlikely that the success of this operation will turn the tide of the war. However, the fate of the operation remains to be seen."
operationsflavour.104.a:"We shall get our lost lands back!"
operationsflavour.104.b:"Russia will fall in a few weeks!"

operationsflavour.105:"[GetNewsHeadline]Unternehmen Taifun begins!"
operationsflavour.105.t:"[GetNewsHeadline]Germany launches Unternehmen Taifun!"
operationsflavour.105.d:"The Germans have launched a desperate final offensive against Moscow! The fate of the war rests on the great battle, and the whole world watches with keen interest. Experts are skeptical that the Soviet Red Army will hold out against the German Wehrmacht, however, the fate of the battle remains to be seen."
operationsflavour.105.a:"We are closer to defeating Russia than Napoleon!"
operationsflavour.105.b:"Hold Moscow at all costs!"
operationsflavour.105.c:"The true clash of titans."

operationsflavour.106:"[GetNewsHeadline]Planning our moves in the year 1942"
operationsflavour.106.t:"[GetNewsHeadline]Planning our moves in the year 1942"
operationsflavour.106.d:"We have managed to achieve most of the objectives planned for 1941, but for now, our advance has been halted due to the bad weather. Now we must decide what the objective for our next offensive should be. We could perform another concentrated attack on Moscow, codenamed 'Fall Kreml', or we could concentrate more on seizing Stalingrad and the Caucasian oilfields, codenamed 'Fall Blau'. The decision is in your hands."
operationsflavour.106.a:"We should take Moscow. That will destroy Russian morale!Commence Fall Kreml!"
operationsflavour.106.b:"The Wehrmacht desperately needs fuel. Commence Fall Blau!"
second_march_on_moscow:"Fall Kreml chosen"
invasion_caucasus_ger:"Fall Blau chosen"

operationsflavour.107:"[GetNewsHeadline]Germans renew their offensive in the central front!"
operationsflavour.107.t:"[GetNewsHeadline]Germans renew their offensive in the central front!"
operationsflavour.107.d:"The Germans have managed to commence a surprise attack against fortified Soviet positions in Moscow. The Germans are apparently trying to secure their hold in central Russia. Due to extensive Abwehr false intelligence operations, the Russians expected the German offensive to concentrate in the South, as they thought that the Caucasian oilfields would tempt the starving German war machine. This is an unexpected disaster, but it remains to be seen who it affects the most: the Germans or the Soviets."
operationsflavour.107.a:"We shall destroy the Russians once and for all this summer!"
operationsflavour.107.b:"Cyka Blyat! Someone will get shot for that!"
operationsflavour.107.c:"The clashs of titans continues."

operationsflavour.108:"[GetNewsHeadline]Germans advance into the Caucasus"
operationsflavour.108.t:"[GetNewsHeadline]Germans advance into the Caucasus"
operationsflavour.108.d:"The Germans have managed to commence a surprise attack against Soviet positions in the Caucasus. The Germans are apparently trying to capture the oil-rich areas of Kuban and Caucasus. Due to extensive Abwehr false intelligence operations, the Russians expected the German offensive to concentrate towards Moscow, as they thought that the Germans would be tempted to take the capital of the USSR. This is an unexpected disaster, but it remains to be seen who it affects the most:the Germans or the Soviets."
operationsflavour.108.a:"We shall destroy the Russians once and for all this summer!"
operationsflavour.108.b:"Cyka Blyat! Someone will get shot for that!"
operationsflavour.108.c:"The clashs of titans continues."

operationsflavour.109:"[GetNewsHeadline]Planning our moves in the year 1943"
operationsflavour.109.t:"[GetNewsHeadline]Planning our moves in the year 1943"
operationsflavour.109.d:"We have managed to achive most of the objectives planned for 1942, but for now, our advance has been halted due to the bad weather and soviet counterattacks. Now we must decide what the objective for our next offensive should be. We could implement Luftwaffe professor Heinrich Steinmann's idea to use the experimental Mistel air bombers to destroy Soviet power plants in Transwolga paralyse the Soviet industry, codenamed 'Unternehmen Eisenhammer', or we could provide maximum air support to our ground troops and crush the Russian military, codenamed 'Unternehmen Zitadelle'.The decision is in your hands."
operationsflavour.109.a:"Unternehmen Eisenhammer is too risky. Commence Unternehmen Zitadelle."
operationsflavour.109.b:"We should save the lives of our soldiers. Commence Unternehmen Eisenhammer."

operationsflavour.110:"[GetNewsHeadline]Germany launches operation Margarethe to seize Hungary"
operationsflavour.110.t:"[GetNewsHeadline]Germany launches Operation Margarethe to seize Hungary"
operationsflavour.110.d:"Due to the unexpected change of sides by Hungary, the Germans have launched a decisive offensive towards Budapest to secure Hungarian military factories and to hold the line at the Transylvanian mountains. The fate of Hungary remains to be seen."
operationsflavour.110.a:"Traitors! Cowards! Defeatists!"
operationsflavour.110.b:"That was to be expected."
operationsflavour.110.c:"We are done!"
margarete:"Operation Margarethe launched"

operationsflavour.111:"[GetNewsHeadline]Germany launches Operation Frühlingserwachen!"
operationsflavour.111.t:"[GetNewsHeadline]Germany launches Operation Frühlingserwachen!"
operationsflavour.111.d:"The Germans have performed an attack which is likely to be their last offensive in this war. The Offensive, performed using their last reserves, is mostly concentrated on securing the Balkans to deny the USSR access to the Romanian oilfields. "
operationsflavour.111.a:"We shall turn the tide of this war! We belive in the final victory!"
operationsflavour.111.b:"Just postmortem seizures."
operationsflavour.111.c:"There is nothing they can do now to win this war."

operationsflavour.112:"[GetNewsHeadline]Battle of Berlin begins"
operationsflavour.112.t:"[GetNewsHeadline]Battle of Berlin begins"
operationsflavour.112.d:"The Soviets are near Berlin and their final and lethal offensive is certain. German Führer Adolf Hitler has announced that he shall stay in Berlin, and fight the Soviets to the very last. This, however, is a futile attempt at boosting the morale of starving soldiers who are already surrendering in droves. The fate of Germany is all but certain. The black heart of Nazism will be crushed."
operationsflavour.112.a:"They shall pay for every step! Defend Berlin at all costs!"
operationsflavour.112.b:"This is the final struggle! URA ZA RODINU!!!"
operationsflavour.112.c:"Germany falls.."

operationsflavour.114:"[GetNewsHeadline]Germany finishes project Alpenfestung!"
operationsflavour.114.t:"[GetNewsHeadline]Germany finishes Project Alpenfestung!"
operationsflavour.114.d:"The Germans have finished their mythical unconquerable fortress in the Alps, the Alpenfestung. The effectiveness of this fortress against Allied Bombers and Tanks remains to be seen."
operationsflavour.114.a:"We shall withstand every enemy!"
operationsflavour.114.b:"This complicates things."

operationsflavour.113:"[GetNewsHeadline]Alpenfestung plans"
operationsflavour.113.t:"[GetNewsHeadline]Alpenfestung plans"
operationsflavour.113.d:"German architects, led by Albert Speer, have presented plans for the construction of the Alpenfestung, an impenetrable Alpine Fortress. The construction will be very expensive and due to our scarce resources, will require a lot of sacrifices."
operationsflavour.113.a:"What is this nonsense?! We must concentrate our remaining resources on a new counter-offensives!"
operationsflavour.113.b:"This may be our last option."

operationsflavour.115:"[GetNewsHeadline]Germany succedes in Operation Eisenhammer!"
operationsflavour.115.t:"[GetNewsHeadline]Germany succedes in Operation Eisenhammer!"
operationsflavour.115.d:"The  Russian sky has turned black due to the smoke from the burning power plants in the whole Transvolga region. A coordinated German attack of unmanned experimental bombers managed to catch the Soviet anti-air defences offguard and quickly destroyed the results of the Five Year Plans. This is a huge blow to the Soviet industry, and has definitely paralysed the Soviet military for many weeks to come. The fate of the Union is all but sealed."
operationsflavour.115.a:"We did it! The Russians are doomed!"
operationsflavour.115.b:"This is a disaster! We must mobilise all the reserves to help in reconstruction!"
operationsflavour.115.c:"Impressive. The Germans really do have the most advanced technology."

operationsflavour.116:"[GetNewsHeadline]Moscow strikes back!"
operationsflavour.116.t:"[GetNewsHeadline]Moscow strikes back!"
operationsflavour.116.d:"The Soviets have launched a great counteroffensive against German positions in the Central front. The Germans were totally caught offguard as their intelligence suggested that the Soviets could not commence any big offensives after their losses in summer. The fate of Moscow remains to be seen."
operationsflavour.116.a:"Goddamn Mongol hordes! Hold your positions at all cost!"
operationsflavour.116.b:"Cast the demons back to Abaddon!"
operationsflavour.116.c:"Russia is really unpredictable!"

operationsflavour.117:"[GetNewsHeadline]Soviets launch Operation Uranus!"
operationsflavour.117.t:"[GetNewsHeadline]Soviets launch Operation Uranus!"
operationsflavour.117.d:"The Soviets have launched Operation Uranus, a great offensive directed at the Caucasus front. It aims to encircle a big portion of the German army and then commence a full scale offensive against German positions in the Caucasus. The oilfields remain out of German hands for the time being."
operationsflavour.117.a:"We did not expect that!"
operationsflavour.117.b:"Forward! Destroy the Nazi pigs!"
operationsflavour.117.c:"The Russians are turning the tide!"

operationsflavour.118:"[GetNewsHeadline]Soviets launch Operation Bagration!"
operationsflavour.118.t:"[GetNewsHeadline]Soviets launch Operation Bagration!"
operationsflavour.118.d:"The Soviets have launched the greatest offensive of this war so far. Operation Bagration aims to destroy German forces in the Central front and speed up the advance towards mainland Germmany, and into the heart of the Nazi Reich. The fate of the war is at hand, but the response of the Germans remains to be seen."
operationsflavour.118.a:"We shall withstand this!"
operationsflavour.118.b:"Destroy the Germans once and for all!"
operationsflavour.118.c:"Germany is doomed!"

ostreich_army:"Armee des Ostreichs"
ostreich_army_desc:"We must protect our vast Ostreich lands from attacks, both internal and external. We must form local collaboration forces for this purpose."

ostreich_infrastructur:"Entwicklung des Ostreichs"
ostreich_infrastructur_desc:"We must develop our new lands and prepare them for future German settlers."

ostreich_tresure:"Schätze des Ostreichs"
ostreich_tresure_desc:"The Ostreich is full of mysteries and treasures hidden by the Russians during their retreat. We shall find every last piece and use them to further the glory of the Reich!"

begin_the_tresure_hunt:"Let the tresure hunt begin!"
begin_the_tresure_hunt_desc:"The vast Russian lands are still full of precious artifacts and other valuables. We must act quickly to seize them before the locals find and destroy them! We shall dispatch a special SS group to search for treasures and occult artifacts."

