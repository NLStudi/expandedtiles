umcflavourevents.24.t:"Tunisian Vichy France colonial soldiers status"
umcflavourevents.24.d:"After the surrender of continental France the new collaborationist government is willing to help us push the British out of North africa by sending some of its prewar Tunisian colonial elite to join our operations. Any help would is appreciated"
umcflavourevents.24.a:"Let them join us!"

umcflavourevents.24.t:"Tunisian Vichy France colonial soldiers status"
umcflavourevents.24.d:"After the surrender of continental France the new collaborationist government is willing to help us push the British out of North africa by sending some of its prewar Tunisian colonial elite to join our operations. Any help would is appreciated"
umcflavourevents.24.a:"Let them join us!"

umcflavourevents.25.t:"Invasion of Egypt!"
umcflavourevents.25.d:"After the surrender of continental France Italian forces intensified their attacks and thus managed to push deep into Egypt and are thretening to break our lines! We must organise a defensive force in that perimieter!"
umcflavourevents.25.a:"Send in the reinforcements!"

umcflavourevents.26.t:"Fate of Kluszkowce"
umcflavourevents.26.d:"Kluszkowce is a mountain area around the Polish city of Zakopane, it was a object of many border disputes between Poland and Czechoslovakia, later Slovakia. Now that Poland is not a problem anymore we can decide wheater to award our Slovakian allies with this land."
umcflavourevents.26.a:"Of course we will award them!"
umcflavourevents.26.b:"Klushkowitz will be part of the Reich!"

umcflavourevents.27.t:"Fate of Yugoslavia"
umcflavourevents.27.d:"Yugoslavia has been finally fully conquered by our forces, now we must establish occupation zones to ensure stability and to award all of our allies. The main question is wheater Coratia shall fall under Italian administration our our one"
umcflavourevents.27.a:"We will take control"
umcflavourevents.27.b:"Award the Italians"
GER_conquer_OdessaMyko:"According to §gOKW§! The §GFall München§! should allow us to §gconquer§! §GOdessa and Nikolajew§! in about §R90 days§!. To call this operation a success we must control §YOdessa, Mikolaiv, Balta, Vinnitsa and Proskuriv§! \n§gCurrent outcome:§!"
