ostreich_managment:"Vorstand für das Ostreich"
ostreich_managment_desc:"We must decide how to manage the newly-conquered, vast, resource-rich lands of the former Soviet Union, and their integration into the New Reich."

ostreich.15:"Formation of Russian Liberation Armies"
ostreich.15.t:"Formation of Russian Liberation Armies"
ostreich.15.d:"The Russian Liberation Army 'ROA' under Andrei Vlasov, as well as the 'KONR' under Bronislav Kaminski, have been formed. These two powerful men are the only representatives of the Neu Russland. It remains to be seen whether these men will cooperate, or whether there will be power struggles between them. For now, however, they strictly follow the German orders to fulfill the Great Crusade against Bolshevism. However, their actions after the  Crusade cannot be predicted at this time."
ostreich.15.a:"The Slavs will take the place of our men fighting and dying on the frontlines!"
ostreich.15.b:"Cursed traitors!"
ostreich.15.c:"A split in Russia?"

operation_munchen:"Commence Unternehmen München!"
operation_munchen_desc:"Unternehmen München is the German plan to invade Bessarabia and Odessa. With additional help from the Romanians, this plan is very likely to succeed. However, the results remain to be seen."

operation_taifun:"Commence Unternehmen Taifun!"
operation_taifun_desc:"Unternehmen Taifun is the final offensive planned to capture Moscow this year. If we do not succeed, Moscow will stay in Russian hands... until next summer!"

operation_decision_1942:"Planning our moves in the year 1942"
operation_decision_1942_desc:"We must decide where our next summer offensive should be concentrated on. We could capture the oil rich mountains of Caucasus, and give the Wehrmacht the fuel it desperately needs, or we could try to capture Moscow again, dealing a terrible blow to Soviet morale. We await your decision."

operation_blau:"Commence Fall Blau!"
operation_blau_desc:"We will attack the oil rich areas of Kuban and Caucasus. This task is very hard, mostly because of the terrible logicstical situation. Roads and railways in these areas are very old and prone to traffic jams and air attacks. Thanks to Organization Todt, we can overcome these problems quickly. The loss of Caucasian oil will bring down the Russian bear!"

operation_kreml:"Commence Fall Kreml!"
operation_kreml_desc:"We will renew our attack on Moscow. This task is very hard, mostly because of Soviet fortifications raised during our last offensive. We are prepared better this time however, and we have the whole summer to complete our offensive goals. The loss of the capital will bring down the Russian bear!"

operation_edelweiss:"Commence Unternehmen Edelweiß!"
operation_edelweiss_desc:"We have managed to achieve the original goals of Fall Blau. Now we have to finish what we started and cross the Caucasus mountain range to reach the oilfields of Baku."

operation_schneesturm:"Commence Unternehmen Schneesturm!"
operation_schneesturm_desc:"We have managed to achieve the original goals of Fall Kreml. Now we have to finish what we started and cross the Wolga river to secure our crossing into the Urals and Siberia."

operation_decision_1943:"Planning our moves in the year 1943"
operation_decision_1943_desc:"We must decide what our next summer offensive should be concentrated on. We could continue our with conventional offensive and try to defeat the Soviets with the Wehrmacht, or we could add something unconventional to our offensive and try to destroy Soviet Military capabilities. We await your decision."

operation_Eisenhammer:"Commence Unternehmen Eisenhammer!"
operation_Eisenhammer_desc:"Unternehmen Eisenhammer is a larg-scale bombing operation proposed by Luftwaffe to destroy the Soviet power supply, and in effect, nearly completely stop their industry for a significant amount of time. 75% of their power comes from power plants between the Wolga River and the Ural mountain ranges, and we will destroy them and cripple the Soviet bear!"

operation_zitadelle:"Commence Unternehmen Zitadelle!"
operation_zitadelle_desc:"Unternehmen Zitadelle aims to destroy the main Soviet forces in Central Russia and lay the groundwork for a decisive offensive in the following year. We will crush the Soviet bear with our raw firepower!"

operation_delphin:"Commence Unternehmen Delphin!"
operation_delphin_desc:"In the face of unexpected Soviet counteroffensives, we must act quickly to contain any breakthroughs they make in order to keep the Ostfront stable. There will be no defeat for Germany in this crusade against the Bolsheviks!"

operation_Laura:"Commence Unternehmen Laura!"
operation_Laura_desc:"Unternehmen Laura aims to exploit the gaps in Soviet breaches to destroy their leading units. If we succeed to do, the Russian army would be terribly weaked and the offensive in 1944 would be just a formality. Victory will be ours!"

operation_margarethe:"Commence Unternehmen Margarethe!"
operation_margarethe_desc:"With the trechearous actions of Hungary, we must act quickly to put them back into our hold! We will take control of the Hungarian military, and hold the line in the Transylvanian Mountains."

operation_joseph:"Commence Unternehmen Joseph!"
operation_joseph_desc:"Unternehmen Joseph is hopefully the last offensive of the prolonged Unternehmen Barbarossa. If this decisive strike succedes, we can easliy proclaim the fulfillment of the Großer Kreuzzug and the expansion of Lebensraum."

operation_sonnenwende:"Commence Unternehmen Sonnenwende!"
operation_sonnenwende_desc:"We must hold our positions against the Soviet hordes, and hold through this winter at all costs! Next year we shall defeat the Soviet bear and end this cursed war!"

operation_sudwind:"Commence Unternehmen Südwind!"
operation_sudwind_desc:"Unternehmen Südwind is our great effort to stop Soviet advance in Balkans and go on the offensive! We cannot allow the Soviets to reach Serbia or cross Transylvania!"

operation_hannibal:"Commence Unternehmen Hannibal!"
operation_hannibal_desc:"The Russians are pouring into the heart of Prussia! Every German man, woman and child should defend their Vaterland at all costs!"

operation_fruhlingserwachen:"Commence Unternehmen Frühlingserwachen!"
operation_fruhlingserwachen_desc:"This is our last chance to save Austria from the terrible Soviet advance. We must not lose the Osterreich to the Soviet hordes!"

defense_berlin:"Berliner Verteidigung"
defense_berlin_desc:"The Russians are quickly advancing toward our capital! The Führer ordered that the capital be prepared for a strong defense. He himself stated that he would stay and fight to the end. This action, however, seems futile as many German generals and officials have already fled Berlin to escape judegement for their actions."

alpenfestung_decision:"Question of Alpenfestung"
alpenfestung_decision_desc:"Alpenfestung is a mythical Alpine fortress that will fend off any attack and become a perfect base for future operations. The idea is to wait for the eventual conflict between the Soviets and the Western Allies, and when the time is right, we shall strike hard and retake our Fatherland! However, such a undertaking is very expensive and in the current state of war, may even be impossible to accomplish. We await your decision."

alpenfestung_construction_1:"Die erste Etappe der Alpenfestung Besteigung"
alpenfestung_construction_1_desc:"The first step of the Alpenfestung Besteigung is far from completed. But with the usage of nearly all the resources available, and even if it means other areas of industry will not function, we must complete our great effort!"

alpenfestung_construction_2:"Die zweite Etappe der Alpenfestung Besteigung"
alpenfestung_construction_2_desc:"We are halfway through the construction of the Alpenfestung Besteigung. It has caused severe lack in other industrial sectors, but this fortress takes the highest priority. We will finish it as soon as possible!"

################For the future use "#" instead of "-" Besides, I haven't seen such a well-written text yet#####################
beige:"Unternehmen Beige"
beige_desc:"Unternehmen Beige is a grand invasion plan of Baltic states."
munchen:"Unternehmen München"
munchen_desc:"Unternehmen München is German grand invasion plan of Bessarabia and Odessa, with the help of Germans to the Romanians this plan is very likely to succeeded."
taifun:"Unternehmen Taifun"
taifun_desc:"Unternehmen Taifun is the last chance offensive to capture Moscow this year. If we fail to succeed, Moscow will stay in Russian hands... Until next summer!"
blau:"Fall Blau"
blau_desc:"We have decided to attack the oil rich areas of Kuban and Caucasus. This task however is very hard, mostly form logicstical perspective, roads and railways in these areas are very old and prone to traffic jams. Thanks to Organization Todt we can overcome these problems quickly!"
kreml:"Fall Kreml"
kreml_desc:"We have decided to renew our attack on Moscow. This task is very hard because of Soviet fortifications raised during our offensive last winter. But now we are prepared better, and we have whole summer to complete our offensive goals."
edelweiss:"Unternehmen Edelweiß"
edelweiss_desc:"We managed to achieve the original goals of Fall Blau. Now we have to finish what we started, which is to cross the Caucasus mountain range and reach the oil-rich Baku."
schneestrum:"Unternehmen Schneesturm"
schneestrum_desc:"We managed to achieve the original goals of Fall Kreml. Now we have to finish what we started, which is to cross the Wolga river and secure our crossings."
Eisenhammer:"Unternehmen Eisenhammer"
Eisenhammer_desc:"Unternehmen Eisenhammer is a large scale bombing operation proposed by Luftwaffe to destroy the Soviet power supply and in effect to nearly completly stop their industry for significant amount of time, as 75% of their power comes form power plants between Wolga and Ural mountain range in Transwolga region."
Eisenhammer_sov:"Power plants in Transvolga destroyed"
Eisenhammer_sov_desc:"Germans managed to rase our glorious power plants in the Transvolga region, the fruits of Five Year Plans are now gone! These power plants were a key to keep our industry rolling, with their loss we can only rely on low-end Ural power plants which can't even supply our war industry. For some time soldiers are needed to help the reconstruction of our power supplies, also reinforcement are going to be late for all the frontline formations."
zitadelle:"Unternehmen Zitadelle"
zitadelle_desc:"Unternehmen Zitadelle aims to destroy main Soviet forces in central Russia and lay the groundwork for a decisive offensive in the following year."
delphin:"Unternehmen Delphin"
delphin_desc:"In the face of unexpected Soviet counteroffensive we must act quickly to contain any breakthroughs they make to keep the front stable. There will be no repeat of the winter of 1941!"
Laura:"Unternehmen Laura"
Laura_desc:"Unternehmen Laura aims to exploit the gaps in Soviet breaches to destroy their leading units. If we succeeded to do so the offensive in 1944 would be just a formality!"
margarethe:"Unternehmen Margarethe"
margarethe_desc:"With the unexpected change of sides done by Hungary we must act quickly to put them back into our hold!"
joseph:"Unternehmen Joseph"
joseph_desc:"Unternehmen Joseph is, what we hope, the last offensive of the prolonged Unternehmen Barbarossa. If this decisive strike succedes we can easliy proclaim Großer Kreuzzug is fulfilled!"
sonnenwende:"Unternehmen Sonnenwende"
sonnenwende_desc:"We must hold our positions agains as Soviet hordes are storming them. At all cost we must hold through this winter. Next year we shall end this cursed war!"
sudwind:"Unternehmen Südwind"
sudwind_desc:"Unternehmen Südwind is our great effort to stop Soviet advance in balkans and go on the offensive!"
hannibal:"Unternehmen Hannibal"
hannibal_desc:"Russians are pouring into our heartland-Prussia! Every brave German soldier shall defend his fatherland!"
fruhlingserwachen:"Unternehmen Frühlingserwachen"
fruhlingserwachen_desc:"This is our last chance to save Austria form Soviet advance, it is now or never!"
alpenfestung:"Alpenfestung bewaffnet und bereit!"
alpenfestung_desc:"Alpenfestung, the mythical Alpine fortress has now been completed, our enemies are dying on our vast minefields as well as from our fast response ski-snipers. The dream of Führer is now reality. German Volk can wait for our army to rush form the Alpes as Gods to liberate our Fatherland!"
aplenfestung_under_construction:"Alpenfestung im Bau"
aplenfestung_under_construction_desc:"Alpenfestung is now under construction, nearly all of the german formations and organizations help to raise it, form Arbeits Front through Kraft Durch Freude to Organization Todt. We all work together to save our Fatherland!"
alpen_construction1:"Alpenfestung under construction"
GER_terrorbomb:"German terror bombings"
GER_terrorraid:"German naval raids"
mass_stealings:"German mass lootings"
power_plants_bombed:"Soviet power supply has been destroyed"
uranusss:"Operation uranus began"
SOV_Reyn_est:"Soviets established military government in Rhine area"
baltic_intervention_idea:"Operation Nikolai"
baltic_intervention_idea_desc:"Operation Nikolai is name of Soviet intervention in baltic war."
hold_moskva:"Defense of Moskva!"
hold_moskva_desc:"Enemy is at the gates of Moskva! Every Soviet soldier, worker or even student shall raise and defend his beloved Motherland! Moskva shall stand!"
winter_offensive_ger:"Harsh Soviet winter"
winter_offensive_ger_desc:"Russian climate is not the one of the most plesant. If we add the unexpected Soviet offensive to this, we get a recipe for a catastrophe!"
1941_winter_offensive:"Winter Offensive of 1941"
1941_winter_offensive_desc:"Germans killed our brothers and sisters! Now it is time to counterattack and liberate our land! Forward, kill the fascisit pigs!"
1942_winter_offensive:"Operation Uranus"
1942_winter_offensive_desc:"Germans killed our brothers and sisters! Much of our land is now in their hands!  Now it is time to counterattack and liberate our Motherland! Forward, kill all the fascisit beasts!"
Operation_Ring_ger:"Fate of our encircled forces"
Operation_Ring_ger_desc:"Our encircled forces due to cold weather are now more vulnerable to soviet attacks!"
Operation_Ring:"Operation Ring"
Operation_Ring_desc:"Operation Ring main objective is to destroy the German pocket far behind the fornt line."
Polar_Star:"Operation Polar Star"
Polar_Star_desc:"Operation Polar Star is supposed to finally lift the siege of Leningrad!"
Kutuzov:"Operation Kutuzov"
Kutuzov_desc:"We must liberate the industrial heart of Ukrainian SSR - Kharkov!"
Iskra:"Operation Iskra"
Iskra_desc:"Operation Iskra is focused on pushing the Germans further west during this winter."
Bagration:"Operation Bagration"
Bagration_desc:"Operation Bagration is one of the biggest offensive ever! Its main goals are liberation of Belarus and preparing positions for the great offensive against mainland Germany!"
JassyKishinev_Offensive:"Jassy Kishinev Offensive"
JassyKishinev_Offensive_desc:"Jassy Kishinev Offensive is our final effort to push the Germans out of Ukraine and into Romania. If Romania falls Germans will loose their last oil supply!"
Budapest_Offensive:"Budapest Offensive"
Budapest_Offensive_desc:"Budapest Offensive is concentrated on quickly traversing the southern Balkans and seizing the city of Budapest."
Vienna_Offensive:"Vienna Offensive"
Vienna_Offensive_desc:"Vienna Offensive is concentrated on fast destruction of German forces in Hungary and then quick traverse towards city of Vienna."
VistulaOder_Offensive:"Vistula–Oder Offensive"
VistulaOder_Offensive_desc:"Vistula–Oder Offensive is our great push through Poland to speed up destruction of Germany."
Battle_of_Berlin:"Battle of Berlin"
Battle_of_Berlin_desc:"The final struggle of The Great Patriotic War, the battle of heart of Germany - Berlin. Germans prepared extensive defences so the task won't be simple, but our brave soldiers will capture the city eventually."
hold_moskva_dec:"Defend of Moskva at all costs!"
hold_moskva_dec_desc:"Enemy is at the gates of Moskva! Every Soviet soldier, worker or even student shall raise and defend his beloved Motherland! Moskva shall stand!"
