allies_expanded.1.t:"Invasion of Madagascar"
allies_expanded.1.d:"After the fall of France, Madagascar decided to side with The Petains regime in Vichy. Given its strategic location Madagascar could become a threat to our supply lanes in Indian ocean. We already have evidence of German Uboots using Madagascar as base of operations."
allies_expanded.1.a:"Commence the operation"

allies_expanded.2.t:"[GetNewsHeadline]Allied invasion of Madagascar"
allies_expanded.2.d:"Allies launched a joint invasion of former French colony of Madagascar. The operation was mainly carried out by British forces. It is rumored that British command did not inform the French exiles about the operation at all, which lead to some tensions in the alliance."
allies_expanded.2.a:"Just get the job done!"
allies_expanded.2.b:"That is a problem"
allies_expanded.2.c:"Another front opens"

allies_expanded.3.t:"Invasion of Gabon"
allies_expanded.3.d:"Gabon colonial administartion sided with the Vichy regime! We must mobilize and destroy the traitors as soon as possible, to fully secure our safety."
allies_expanded.3.a:"Death to traitors!"
allies_expanded.3.b:"Another front opens"


allies_expanded.4.t:"[GetNewsHeadline]Free French invade the rebels in Gabon"
allies_expanded.4.d:"Todays morning Free French forces crossed into the French Gabon colony in order to liberate it from Vichy control. The Gabonese chances to win this struggle, given their limited resources, are very low"
allies_expanded.4.a:"Death to traitors!"
allies_expanded.4.b:"Another front opens"


allies_expanded.5.t:"Soviets move into Poland!"
allies_expanded.5.d:"Soviets have launched their own campagin against Poland, officialy in order to secure the eastern lands and peoples of western Belarus and Ukraine. Technically they did not declare war on our ally so we are not fully obligated to retailiate but this is clearly an act of aggression"
allies_expanded.5.a:"Its time to end this axis of evil!"
allies_expanded.5.b:"We can't fight them both at once!"





allies_expanded.6.t:"[GetNewsHeadline]Allies declare war on Soviets"
allies_expanded.6.d:"In a shocking development, Britain and France have declared war on the Soviet Union following its invasion of Poland today. Just weeks after Germany attacked Poland from the west, Soviet forces entered from the east, violating Polands sovereignty under the Molotov-Ribbentrop Pact.\n[ENG.GetLeader] condemned the Soviet aggression, stating, We will not stand by while another dictatorship tears apart a free nation. France echoed the call, marking the Allies decision to fight both Nazi Germany and the USSR.\nThis declaration of war expands the conflict dramatically, placing the Allies in a two-front struggle that could alter the course of the war."
allies_expanded.6.a:"We protect our allies no matter what!"
allies_expanded.6.b:"They just went all in!"
allies_expanded.6.c:"One thing is for sure, they have some balls"
allies_expanded.6.e:"The west shall fall"

allies_expanded.7.t:"Alliance with the Soviet Union?"
allies_expanded.7.d:"Our campagin in Poland is greatly successfull. After Soviets started their own incursion into the eastern Poland the situation improved even more. This however caused Allies to declare war on the Soviets. Technically we are not in any mutual assistance pact with them but given this new developement."
allies_expanded.7.a:"Send an envoy to Soviets!"
allies_expanded.7.b:"We don't need Bloshevik assistance!"


allies_expanded.8.t:"Germans ask for an alliance"
allies_expanded.8.d:"Germans reached out to us to discuss an alliance against the Allied powers. Since we are already at war with most of them this is a very lucrative porposition."
allies_expanded.8.a:"Sure thing we will crush the imperialists togehter"
allies_expanded.8.b:"No more deals with fascists!"




allies_expanded.9.t:"[GetNewsHeadline]Alliance between Germany and Soviet Union!"
allies_expanded.9.d:"In a historic and alarming development, the Soviet Union and Nazi Germany have announced a formal alliance against the Western Allies after Britain and France declared war on the USSR today. Following the Soviet invasion of eastern Poland this morning, which violated Polands sovereignty, the Allied powers responded with declarations of war, expanding the conflict.\nHours later, German Führer Adolf Hitler and Soviet leader Joseph Stalin jointly declared a united front against Britain and France, solidifying their cooperation under the Molotov-Ribbentrop Pact. The announcement marks a drastic realignment in global politics, with both totalitarian regimes pledging military and economic support to each other."
allies_expanded.9.a:"We will deal with them both"
allies_expanded.9.b:"Axis of evil grows stronger!"
allies_expanded.9.c:"We will crush the imperialists together!"
allies_expanded.9.e:"We are friends, for now.."




allies_expanded.10.t:"Peace with the Soviets?"
allies_expanded.10.d:"Now that Germany finally showed its true colors and backstabbed their Soviet ally perhaps its the time to enter a temporary peace. We can send the soviets a letter proposing to end hostilites"
allies_expanded.10.a:"Send them the letter"
allies_expanded.10.b:"No way we are trusting this dictator!"



allies_expanded.11.t:"A letter from Allies"
allies_expanded.11.d:"Now that Germany finally showed its true colors and backstabbed us perhaps its the time to enter a temporary peace with allied powers. They have sent us a letter requesting peace."
allies_expanded.11.a:"Its time to end this meaningless conflict"
allies_expanded.11.b:"No way we are trusting the capitalists!"



allies_expanded.12.t:"[GetNewsHeadline]Allies and Soviets announce a temporary peace"
allies_expanded.12.d:"In a dramatic turn of events, Nazi Germany has launched a surprise attack on its former ally, the Soviet Union, just months after forming a military pact against the Western Allies. Adolf Hitler's betrayal, which began with a sudden blitzkrieg assault on Soviet positions early this morning, has shattered the alliance between the two totalitarian powers.\nIn response, Britain and France, previously at war with both Germany and the USSR, have signed a temporary peace agreement with Soviet leader [SOV.GetLeader] to focus on defeating the now-isolated Nazi regime. British Prime Minister [ENG.GetLeader] called the truce 'a pragmatic decision to defeat the greater evil.'\nThe temporary peace, hastily negotiated, allows both the Western Allies and the USSR to coordinate military efforts against Hitler's forces."

allies_expanded.12.b:"Some stability returns at least"
allies_expanded.12.c:"Peace at last"
allies_expanded.12.e:"Endsieg is unser!"

rem_germany_expanded.19.t:"Supporting friendly regimes"
rem_germany_expanded.19.d:"We must support other same thinking regimes in their fight against bolshevism and capitalism. This way we can secure ourselves some benefits in the future like access to some rare resources or possible mediatiors in the upcoming war"
rem_germany_expanded.19.a:"Lets help our friends!"
