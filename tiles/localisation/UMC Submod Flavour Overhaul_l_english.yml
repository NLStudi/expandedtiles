operation_grun_desc:"Czechoslovakia must be dealt with once and for all! Forwad to Prag!"
grun:"Unternehmen Grün"
grun_desc:"Unternehmen Grün or operation green is a German plan to conquer Czechoslovakia within a few weeks. It is based on a major bombing offensive preceded by a large panzer thrust."
