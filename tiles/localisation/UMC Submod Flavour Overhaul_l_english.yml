ostreich.2:"Depotverwaltung für die Region Ukraine"
ostreich.2.t:"Depotverwaltung für die Region Ukraine"
ostreich.2.d:"We must decide the fate of natural resources and their excavation in Reichskommisariat Ukraine. We can create labour camps that focus on excavation, and decide how much of the resources we are willing to directly take into our control. We should choose wisely, however, as taking too many resources may destabilise the Reichskommisariat."
ostreich.2.a:"Take only the vital resources."
ostreich.2.b:"Take moderate amount of resources."
ostreich.2.c:"Reich shall control everything!"

