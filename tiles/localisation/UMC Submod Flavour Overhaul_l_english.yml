nuclear_decisions_desc:"\n\n\n\n\n\nA §Ynuclear weapon§! is an explosive device that derives its §Rdestructive force§! from §Ynuclear reactions§!, either fission (fission bomb) or a combination of fission and fusion reactions (§Ythermonuclear bomb§!), producing a §Rnuclear explosion§!. Both bomb types release §Ylarge quantities of energy§! from relatively §Csmall amounts of matter§!. By investing in §Cnuclear research and infrastructure§!, we can gain a §Gsignificant military advantage§! over our enemies, but also face the risk of triggering a §Rglobal nuclear war§!."
