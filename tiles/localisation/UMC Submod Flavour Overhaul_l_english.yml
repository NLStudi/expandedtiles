ostreich.7:"Integration of Sankt Petersburg"
ostreich.7.t:"Integration of Sankt Petersburg"
ostreich.7.d:"With our great victory against Bolschewismus and expansion of our Lebensraum, the local population is not very content with our presence. Red Army partisans are still attacking our transports as well as killing the German settlers. To stop this, Reichsführer SS Heinrich Himmler, as advised by Adolf Eichmann, prepared the 'Reichsführer Direktive zur Lösung der slawischen Frage', meaning 'The Reichsführers directive to solve the question of Slavs'. According to the directive, only a small percentage of Slavs that have Aryan characteristics can live their lives and become Germanized, while the rest shall be relocated form the big cities into the loclal villages and smaller towns to make space for German settlers. To eradicate the Russiche past of Sankt Petersburg we should rename it."
ostreich.7.a:"Name it after our Führer!"
ostreich.7.b:"Name it after the Baltic see!"
ostreich.7.c:"Name it after the conqueror of Sankt Petersburg"
ostreich.7.e:"Name it after the Great War hero!"

###
begin_mass_stealing:"Commence Hermann Göring Direktive 'Gold und Marmor'!"
begin_mass_stealing_desc:"Hermann Göring Direktive 'Gold und Marmor' focuses on accelerating and improving the organization of mass transports of items and valuable materials from the former Soviet Union directly to the heart of the Reich - Berlin, which is now being reconstructed to become the capital of all Germanic people. A good percentage of the resources, mostly marble and gold, will go directly to help the reconstruction. The rest will go to the private collections of party officials and even regular soldiers, and a significant amount will also be sent to supply the newly constructed 'Museum der Ostfront'."

ostreich.8:"Hermann Göring Direktive 'Gold und Marmor'"
ostreich.8.t:"Hermann Göring Direktive 'Gold und Marmor'"
ostreich.8.d:"Hermann Göring Direktive 'Gold und Marmor' focuses on accelerating and improving the organization of mass transports of items and valuable materials from the former Soviet Union directly to the heart of the Reich - Berlin, which is now being reconstructed to become the capital of all Germanic people. A good percentage of the resources, mostly marble and gold, will go directly to help the reconstruction. The rest will go to the private collections of party officials and even regular soldiers, and a significant amount will also be sent to supply the newly constructed 'Museum der Ostfront'."
ostreich.8.a:"We will take only what has always belonged to the German volk."
ostreich.8.b:"And who is the barbarian now? They will regret it!"
ostreich.8.c:"Germans know no limits!"

GER_mass_lootings:"Direktive 'Gold und Marmor'"
GER_mass_lootings_desc:"Stealing, a practice as old as mankind itself. We will take all the valuables in former Soviet lands and use it to build a glorious Reich for the German people."

RUK_treu_tapfer:"Schuma battalions"
RUK_treu_tapfer_desc:"'Treu, Tapfer, Gehorsam.'"

RMO_lokot_republic:"Lokot Republic established"
RMO_lokot_republic_desc:"A semi-autonomous nation has been established in Russia. The newly formed Lokot Republic will operate under Bronislav Kaminski and his KONR. Whether this will be the New Russia or a mere puppet of the Nazi Reich remains to be seen."

RMO_ROA_ful:"Active ROA-Vlasov army"
RMO_ROA_ful_desc:"The ROA, under Andrei Vlasov, is currently the most powerful army of non-Germans in the Wehrmacht. Vlasov's soldiers are known for their bravery and dedication to the cause of the Reich. We shall allow their existence, however, we will not award them any medals or mention them in propaganda speeches. After all, no Slav can be seen as equals to the German soldiers!"

RMO_KONR_ful:"Active KONR-Kaminski army"
RMO_KONR_ful_desc:"The KONR, under Bronislav Kaminski, is currently the second most powerful army consisting of non-Germans in the Wehrmacht. Kaminski's soldiers are known for their brutality and ruthlessness in furthering the cause of the Reich. We shall allow their existence, however, we will not award them any medals or mention them in propaganda speeches. After all, no Slav can be seen as equals to the German soldiers!"

RWO_kosaken:"Helmuth von Pannwitz Kosaken Battalionen"
RWO_kosaken_desc:"Helmuth von Pannwitz is known for his love of the Cossacs, and he has created independent battalions of Cossack cavalry in the the conquered Wolga Gebeite. These battalions have proven to be very effective against partisans and as Fast Response Teams in the steppes of Kuban and the shores of Wolga."

RKA_mountain:"Spezielle Kaukasische Gebirgsdivisionen"
RKA_mountain_desc:"General Diel has created special mountain divisions from the indigenous peoples of the Caucasus. They have proven to be very effective against partisans hiding in the Caucasian mountains, and to put down worker strikes in mines."

RUR_armee:"Idel Ural freiwillinge brigaden"
RUR_armee_desc:"Fritz Todt, seeing the harsh treatment of the peoples of the Ural under Soviet control, has created voluntary Ural brigades. They help to fight partisans in the high mountains of the Ural as well as in the plains near Simbirsk. These multifunctional brigades have proven their value in countless battles and border skirmishes."

ostreich.10:"Establishment of Ukrainische Ghettos"
ostreich.10.t:"Integrating the Schwarzmeer Gebeite"
ostreich.10.d:"With our great victory against Bolschewismus and expansion of our Lebensraum, the local population is not very content with our presence. Red Army and OUN partisans are still attacking our transports as well as killing the new German settlers. To stop this, Reichsführer SS Heinrich Himmler, as advised by Adolf Eichmann, has prepared the 'Reichsführer Direktive zur Lösung der slawischen Frage', meaning 'the Reichsführers directive to solve the question of Slavs'. According to the directive, only a small percentage of Slavs that have Aryan characteristics can live their lives and become Germanized while the rest shall be relocated form the big cities into the loclal villages and smaller towns to make space for German settlers."
ostreich.10.a:"Schwarzmeer is back in our hold!"

ostreich.11:"Establishment of Ostland Ghettos"
ostreich.11.t:"Integrating the Windenstadt"
ostreich.11.d:"With our great victory against Bolschewismus and expansion of our Lebensraum, the local population is not very content with our presence. Red Army partisans are still attacking our transports as well as killing the new German settlers. To stop this, Reichsführer SS Heinrich Himmler, as advised by Adolf Eichmann, has prepared the 'Reichsführer Direktive zur Lösung der slawischen Frage', meaning 'the Reichsführers directive to solve the question of Slavs'. According to the directive, only a small percentage of Slavs that have Aryan characteristics can live their lives and become Germanized while the rest shall be relocated form the big cities into the loclal villages and smaller towns to make space for German settlers."
ostreich.11.a:"Put the Slawisch where they belong!"

ostreich.12:"Establishment of Don-Wolga Ghettos"
ostreich.12.t:"Integrating the Erzengel"
ostreich.12.d:"With our great victory against Bolschewismus and expansion of our Lebensraum, the local population is not very content with our presence. Red Army partisans are still attacking our transports as well as killing the new German settlers. To stop this, Reichsführer SS Heinrich Himmler, as advised by Adolf Eichmann, has prepared the 'Reichsführer Direktive zur Lösung der slawischen Frage', meaning 'the Reichsführers directive to solve the question of Slavs'. According to the directive, only a small percentage of Slavs that have Aryan characteristics can live their lives and become Germanized while the rest shall be relocated form the big cities into the loclal villages and smaller towns to make space for German settlers."
ostreich.12.a:"Put the Slawisch where they belong!"

ostreich.13:"Establishment of Kaukasische Ghettos"
ostreich.13.t:"Establishment of Kaukasische Ghettos"
ostreich.13.d:"With our great victory against Bolschewismus and expansion of our Lebensraum, the local population is not very content with our presence. Red Army partisans are still attacking our transports as well as killing the new German settlers. To stop this, Reichsführer SS Heinrich Himmler, as advised by Adolf Eichmann, has prepared the 'Reichsführer Direktive zur Lösung der slawischen Frage', meaning 'the Reichsführers directive to solve the question of Slavs'. According to the directive, only a small percentage of Slavs that have Aryan characteristics can live their lives and become Germanized while the rest shall be put in Ghettos in selected cities. For the Kaukasien Gebeite, one city was choosen: Katharinastadt. The deportations shall begin soon."
ostreich.13.a:"Put the Slawisch where they belong!"

