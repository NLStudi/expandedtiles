umcflavour.1:"Reichswerke Hermann Göring expansion into Ostmark!"
umcflavour.1.t:"Reichswerke Hermann Göring expansion into Ostmark!"
umcflavour.1.d:"Along with recent Anschluss of Ostmark(Austria) Germany also expanded its industiral branches into that country. Reichswerke now controls most of former Austrian enterprises. Its a big boost to the German economy with the rare raw metals that are found in Austrian mines."
umcflavour.1.a:"Wünderbar!"
umcflavour.1.b:"Germany grows stronger"
umcflavour.2:"Reichswerke Hermann Göring expansion into Czechoslovakia!"
umcflavour.2.t:"Reichswerke Hermann Göring expansion into Czechoslovakia!"
umcflavour.2.d:"Along with recent unexpected annexation of Czechoslovakia by Germany, Germans also expanded their industiral branches into that country. Reichswerke now controls most of former Czechoslovak enterprises. Its a big boost to the German economy with the huge military industry that Czechoslovakia once had."
umcflavour.2.a:"Establish new Panzer factories!"
umcflavour.2.b:"Big boost to their economy"
umcflavour.3:"Reichswerke Hermann Göring expansionds to the east!"
umcflavour.3.t:"Reichswerke Hermann Göring expansionds to the east!"
umcflavour.3.d:"With recent conquers of the Reich came a large amount of industry. Reichswerke Hermann Göring now expands into those industries and converts them to fulfill the Reichs needs"
umcflavour.3.a:"Lebensraum is ours to use!"
umcflavour.3.b:"Mad times"





reichswerke_ger:"§YReichswerke Hermann Göring§!"
reichswerke_ger_desc:"§YReichswerke Hermann Göring§! was an industrial conglomerate in Nazi Germany. It was established in July 1937 to extract and process domestic iron ores from Salzgitter that were deemed uneconomical by the privately held steel mills. The state-owned §YReichswerke§! was seen as a vehicle of hastening growth in ore mining and steel output regardless of private capitalists' plans and opinions, which ran contrary to Adolf Hitler's strategic vision. In November 1937, Reichsminister of Aviation Hermann Göring obtained unchecked access to state financing and launched a chain of mergers, diversifying into military industries with the absorption of Rheinmetall. Göring himself supervised the §YReichswerke§! but did not own it in any sense and did not make personal profit from it directly, although at times he withdrew cash for personal expenses."





soviet_deportations:"§RSoviet deportations§! and anti partisant actions"

soviet_deportations_desc:"§RPopulation transfer§! in the Soviet Union (Rus: §RДепортации народов в СССР§!) was the forced transfer by the Soviet government of various groups from 1930 up to 1952 ordered by Soviet leader §RJoseph Stalin§! and executed by the §RNKVD official Lavrentiy Beria§!. It may be classified into the following broad categories: deportations of §7anti-Soviet§! categories of population (often classified as §7enemies of workers§!), deportations of entire nationalities, labor force transfer, and organized migrations in opposite directions to fill ethnically cleansed territories. §RDekulakization§! marked the first time that an entire class was deported, whereas the deportation of §7Soviet Koreans§! in 1937 marked the precedent of a specific ethnic deportation of an entire nationality. In most cases, their destinations were underpopulated remote areas. This includes deportations to the §RSoviet Union§! of non-Soviet citizens from countries outside the §RUSSR§!. It has been estimated that, in their entirety, internal forced migrations affected at least §76 million people§!. Of this total, §71.8 million kulaks§! were deported in 1930–31, §71.0 million peasants and ethnic minorities§! in 1932–39, whereas about §73.5 million ethnic minorities§! were further resettled during 1940–52. §RThe Soviet Union§! also practiced deportations in occupied territories with over 50,000 perishing from the §7Baltic States§! and 300,000 to 360,000 perishing during the expulsion of §7Germans from Eastern Europe§! due to Soviet deportation, massacres, and internment and labour camps."
