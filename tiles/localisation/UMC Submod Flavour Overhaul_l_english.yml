Autobahnen_ger:"Die §GReichsautobahnen§!"
Autobahnen_ger_desc:"                                                    The §GReichsautobahn system§! was the                                                        beginning of the German  autobahns                                                         under §gNazi Germany§!. There had been                                                        previous plans for controlled-access                                                         highways in Germany under the                                                                §CWeimar Republic§!, and two had been constructed, but work had yet to start on long-distance highways. After previously opposing plans for a highway network, the Nazis embraced them after coming to power and presented the project as Hitler's own idea. They were termed §g'Adolf Hitler's roads'§! ('German: §gStraßen Adolf Hitlers§!') and presented as a major contribution to the reduction of unemployment. Other reasons for the project included enabling Germans to explore and appreciate their country, and there was a strong aesthetic element to the execution of the project under the Third Reich; §gmilitary applications§!, although to a lesser extent than has often been thought; a permanent monument to the Third Reich, often compared to the pyramids; and general promotion of motoring as a modernization that in itself had military applications."
