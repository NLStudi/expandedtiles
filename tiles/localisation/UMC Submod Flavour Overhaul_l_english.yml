rem_germany_expanded.20.t:"Help from [GER.GetName] has arrived!"
rem_germany_expanded.20.d:"We have recived shipment from our friends in Berlin, it will surely help us in our struggle!"
rem_germany_expanded.20.a:"Send our regards to [GER.GetLeader]"
Pacify_slowenien:"Pacify §g[102.GetName]§!"

umcflavourevents.40.t:"The city of Belomorsk"
umcflavourevents.40.d:"The creation of White sea canal attracted lots of new settlers to the White sea shores, to accomodate for this we must establish a new city that will incorporate all of the local viallages and settlements into one big organized city!"
umcflavourevents.40.a:"Socialism knows no bounds!"
Pacify_slowenien:"Pacify §g[102.GetName]§!"




rem_germany_expanded.23.t:"The occupation of Denmark"
rem_germany_expanded.23.d:"The Danes have surrenderd to our Heer. In order to fully protect and unite our little germanic brothers we must sieze control over our claimed lands."
rem_germany_expanded.23.a:"The whole Schleswig is one once again"
Pacify_slowenien:"Pacify §g[102.GetName]§!"


rem_germany_expanded.24.t:"Soviet army in disarray!"
rem_germany_expanded.24.d:"Soviets were caught totally offguard. Their soldiers are fleeing in disarray and defecting in huge numbers."
rem_germany_expanded.24.a:"Blyat, all the purges!"
rem_germany_expanded.24.b:"Haha! We will be in Moscow in no time!"


rem_soviet_expanded.24.t:"Red army managed to reorganize!"
rem_soviet_expanded.24.d:"After the initial shock that came after the German surprise attack our forces managed to reorganize, we are now ready to drive the invaders out!"
rem_soviet_expanded.24.a:"Vperyod na Berlin!"

SOV_surprise_attack:"Red army in disarray!"


