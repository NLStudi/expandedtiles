soviet_eco:"Soviet Five Year Plans"
soviet_eco_desc:"\n\n\n\n\n\nFive Year Plans were a vital part of Soviet economy. Thanks to them Stalin managed to transfrom Soviet Union from agrictultural to heavily industralized conutry in just few years. This however came with great cost of human life and well being, forced relocations and terrible working conditions killed many people, mostly political opponents. "
