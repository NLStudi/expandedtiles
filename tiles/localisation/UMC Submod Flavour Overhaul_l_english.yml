flavourmr.47.t:"Operation Countenance"
flavourmr.47.d:"Operation Countenance is codename for a large scaled Anglo-Soviet invasion of Iran. The invasion's strategic purpose is to ensure the safety of Allied supply lines to the USSR, secure Iranian oil fields, limit German influence in Iran and preempt a possible Axis advance from Turkey through Iran toward the Baku oil fields or British India"
umcflavour.47.a:"Send proposition to the Soviets"
umcflavour.47.b:"Too dangerous"

flavourmr.45.t:"The Anglo-Soviet invasion of Iran"
flavourmr.45.d:"The Anglo-Soviet invasion of Iran strategic purpose is to ensure the safety of Allied supply lines to the USSR, secure Iranian oil fields, limit German influence in Iran and preempt a possible Axis advance from Turkey through Iran toward the Baku oil fields or British India"
umcflavour.45.a:"Prepare the invasion forces"
umcflavour.45.b:"We are busy fighting Germans right now!"
sucessful_invasion_of_iran:"Iranian army has been crushed!"
unsucessful_invasion_of_iran:"Iranian army stands firm"

flavourmr.46.t:"[GetNewsHeadline]The Anglo-Soviet invasion of Iran"
flavourmr.46.d:"The Anglo-Soviet invasion of Iran was a total success with Soviet forces advancing on key Iranian cities form the north and English and Indian troops form the south quickly securing Iranian oil fields. The great Iranian army that has been built for many years was quickly overrrun by technologically superior invasion forces. There are still large scaled bombing raids of Iranian cities conducted mainly by Red airforce. The Shah has already proposed a ceasefire and this willingness to start negotiating."
umcflavour.46.a:"Southern flank secured!"
umcflavour.46.b:"Well done boys!"
umcflavour.46.c:"This is the end!"
umcflavour.46.e:"Poor Iran"


flavourmr.49.t:"[GetNewsHeadline]The Anglo-Soviet invasion of Iran is halted"
flavourmr.49.d:"The Anglo-Soviet invasion of Iran was a total failure with Soviet spearheads being stopped in the northern narrow mountain passes and English and Indian troops being stopped by dug in Iranian tropps with help of well organized gurellia warfare behind their lines. The great Iranian army that has been built for many years has shown that it can withstand the technologically superior invasion forces. There are still large scaled bombing raids of Iranian cities conducted by Red and Royal airforces. The Shah has signed a cooperation treaty with Germany and first supplies should arrive soon through Turkey"
umcflavour.49.a:"New ally against the verdammt British and Blosheviks"
umcflavour.49.b:"This is getting out of hand!"
umcflavour.49.c:"Show them the true power of Persia!"
umcflavour.49.e:"Unexpected!"


flavourmr.48.t:"The Alam-Ribbentropp pact"
flavourmr.48.d:"The Alam-Ribbentropp pact is a mutual assistance pact between Germany and Iran. Its main purpose is to help Iran withstand the ongoing Anglo-Soviet invasion. We will send great amount of weapons to Iran via Turkey and also provide some doctrinal expertise. In exchange we will gain access to Iranian oil deposits and gain a perfect operation base for invasion of Baku oil fields as well as starting point of invasion of British India."
umcflavour.48.a:"Sign the pact and ask Turkey for passage!"
umcflavour.48.b:"Irans only purpose is to distract the Soviets!"
GER_advisosrs_PER:"German advisors on ground"

flavourmr.50.t:"The Alam-Ribbentropp-Saracoğlu pact"
flavourmr.50.d:"The Alam-Ribbentropp-Saracoğlu pact is a mutual assistance pact between Germany, Iran and Turkey as a operation base. Its main purpose is to help Iran withstand the ongoing Anglo-Soviet invasion. Germans will send great amount of weapons to Iran via our country. In exchange we will gain some economical aid form the Reich. This pact can however anger British"
umcflavour.50.a:"Sign the pact"
umcflavour.50.b:"Its too dangerous"

flavourmr.51.t:"The Alam-Ribbentropp-Saracoğlu pact is signed!"
flavourmr.51.d:"The Alam-Ribbentropp-Saracoğlu pact has been signed today in Turkish city of Trabzon by all three representatives. The British have already expressed their opinions on the pact"
umcflavour.51.a:"Wunderbar!"
umcflavour.51.b:"Our only chance of survival!"

flavourmr.53.t:"The Alam-Ribbentropp-Saracoğlu pact is rejected!"
flavourmr.53.d:"The Alam-Ribbentropp-Saracoğlu pact has been rejceted by the Turks. It means that there will be no help for the fighting Iran."
umcflavour.53.a:"Sheisse! Stubbron pacifists"
umcflavour.53.b:"Our only chance of survival is lost!"
umcflavour.53.c:"Commence Unternehmen Gertrud!"


flavourmr.52.t:"The Alam-Ribbentropp-Saracoğlu pact is signed!"
flavourmr.52.d:"The Alam-Ribbentropp-Saracoğlu pact has been signed today in Turkish city of Trabzon by all three representatives. This will strenghen the Iranian resistance greatly. We still have a chance to stop the weapon transports with massive and coordinated bombardments of Turkish railways leading to Iran. This may spark a full scaled war in the area!"
flavourmr.52.a:"The plan is too risky!"
flavourmr.52.b:"Send in the RAF!"

flavourmr.54.t:"RAF bombed our railways!"
flavourmr.54.d:"Today at early morning hours a great amount of RAF bombers entered our airspace and proceeded in direction of Black See. Our fighters trying to intercept were quickly shot down by escorting fighters. The bombers then conducted a massive bombardment alongsiede the whole northern railway destroying supply hubs and decimating ports. The repairs will take a long time."
flavourmr.54.a:"Ask Germans for support!"
flavourmr.54.b:"There is nothing we can do "

flavourmr.55.t:"RAF bombed Turkish railways!"
flavourmr.55.d:"Today at early morning hours a great amount of RAF bombers entered Turkish airspace and proceeded in direction of Black See. Turkish fighters trying to intercept were quickly shot down by escorting fighters. The bombers then conducted a massive bombardment alongsiede the whole northern railway destroying supply hubs and decimating ports. The repairs will take a long time. Turkey is asking us for support!"
flavourmr.55.a:"Retaliate with full force!"
flavourmr.55.b:"We are not ready for this"



flavourmr.56.t:"[GetNewsHeadline]Total war in minor Asia!"
flavourmr.56.d:"Following the failed Anglo-Soviet invasion of Iran the political situation has escalated quickly with Germany annoucning a large scaled aid operation to help the fighting Iranians that greatly endangered the British interests in the area. this was enough for them to bomb Turkish railways that were meant to transport the mentioned aid. In response Germans launched a large scaled bombing raid against British forces in the area and pressed Turkey to declare war on England. Now the whole area is a war zone"
umcflavour.56.a:"They wanted it not us!"
umcflavour.56.b:"One more foe to fight"
umcflavour.56.c:"Everything for the survival of Persia!"
umcflavour.56.e:"Total war?"




flavourmr.57.t:"Occupy Tangier?"
flavourmr.57.d:"With French fall on the horizon a opportunity rises to finally retake Tangier. We can use securing it from German or Italian invasion as a excuse. There is a very low chance that allies will react to this at all"
flavourmr.57.a:"Seize it!"
flavourmr.57.b:"Better not"


flavourmr.58.t:"[GetNewsHeadline]Spain occupies Tangier International Zone!"
flavourmr.58.d:"Todays morning 4000 Spanish Morrocan troops entered the International Tangier Zone and seized all the administration buildings taking full control of the area in the process. We are still waiting for the reaction of Major powers"
umcflavour.58.a:"Great job!"
umcflavour.58.b:"We have more important things to do!"
umcflavour.58.c:"Thats it take it back by force!"
umcflavour.58.e:"Interesting"
antarctica.2.b:"We will buy it §R(If Norway accepts a new colonial struggle will begin!)§!"
