rem_soviet_expanded.1.t:"[GetNewsHeadline]Soviet Union Launches the Third Five Year Plan!"
rem_soviet_expanded.1.d:"Soviet Union announced the start of third Five Year plan. The plan aims to increase overall production and greatly increase welfare of Soviet peoples."
rem_soviet_expanded.1.a:"We will complete it in 4 years!"
rem_soviet_expanded.1.b:"Filthy Bolsheviks"
rem_soviet_expanded.1.c:"USSR grows stronger"

rem_soviet_expanded.17.t:"Start of third Five Year Plan"
rem_soviet_expanded.17.d:"Third Five Year plan aims to increase overall production and greatly increase welfare of our people. We will quadruple our grain production as well as create many new working places and consumer goods factories all around our glorius state"
rem_soviet_expanded.17.a:"Forward towards brighter future!"

rem_soviet_expanded.2.t:"Second Five Year Plan is completed"
rem_soviet_expanded.2.d:"Second Five Year Plan has been fully completed without any delays! Our production goals have been far surpassed by great achivements of our workers. All of this thanks to their determination and skill."
rem_soviet_expanded.2.a:"Glory to our workers!"

rem_soviet_expanded.3.t:"Increasing the oil reserves"
rem_soviet_expanded.3.d:"We must make sure that our state has sufficent oil supply and reserves in case of some disastarous event. We are already noticing that some domains of our industry are suffering from lack of oil even during peacetime"
rem_soviet_expanded.3.a:"Oil is the blood of our Union"

rem_soviet_expanded.4.t:"Modernization of our railway system"
rem_soviet_expanded.4.d:"Our railway system dates back to the Imperial era, and just like that era it is very rusty and outdated, our revolution shall reach the railways too!"
rem_soviet_expanded.4.a:"Let Kaganovich handle this!"

rem_soviet_expanded.5.t:"Increasing the grain production"
rem_soviet_expanded.5.d:"As one of the goals of this plan we will increase the grain production. To do this we have choose a few good spots to set up new collective farms, namely\nMykolaiv area\nKherson area\nVolgodonsk area"
rem_soviet_expanded.5.a:"Grain is our gold"

rem_soviet_expanded.6.t:"Increasing the arms production"
rem_soviet_expanded.6.d:"As one of the goals of this plan we will increase the grain production. However with danger of war closing in we must concentrate on more important matters. The Voronezh and Kostroma areas were choosen for establishing new military facilities"
rem_soviet_expanded.6.a:"We must be ready!"


rem_soviet_expanded.7.t:"Steel casting repot"
rem_soviet_expanded.7.d:"Our steel mills are working without any delays even surpassing our estimated outcomes greatly. Thanks to newest breathroughs in steel casting industry we can truly call ourselves the best in the world in that matter"
rem_soviet_expanded.7.a:"Glorious Stalinium!"


rem_soviet_expanded.8.t:"Synthetic experiments"
rem_soviet_expanded.8.d:"Our scientetists reported that they made a series of breathroughs in obtaining rubber from purely synthetic sources and form oil. This reduces our dependency on the world trade and take us a step closer to being fully self sustainable"
rem_soviet_expanded.8.a:"Nothing smells as good as some synthetic rubber!"


rem_soviet_expanded.9.t:"Optimization of production"
rem_soviet_expanded.9.d:"On the noisy production lines crowded with workers reaching new heights in production goals every day a new breakthrough was made by the factory managers and overseers. Thanks to their conclusions we can optimize the production even more and thus increase the productivity greatly."
rem_soviet_expanded.9.a:"Workers will work double time from now on!"


rem_soviet_expanded.10.t:"Mandatory Immunizations"
rem_soviet_expanded.10.d:"Due to alarmingly increasing number of new disease cases we must take action and thanks to our modern health care institutions immunizate all of our population to destroy this disease like enemies of the revolution!"
rem_soviet_expanded.10.a:"Disease is just another obstacle on the road to achieving Lenins dream!"

rem_soviet_expanded.11.t:"Ural industry expansion"
rem_soviet_expanded.11.d:"Ural area is prefect for industrial developement thanks to it being located deep inside the state and thus far from our enemies reach. We will create massive industrial hubs there never seen before!"
rem_soviet_expanded.11.a:"Ural will become the new industrial heart of the Union!"


rem_soviet_expanded.12.t:"Soviet Academy of Sciences"
rem_soviet_expanded.12.d:"We must be as good as, and ideally better then the rest of the world in terms of applied sciences and research. We must create a state founded academy that will teach future generations of our glorious people to help steer our motherland into brighter future!"
rem_soviet_expanded.12.a:"For You, Glorious Union, learing and working!"


rem_soviet_expanded.13.t:"Engineering investments"
rem_soviet_expanded.13.d:"We may be building great factories and communal utility facilities but we still have to obtain new ideas and improve the old ways, thats why we need the engineers that will be guided by the best Soviet professors on how to develop such factilites to be as efficient as possible."
rem_soviet_expanded.13.a:"Soviet Engineers are the new saints of our state!"


rem_soviet_expanded.14.t:"Socialist wellbeing high as never before!"
rem_soviet_expanded.14.d:"With our recent investments our peoples wellbeing has significantly improved. We are reciving letter form happy citizens from all over our Union. Running water supply is available in every city and most of bigger villages and settlements. We have also electrified the less developed areas for future expansion"
rem_soviet_expanded.14.a:"Soviet Union - The state of happy people!"


rem_soviet_expanded.15.t:"Taking a great scientific leap forward "
rem_soviet_expanded.15.d:"With the end of the previous war we can no longer wish for a lasting peace, sooner or later another war will break out and we must be prepared like never before! We shall surpass our enemies in every possible domain of science starting with nuclear research and ending with space conquering! "
rem_soviet_expanded.15.a:"Glory to Soviet science!"


rem_soviet_expanded.16.t:"Red fleet investments"
rem_soviet_expanded.16.d:"Our Union already posseses the greates and best equiped army in the whole world, but there still are few countries that can challange us in the seas. Red Navy is not as good as the Imperial Navy was in its prime... yet. We shall increase the naval production and create new standards to surpass our enemies"
rem_soviet_expanded.16.a:"Glory to Red Navy!"


rem_soviet_expanded.19.t:"Soviet Artillery achivements"
rem_soviet_expanded.19.d:"Our artillery proved to be one of the most effective in combat in the entire world. We must find ways to improve it even more to achive our victories. Some of the most prominent vehicle planners pointed out that artillery lacs mobility and armour so why dont we just put it on our well proven tank chassis and eliminate both problems"
rem_soviet_expanded.19.a:"Soviet Union - the state of great ideas!"

rem_soviet_expanded.18.t:"Modernization program"
rem_soviet_expanded.18.d:"Our engineers ponited out few things that can be improved in our industrial machines in all industry areas. We can begin introducing the changes in a organized manner to mninimize the negative effects of modernization like production slow down."
rem_soviet_expanded.18.a:"Forward into the industrial future!"

rem_soviet_expanded.21.t:"We have defeated our enemies now we shall defeat the nature!"
rem_soviet_expanded.21.d:"Our state consists of many terrain types, with fertile fields of Ukraine, the oil rich mountains of Caucasus and rather useless dry steppes and deserts. We could use our great industrial might to bend nature into our liking by reversing the rivers and maybe even using nuclear weapons to create artificial seas and lakes."
rem_soviet_expanded.21.a:"The future full of possibilites stands before us wide open!"



rem_soviet_expanded.20.t:"Forming the People's Commisariat of Defense Industry"
rem_soviet_expanded.20.d:"People's Commisariat of Defense Industry's main goal is to bette organize our defense industry. It shall oversee every aspect of our defences and military production to ensure that we are always ready to defend our motherland!"
rem_soviet_expanded.20.a:"Glory to the commissars!"
BSP_idea:"Boy Scouts of the Philippines"



rem_soviet_expanded.22.t:"Piramiden Project starts!"
rem_soviet_expanded.22.d:"To increase our coal reserves and increase our international prestige we will construct a socialist model city in the far north. The city will house swimming pools, cinemas, gyms and even schools - it will have everything needed for not only survival but a very comfortable life. To encourage our citizens to move there the minimal wage will be doubled and food and drinks will be totally free. It will ensure stability and loyality to our state"
rem_soviet_expanded.22.a:"Socialist beacon of the north shall soon shine!"


rem_soviet_expanded.23.t:"[GetNewsHeadline]USSR finishes the Pyramiden project!"
rem_soviet_expanded.23.d:"USSR announced that the construction of the city of Piramiden has been completed! Piramiden is located on the Soviet controlled part of Svalbard islands thus making it the northmost city in the entire world. Despite harsh natural enviroment Soviets managed to create city full of public utilites, like swimming pools, gyms, schools, cinemas. The overall living comfort is much higher than in the mainland Union. Soviet offcials say that thanks to this great investment the coal excavation is expected to increse significantly and that this whole undertaking shows that socialism despite all hardships and achives its goals"
rem_soviet_expanded.23.a:"Socialist heaven in the north shines!"
rem_soviet_expanded.23.b:"Quite and achivement"
rem_soviet_expanded.23.c:"Damn bolsheviks think they achived something!"
rem_soviet_expanded.23.e:"Another achivement for socialism!"

umcflavourevents.7.t:"[GetNewsHeadline]The last living thylacine dies"
umcflavourevents.7.d:"On  [GetDateText], the last known thylacine, or Tasmanian tiger, died in captivity at Hobart Zoo, Tasmania. This somber event marks the official extinction of the species, once native to Australia, Tasmania, and New Guinea. The thylacine, known for its distinctive striped back and dog-like appearance, had faced severe population decline due to hunting, habitat loss, and competition with humans and introduced species. The death of this final individual underscores the profound impact of human activities on wildlife and serves as a stark reminder of the urgent need for conservation efforts to protect endangered species worldwide. "
umcflavourevents.7.a:"Nature is unforgiving"



umcflavourevents.8.t:"[GetNewsHeadline]The boy scouts of the Philippines"
umcflavourevents.8.d:"The Boy Scouts of the Philippines (BSP) is the national scouting organization of the Philippines in the World Organization of the Scout Movement."
umcflavourevents.8.a:"They will protect our country if needed"

umcflavourevents.9.t:"[GetNewsHeadline]Nuclear fission discovered"
umcflavourevents.9.d:"Nuclear fission was discovered by chemists Otto Hahn and Fritz Strassmann and physicists Lise Meitner and Otto Robert Frisch. Fission is a nuclear reaction or radioactive decay process in which the nucleus of an atom splits into two or more smaller, lighter nuclei and often other particles. "
umcflavourevents.9.a:"Great advancement!"


umcflavourevents.10.t:"[GetNewsHeadline]Foundation of Toyota"
umcflavourevents.10.d:"In April 1936, Toyoda's first passenger car, the Model AA, was completed. The sales price was ¥3,350, ¥400 cheaper than Ford or GM cars. The company's plant at Kariya was completed in May. In July, the company filled its first export order, with four G1 trucks exported to northeastern China. On September 19, 1936, the Japanese imperial government officially designated Toyota Automatic Loom Works as an automotive manufacturer."
umcflavourevents.10.a:"Japan is moving forward!"


umcflavourevents.11.t:"Hobbit is published"
umcflavourevents.11.d:"The Hobbit, or There and Back Again is set in Middle-earth and follows home-loving Bilbo Baggins, the hobbit of the title, who joins the wizard Gandalf and thirteen dwarves that make up Thorin Oakenshield's Company, on a quest to reclaim the dwarves' home and treasure from the dragon Smaug. Bilbo's journey takes him from his peaceful rural surroundings into more sinister territory."
umcflavourevents.11.a:"Interesting book"



umcflavourevents.13.t:"Kristalnacht"
umcflavourevents.13.d:"Last night SS and SA formations conducted a series of raids and pogroms against the Jewish population of our state. They were often joined by the ordinary people who participated in the attacks. The name Kristallnacht (literally 'Crystal Night') comes from the shards of broken glass that littered the streets after the windows of Jewish-owned stores, buildings and synagogues were smashed."
umcflavourevents.13.a:"Brave sons of our state"

umcflavourevents.12.t:"[GetNewsHeadline]The Nanjing massacre"
umcflavourevents.12.d:"The Japanese Army had pushed quickly through China after capturing Shanghai in November 1937. By early December, it was on the outskirts of Nanjing. The speed of the army's advance was likely due to commanders allowing looting and rape along the way. The first Japanese troops reached the city on December 13, and faced little resistance. The massacre began the same day, with Japanese troops running entirely unchecked. Chinese soldiers were summarily executed in violation of the laws of war. Women and girls were raped en masse and looting was widespread."
umcflavourevents.12.a:"Monsters"
umcflavourevents.12.b:"We just celebrated our victory"
umcflavourevents.12.c:"They will pay for it all!"
