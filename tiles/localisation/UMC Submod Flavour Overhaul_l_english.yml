Relocate_posenpol:"Relocate poles from §gReichsgau Posen§!"
Relocate_preusenpol:"Relocate poles from §gWestpreußen und Zichenau§!"
Send_reinforcements_togg:"Send additional reinforcements to §gGeneralgouvernement§!"
Pacify_Sudetenland:"Integrate the §gSudetenland§!"
Pacify_Memel:"Integrate the §gMemelland§!"
umcflavourevents.5:"Molotov 50 Birthday"
umcflavourevents.5.t:"Molotov 50 Birthday"
umcflavourevents.5.d:"Today comrade Molotov celebrates his 50 birthday. For his great effort in terms of our foreing policy we must thank him in some way."
umcflavourevents.5.a:"Let the great city of Perm bare his name form now on!"
umcflavourevents.6:"Chkalov succedes in transpolar filght!"
umcflavourevents.6.t:"Chkalov succedes in transpolar filght!"
umcflavourevents.6.d:"Today comrade Chkalov returned form his succesful transpolar filght. Stalin is very proud of the young aviator and decided to immortalize this victory of socialist aviation"
umcflavourevents.6.a:"Let his home area bare his name!"


allow_tactical_bombingsallies:"Unlock the §RAir raids§!"
bridge_reich_construction_desc:"Great construction projects of the Reich. Monumental buildings and fortifications, Breitspurbahn, bridges and tunnels all of this in our beautiful neo-classical style."
allow_west_wallconstruction:"Unlock construction of §gWestwall§!"
West_wall_construction_fra:"Build §gWestwall Südteil§!"
West_wall_construction_mit:"Build §gWestwall Nordteil§!"
West_wall_construction_air:"Build §gWestwall Luftabwehrabteilung§!"
West_wall_construction_modernize:"Modernize §gWestwall§!"
map_news.6:"Germany begins Westwall construction"
map_news.6.t:"[GetNewsHeadline]Germany begins Westwall construction"
map_news.6.d:"Today Germans started the construction of Westwall. It is a set of fortifications along German western border in the Rhineland region. It mainly aims to secrue the industry rich Rhine from French invasion. Fortifications are not so advanced as on the French side but still they are something to take accont while planning a invasion"
map_news.6.a:"Good luck to them I guess"
map_news.6.b:"It will be better than the Maginot!"

map_news.7:"Germany finishes Westwall construction"
map_news.7.t:"[GetNewsHeadline]Germany finishes Westwall construction"
map_news.7.d:"Today Germans officially finished constructing the Westwall, It spans all the way form Freiburg in the south to the border with Netherlands in the north. It consists of mid tier forts and a advanced anti air systems, in theory it could stop or at least slow down a invasion significantly."
map_news.7.a:"Impressive"
map_news.7.b:"The bright example of German engineering!"
map_news.7.c:"We should redraw our plans of invasion!"
EST_construction_air:"Build §gÖstliche Luftabwehr§!"
FRA_construction_air:"Build §gFranzösische Luftabwehr§!"
MIT_construction_air:"Build §gZentrale Luftabwehr§!"
SUD_construction_air:"Build §gSüdliche Luftabwehr§!"
NORD_construction_air:"Build §gNördliche Luftabwehr§!"
umcflavour.4:"The question of Trencin"
umcflavour.4.t:"The question of Trencin"
umcflavour.4.d:"Trencin is a region of Slovakia that is rich in resources and has some military industy, we could incorporate it into the Reich as there lives a little German minority, that would however weaken the Slovak state even more"
umcflavour.4.a:"Incorporate it!"
umcflavour.4.b:"Let the Slovaks have this meaningless area!"
Pacify_Trencin:"Integrate the §gTrentschin§!"
constructionunderwayger:"§gConstruction§! is underway"

flavourmr.10.t:"Commemorating Benito Mussolini"
flavourmr.10.d:"We have seized the hometown of the fascist Italian leader Benito Mussolini. He always was always admired by Führer, now that he has been removed form power by his own people we can commemorate his struggle against capitalism and socialism by naming his hometown after him"
flavourmr.10.a:"Sieg Heil Mussolini!"
flavourmr.10.b:"What a dumb idea"


flavourmr.11.t:"Liberation of Ethiopia and east africa"
flavourmr.11.d:"After series of blows form the advancing German army Italy is now sevearly weakend. We can use this opportunity to liberate our former ally - Ethiopia who fought bravely but was ulitmately beaten by Italian forces. Italian army in east Africa is very weak as most of the units defend mainalnd. We must act quickly before Germans take more, maybe we should even consider some landings in southern Italy to not allow the germans to control the whole region and their navy as this could be a serious danger to our medditarean holdings"
flavourmr.11.a:"Commence the operation!"
flavourmr.11.b:"Its too risky"

flavourmr.12.t:"[GetNewsHeadline]Britain invades Italian East Africa"
flavourmr.12.d:"With Italian army slowly falling apart in the mainland the situation in colonies is even worse, maybe there are no constatn Luftwaffe bombings but resistance is strong as never before. This opportunity has been exploitetd by the British Empire in order to liberate its former ally Ethiopia. Commonwealth soldiers have already crossed border in many areas and are advancing at key cities in the area. There are rumours about a landing in Sicily"
flavourmr.12.a:"Show them how its done"
flavourmr.12.b:"Enemies on all sides!"
flavourmr.12.c:"Verdammt vultures!"
flavourmr.12.e:"Brave move!"



operationsflavour.124.t:"[GetNewsHeadline]Germany commences unternehmen Alarich!"
operationsflavour.124.d:"After negotiations regarding South Tyrol failed German Reich decided to invade Italy. For a month now German armies have ammased in the alpine region and luftwaffe observation operations were conducted. Now that German panzers are rolling through narrow Alpine passages and enterign village after village slowyly 'liberating' South Tyrol form Italian rule. Will they stop there? Who knows..."
operationsflavour.124.a:"Vorwarts!"
operationsflavour.124.b:"We must hold, for Italia!"
operationsflavour.124.c:"Peace broken"

cityflavour.26.t:"[GetNewsHeadline]Wehrmacht enters Trento!"
cityflavour.26.d:"After swift victory at the border German forces managed to quiclky advance into the mountain passages of Tyrol and take major cities. Today they topped it with seizng one of the major cities in the area Trento. German speaking part of the city was very happy and sees the German armies as liberators, Italian speaking parts fate is being discussed. This victory allows Germans to advance into plains and marches down below and them to the rest of Italy"
cityflavour.26.a:"That was quick"
cityflavour.26.b:"Already got what we came for in the first place"
cityflavour.26.c:"Small stepback"


cityflavour.27.t:"[GetNewsHeadline]Fall of Torino"
cityflavour.27.d:"Another victory of German wehrmacht as it has entered the city of Torino the heart of province directly bordering France. At the moment first German bridgeheads reach the French and Swiss border. France responded by sending more men to the border and increasing overall readiness of its army, so did Switzerland"
cityflavour.27.a:"North falls"
cityflavour.27.b:"Great news"
cityflavour.27.c:"Another stepback"

cityflavour.28.t:"[GetNewsHeadline]Fall of Bolonga"
cityflavour.28.d:"Another victory of German wehrmacht as it has entered the city of Bolonga the heart of province Emilia-Romagna. After firece battle and major destruction mainly caused by Luftwaffe city is now under full German control. German soldiers can now be seen eating in local restaurants trying out rich local food."
cityflavour.28.a:"The gate to Rome opens"
cityflavour.28.b:"Some nice food indeed"
cityflavour.28.c:"Fight goddamit!"


cityflavour.29.t:"[GetNewsHeadline]Fall of Naples"
cityflavour.29.d:"German campagin in southern Italy proceeds as planned as Germans manage to take full control of city of Naples. A gateway to Calabria and then Sicily has fallen. Germans are now reorganizing their frontline and some units are resting on local beaches and amiring local architecture. Some incidents of stealing have been reported as this region of Italy is one of the richest."
cityflavour.29.a:"Italy is done for"
cityflavour.29.b:"Schöne Stadt!"
cityflavour.29.c:"Last stand ahead..."


cityflavour.30.t:"[GetNewsHeadline]Fall of Palermo"
cityflavour.30.d:"German campagin in Sicilian peninsula can be called a total success as today moring German soldier entered the city of Palermo, this cements the German control over peninsula and marks one of the final blows to Italian state. The battle of the city seen Fallschirmjager landing in the heights around the city and seizing artillery positions of Italian army and then using this artillery to help the main force in the city. This risky idea was proposed by Kurt student and rejected by the OKW at first but after Führer personal intervention the plan was given a green light, and it turned out to be a total success!"
cityflavour.30.a:"End of Italy is near"
cityflavour.30.b:"Eine Lehrbuchoperation!"
cityflavour.30.c:"Last stand behind us..."

cityflavour.31.t:"[GetNewsHeadline]Fall of Taranto"
cityflavour.31.d:"German campagin in the 'Heel of Italy' is nearly finished as German spearheads blitzed through the Marina of Taranto. After a swift vitory at Bari Germans managed to advance on Taranto nearly unopposed and faced some small milita and marine resisitance, which stood no chance to rushing panzers. Now the surviving defenders are being pushed back to Poggiardo in hopes of being saved by Italian Navy."
cityflavour.31.a:"Mainland Italy falls"
cityflavour.31.b:"Bald wird die Adria uns gehören!"
cityflavour.31.c:"Sicilia is the only option to survive!"


cityflavour.32.t:"[GetNewsHeadline]Fall of Trieste"
cityflavour.32.d:"German forces entered the city od Trieste. Once a Austro-Hungarian naval port is now again under Germanic boot and it seems it will stay as one for some time. This marks the total collapse of Italian Alpine fornt and opens more options for future German invasion of Yugoslavia. Fierce battle for the city has been fought and Fallschirmjagers had to land in the Marina in order to slowly advance form there to the city center. The portable mortars were widely used and cause some major damage to the once beautiful city architecture"
cityflavour.32.a:"Adriatic will soon see some German presence"
cityflavour.32.b:"Willkommen zurück, alter Freund"
cityflavour.32.c:"We are losing ground"

cityflavour.33.t:"[GetNewsHeadline]Fall of Tripoli"
cityflavour.33.d:"German mairnes and Fallschrimjagers landed in the heart of Italian North Africa - Tripoli. The air battle for the city has been raging for quite some time already and only now German Luftwaffe was able to secure full supremacy. With the little help form British by allowing Germans to use Giblartar strait to move thier navy into Mediterranean the operation was a total success even though it saw big loses on both sides. Now Germans are forming a new strike force under promising general Erwin Rommel, called Afrika Korps, its goal is to secure Northern Africa before intervention by any of the other major powers starts."
cityflavour.33.a:"Lybia falls to the Germans"
cityflavour.33.b:"Form Afrikakorps!"
cityflavour.33.c:"The last frontier falls."





cityflavour.34.t:"[GetNewsHeadline]Fall of Venice"
cityflavour.34.d:"Venice, one of the most recognizable and beautiful cities in the world has fallen to the German forces. Fierece battles in the city left it scarred and water in some canals of the city is still reddish brown due to the mixture of blood and petrol in it. Germany plans to integrate the city into German culture and already started Germanization process by throwing away the historical German name Venedig and choosing more German sounding Weneding."
cityflavour.34.a:"Such a beauty destroyed"
cityflavour.34.b:"Neues kulturelles Zentrum der Adria!"
cityflavour.34.c:"Beauty does not mean importance"


cityflavour.35.t:"[GetNewsHeadline]Fall of Milan"
cityflavour.35.d:"Milan, second largest city in Italy, second after Rome has fallen to the German Wehrmacht. Many cultural and research centers have been seized by advancing Germans and even more were destroyed. Due to Luftwaffe bombardments the cities infrastructure is largely damaged and at risk of collapse. German engineers have already been sent to the city to save as much as possible."
cityflavour.35.a:"North falls"
cityflavour.35.b:"Securing the western flank"
cityflavour.35.c:"We must evacuate further south"


cityflavour.36.t:"[GetNewsHeadline]Fall of Firenze"
cityflavour.36.d:"Firenze, the birthplace of renissance, has fallen to the German forces advancing from the north, after a firece battle in the outskirts that later moved on to the city center which got severly damaged by German artillery shells form batteries located in the hills outside the city. It is reported that siege was supported by a German railway gun stationed in the nerby city of Pistoia. Fall of this city opens a wide road to the heart of Italy, Rome."
cityflavour.36.a:"Rome will fall soon enough"
cityflavour.36.b:"Vorwats nach Rom!"
cityflavour.36.c:"Prepare all of the Roma defences! Rise the militia!"


cityflavour.37.t:"[GetNewsHeadline]Germans Enter Sicily!"
cityflavour.37.d:"The last bastion of Free Italy - Sicily is now under direct danger, for the past time it was constatnly bombarded by Luftwaffe and all supplies and support going there by sea was sank by German Uboots operating in the area, now first German spearheads have entered the peninsula and are headed for the main cities, experts say that Italy will fall within a few days while others say that there is still chance to evacuate to Lybia and continue the war from there."
cityflavour.37.a:"The last stand of Italy"
cityflavour.37.b:"Vorwarts Nach Palmerhafen!"
cityflavour.37.c:"To the last drop of blood!"


cityflavour.38.t:"[GetNewsHeadline]Germans enter Istanbul!"
cityflavour.38.d:"The gate of the Black see has fallen to the advancing German Panzer force. After firece fighting involving some major hisorical sites the city is now secured and defenders retreat further. With German control over Bosphorus the fate of Black sea nations is in question."
cityflavour.38.a:"Bosphor falls"
cityflavour.38.b:"Schwarzmeer ist Deutsch!"
cityflavour.38.c:"Major stepback"



cityflavour.39.t:"[GetNewsHeadline]Germans enter Sarajevo!"
cityflavour.39.d:"Sarajevo, the heart of Bosnia has fallen to the advancing German armies. City that somewhat started the First World War has now fallen to the Germans and is under direct occupation. The local muslim community sees Germans as liberators and greets them warmly."
cityflavour.39.a:"Balkan powderkeg is being slaugthered"
cityflavour.39.b:"Erster Weltkrieg gerächt!"
cityflavour.39.c:"Bosnia is gone..."

cityflavour.40.t:"[GetNewsHeadline]Sardnia fall to the Germans!"
cityflavour.40.d:"Sardinia, one of the biggest islands in the Meditereean has fallen to the German naval and air invasion. German fallschirmjagers seized heights in the eastern part of the island while Marinekorps landed in the North west. After securing their breachheads they slowly advanced on the main port of the island - Cagliari and after a prolonged siege took it. The city is devastated by months of Luftwaffe terror bombings so urban battles in the rubble were very bloody"
cityflavour.40.a:"One more limb of Italy fall to the Reich"
cityflavour.40.b:"Das Mittelmeer wird uns gehören!"
cityflavour.40.c:"The end is near..."


cityflavour.41.t:"[GetNewsHeadline]Fall of Thessaloniki!"
cityflavour.41.d:"Thessaloniki have fallen to the advancing German Gerbisjagers, despite the strong defenders force German mountain artillery decimated them and after porlonged barrage entered the city and wiped out the survivors. This victory opens the Aegan sea to the Kriegsmarine."
cityflavour.41.a:"Aegan fall to the Germans"
cityflavour.41.b:"Die Ägäis wird uns gehören"
cityflavour.41.c:"One more blow"

cityflavour.42.t:"[GetNewsHeadline]Tirane falls to the Germans"
cityflavour.42.d:"Tirane - capital of Albania has fallen to the advancing Germans forces. This secures the shore of Adriatic sea and completes the German conquest of the area."
cityflavour.42.a:"Adriatic is lost"
cityflavour.42.b:"Adria ist deutsch!"
cityflavour.42.c:"One more blow"


cityflavour.43.t:"[GetNewsHeadline]Zagreb falls to the advancing Germans"
cityflavour.43.d:"Fall of Zagreb marks the beggining of German invasion of the Balkans. The cultural center of Croatia is now under direct control of Germany. Local Croatian is concerned by the occupiers."
cityflavour.43.a:"Balkans ablaze"
cityflavour.43.b:"Vorwarts nach Belgrad!"
cityflavour.43.c:"Another blow"

cityflavour.44.t:"[GetNewsHeadline]Axis wins the battle for Al-Alamain"
cityflavour.44.d:"After a swift and decisive blow form the combined Afrika Korps and Italian colonial army British and Egyptian forces were forced to retreat form their stronghold in Al-Alamain. This victory opens wide the road to Cairo and then to Middle east and its oil deposits."
cityflavour.44.a:"Bad news"
cityflavour.44.b:"Forza! Forza!"
cityflavour.44.c:"Prepare the Cairo defences!"

cityflavour.45.t:"[GetNewsHeadline]Fall of Alexandria"
cityflavour.45.d:"Following victory at Al-Alamain Axis forces after some prolonged delaying battles staged by the defenders managed to take Alexandria after a siege. The port city fought bravely but could not withstand the Axis might, defenders managed to set the supplies on fire and blow up some major installations in the docks."
cityflavour.45.a:"Egypt is doomed"
cityflavour.45.b:"Forza! Forza!"
cityflavour.45.c:"Shit"
ITA_hold_rome:"Hold §GRoma§!!"
ITA_hold_rome_desc:"§GRoma§! cannot fall! We must organize any defense we can, §GRoma§! has never fallen! §GForza Italia!§!"
EGY_hold_cairo:"Hold §Yal-Qāhirah§!!"
EGY_hold_cairo_desc:"§Yal-Qāhirah§! cannot fall! We must defend our home and our people, we must defend the Commonwealth! We must defend the §Ygates of Africa!§!"
operation_alarich:"Commence Unternehmen §GAlarich§!!"
alarich:"Fall §GAlarich§!"

antbase.33.t:"Whaling industry in Antarctica"
antbase.33.d:"We have seized a part of Antarctica that is suitable for whaling industry. Though bloody this industy is very profitable"
antbase.33.a:"Great!"
antbase.33.b:"End this once for all!"
West_wall_construction_ita:"Build §gWestwall§! §GItalien§!"
GER_conquer_northern_italy:"According to §gOKW§! The §GFall Alarich§! should allow us to §gconquer§! §Gnorthen Italy§! in about §R30 days§!. To call this operation a success we must control §YTurin, Milano, Trieste, Bolonga, Fizerne and Venezia§! \n§gCurrent outcome:§!"
GER_conquer_northern_italy_success:"§GSuccess§!"
GER_conquer_northern_italy_fail:"§RFailure§!"
antbase.35.t:"[SOV.GetName] siezed Knox land"
antbase.35.d:"Soviet expedition arrived to Antarctica and managed to estabish some temporary bases. There is no way we can retake this land"
antbase.35.a:"Damn ruskies!"

antbase.34.t:"Expedition arrives to Antarctica"
antbase.34.d:"Our expedition arrived to Antarctica and managed to estabish some temporary bases. There is no response from the western imperialists yet so we have time to consolidate. There is still the question of naming our newly obtained land"
antbase.34.a:"Call it after peace as this was the purpose of the expedition!"
antbase.34.b:"Call it after our glorious leader Iosif Stalin!"
antbase.34.c:"Call it after the father of socialism Vladimir Lenin!"

antbase.36.t:"Consolidating our gains"
antbase.36.d:"We now have to consolidate our control over Antarctica, we have already reached the South Pole and more resources have arrived."
antbase.36.a:"Molodcy!"
cityflavour.46.t:"[GetNewsHeadline]Germans enter Brześć Litewski!"
cityflavour.46.d:"After the total collapse of Polish army thanks to the massive German superiority in equipment and numbers, today German spearheads reached the fortress city of Brześć Litewski. After a fierce defence by the Polish defenders Germans managed to take the fortress and the city afeter prolonged artillery barrage supported by strong air support."
cityflavour.46.a:"Poland is dying"
cityflavour.46.b:"Vorwarts nach Ost!"
cityflavour.46.c:"Not Yet lost.."

cityflavour.47.t:"[GetNewsHeadline]Soviet forces enter Brześć Liteski"
cityflavour.47.d:"After an unexpected invasion and total disarray in Polish army the Soviet forces captured the Brest Fortress today. The fighting was very bloody and defneders were doing great until Soviets started using local civilians and humanshields. This forced the fortress to capitulation."
cityflavour.47.a:"Barbarians!"
cityflavour.47.b:"We are just liberating western Belarus!"
cityflavour.47.c:"Backstabbers!"


cityflavour.48.t:"[GetNewsHeadline]German forces enter Brest-Litovsk"
cityflavour.48.d:"Following a massive artillery and air barrage German forces began to storm the Brest Fortress now controlled by Russians. Despite their superiority in numbers and equipement they could not take the fortress form the front and had to use the local river to make an amphibious landin from the back of the Fortress where it was not that well defended"
cityflavour.48.a:"The two beasts fight"
cityflavour.48.b:"Vorwarts nach Ost!"
cityflavour.48.c:"Someone will get shot for this!"


cityflavour.49.t:"[GetNewsHeadline]Soviets liberate Brest Litovsk!"
cityflavour.49.d:"After a series of major defeats Soviets managed to take back a major fortress in the Polesie area and thus open the gates of central Poland and then Germany."
cityflavour.49.a:"Enjoy Your liberation"
cityflavour.49.b:"Verdammt Russen!"
cityflavour.49.c:"Onwards to Varschawa!"


cityflavour.50.t:"[GetNewsHeadline]German forces enter Lwów!"
cityflavour.50.d:"German forces entered Lwów today, after a prolonged siege. Forces originally starting form Slovakia and Silesia managed to take Lwów after some swift vitories around the Krakow area. Poland is now torn from all sides and its situation is critical"
cityflavour.50.a:"The east falls"
cityflavour.50.b:"Galizien is back"
cityflavour.50.c:"Fight goddamit!"

cityflavour.51.t:"[GetNewsHeadline]Soviet forces enter Lwów!"
cityflavour.51.d:"Following a rather unexpected invasion of eastern Poland Soviet forces took the city of Lwów by using civilians as humanshields and putting them on their tanks that advanced on the defenders. The situation. Poland is now in a very desperate situation."
cityflavour.51.a:"More death in the east"
cityflavour.51.b:"Tylko we Lwowie..."
cityflavour.51.c:"We are just liberating western Ukraine!"


cityflavour.52.t:"[GetNewsHeadline]Poles liberate Lwów"
cityflavour.52.d:"After a Polish counter offensvie the city of Lwów is back in Polish hands, for how long its hard to say but as for now there are great celebrations in the city and local poputalion is greeting liberators."
cityflavour.52.a:"Impressive"
cityflavour.52.b:"Goddamn Poles!"
cityflavour.52.c:"Jeszcze Polska nie zginęła!"


cityflavour.53.t:"[GetNewsHeadline]Soviets liberate Lvov"
cityflavour.53.d:"After a series of major victories Soviet armies managed to encircle and then capture the heavily defended city of Lvov. Fierce urban fights have been reported and city center is now a complete bloodbath. Local population cheers the 'liberators' but there are first signs that they may not be better thn the Germans"
cityflavour.53.a:"They are getting closer to Germany"
cityflavour.53.b:"Scheise!"
cityflavour.53.c:"Onwards to Siliesia!"


cityflavour.54.t:"[GetNewsHeadline]Germans capture Lvov!"
cityflavour.54.d:"The Soviet controlled city of Lvov has fallen to the advancing German forces after a short siege. The whole Galicia area has been encircled by the Panzer forces and then slowly crushed by the infantry."
cityflavour.54.a:"Former allies now foes"
cityflavour.54.b:"Vorwarts nach Kiew!"
cityflavour.54.c:"Minor stepback"
Moskva_metro_resistance:"§RMoskva Metro§! resistance"
Moskva_metro_resistance_desc:"The remnants of the Moscow defenders fled to the §RMoscow Metro§! and have bunkered up there. The partisans are crawling form the underground and ambushing our patrols and offcials inflicting serious casualities and before our quick response force arrives they just crawl back in and disappear. There were attempts to storm the metro but our strike forces were separated in the tunnels and only few returned." 
Moskva_metro_modifier:"§RMoskva Metro§!"
Moskva_metro_modifier_desc:"§RMoskva Metro§! is one of the most advanced metro systems in the world right now. It allows much bigger traffic to move around without problems and also in the times of war grants great protection form enemy air bombings"
