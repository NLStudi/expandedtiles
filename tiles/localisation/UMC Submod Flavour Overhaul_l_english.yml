germany.14.c:"Propose some changes to the pact"
flavourmr.1:"Germans propose changes to the Pact"
flavourmr.1.t:"Germans propose changes to the Pact"
flavourmr.1.d:"Germans proposed some changes regarding the Molotov Ribbentrop pact. Now that Poland is no more we can decide what to do with its territories. Thier offer states that we should transfer Lublin, East Warsaw and Rzeszow to them and they will compensate it with whole Lithuania. It seems like a fair deal!"
flavourmr.1.a:"We don't need Warsaw, we can agree to this terms"
flavourmr.1.b:"No way we are signing this! The first offer was better!"
USFO_agreemr:"We will transfer some former §gPolish§! territories for §RLithuania§!"
USFO_refusemr:"§RPolish§! territories shall stay in our spehere of infulence and §gLithuania§! will be left for Germany"
USFO_askmr:"Ask Soviets to exchange §gLithuania§! form our sphere of influence for §RPolish§! territories that are in their sphere"
USFO_agreemrGER:"Changes made in the §RMolotov§! §gRibbentrop§! Pact are now ratified"
USFO_propositoionGER:"Exchange §gLithuania§! for more territory in §RPoland§!"
flavourmr.2:"Soviets accepted the changes!"
flavourmr.2.t:"Soviets accepted the changes!"
flavourmr.2.d:"After prolonged negotiations Soviets accepted our offer of exchanging influence in Lithuania for Eastern Poland. The new changes also increased cooperation between Gestapo and NKVD to fight any Polish resistance and extended the time of non agression pact."
flavourmr.2.a:"Wünderbar!"
flavourmr.3:"Soviets rejected the changes!"
flavourmr.3.t:"Soviets rejected the changes!"
flavourmr.3.d:"Despite our generous offer Soviets want to stay with the original pact statements. This is a dangerous situation for us as Soviets would get access to Vistula river and could easily attack our core lands. We can provoke a little conflict and maybe push the Russians back enough so they start negotiating. However this would be a very dangerous move and could end in a disaster for us, fighting on two fronts is always a bad idea."
flavourmr.3.a:"Let them have it, we will conquer them later!"
flavourmr.3.b:"We must take that risk"
