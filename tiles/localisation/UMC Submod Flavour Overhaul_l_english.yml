SOV_liberatekharkovrostovvoroshilov:"According to §RSTAVKA§! The §GCounteroffensive§! should allow us to §gliberate§! §GKharkov and Voroshilov§! in about §R65 days§!. To call this operation a success we must control §YKharkov, Severodonetsk, Voroshilovgrad and Rostov§! \n§gCurrent outcome:§!"
